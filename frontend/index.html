<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CabinSense</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.12.17/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#090d12;color:#d4dce8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:12px;-webkit-font-smoothing:antialiased}

/* ─── Shell ─── */
.hmi{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hmi-hdr{height:34px;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;
  background:#040810;border-bottom:1px solid rgba(255,255,255,.05)}
.sp{flex:1}
.hmi-clock{font-size:10px;color:rgba(255,255,255,.35);font-variant-numeric:tabular-nums}
.dot{width:6px;height:6px;border-radius:50%;background:#1c2740;transition:background .4s}
.dot.on{background:#00d4b0;box-shadow:0 0 8px rgba(0,212,176,.6)}
.lat{font-size:9px;color:rgba(255,255,255,.2);font-variant-numeric:tabular-nums}
.hmi-content{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow:hidden}
.hmi-tabs{height:42px;display:flex;background:#040810;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;
  font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;border:none;background:none;
  border-top:2px solid transparent;transition:all .25s;letter-spacing:.3px}
.tab.on{color:#00d4b0;border-top-color:#00d4b0;background:rgba(0,212,176,.06);font-weight:600}

/* ─── Brand Bar ─── */
.brand-bar{display:flex;align-items:center;justify-content:space-between;
  width:81vw;min-width:900px;padding:0 6px;margin-bottom:12px}
.jag-side{display:flex;align-items:center;gap:12px}
.brand-sep{flex:1;height:1px;margin:0 20px;
  background:linear-gradient(to right,rgba(255,255,255,.04),rgba(0,212,176,.25),rgba(255,255,255,.04))}
.cs-side{text-align:right}
.cs-name{font-size:19px;font-weight:700;letter-spacing:-.5px;color:#ffffff;line-height:1}
.cs-name em{color:#00d4b0;font-style:normal}
.cs-sub{font-size:6.5px;letter-spacing:3px;color:rgba(255,255,255,.35);
  text-transform:uppercase;margin-top:3px}

/* ─── Sensor View Grid ─── */
.sv{display:grid;grid-template-columns:repeat(3,1fr);
  grid-template-rows:1fr 1fr 72px;gap:8px;padding:8px;
  width:81vw;height:81vh;min-width:900px;min-height:480px;
  border-radius:14px;overflow:auto;resize:both;
  border:1px solid rgba(0,212,176,.2);
  background:linear-gradient(150deg,#0c1420 0%,#080d18 100%);
  box-shadow:0 0 0 1px rgba(0,212,176,.06),0 30px 80px rgba(0,0,0,.95),
    0 0 60px rgba(0,212,176,.04),inset 0 1px 0 rgba(255,255,255,.04)}
.sv-timeline{grid-column:1/-1}

/* ─── Panels ─── */
.panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;
  padding:11px 13px;display:flex;flex-direction:column;overflow:auto;resize:both;
  min-height:80px;min-width:120px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0}
.pt{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:#00d4b0;font-weight:600}
.ps{font-size:11px;color:rgba(255,255,255,.7)}
.pb{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;
  gap:0;justify-content:space-evenly}

/* ─── Shared controls ─── */
.row{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.75);flex-shrink:0}
.val{font-size:13px;font-weight:600;color:#ffffff;min-width:48px;text-align:right;flex-shrink:0}
.btn-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.btn{padding:6px 14px;border-radius:5px;font-size:11px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{border-color:#00d4b0;color:#00d4b0}
.btn.on{background:rgba(0,212,176,.1);border-color:#00d4b0;color:#00d4b0}
.btn.warn{background:rgba(246,173,85,.08);border-color:#f6ad55;color:#f6ad55}
.btn.crit{background:rgba(252,129,129,.08);border-color:#fc8181;color:#fc8181}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;
  background:rgba(255,255,255,.12);outline:none;flex:1;cursor:pointer;border:none;min-width:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:#00d4b0;cursor:pointer;border:2px solid #090d12}
input[type=checkbox]{accent-color:#00d4b0;cursor:pointer;width:15px;height:15px}
.divider{height:1px;background:rgba(255,255,255,.07);flex-shrink:0;margin:0}

/* ─── Video ─── */
.vid-box{background:rgba(0,0,0,.4);border-radius:5px;flex:1;display:flex;align-items:center;
  justify-content:center;color:rgba(255,255,255,.2);font-size:11px;overflow:hidden;min-height:0;
  border:1px solid rgba(255,255,255,.07)}
.vid-box video{width:100%;height:100%;object-fit:cover;border-radius:5px}

/* ─── Audio widget ─── */
.db-big{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.db-unit{font-size:11px;color:rgba(255,255,255,.4);margin-left:3px}
.vad-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;
  background:rgba(255,255,255,.12);transition:background .2s}
.vad-dot.on{background:#00d4b0;box-shadow:0 0 6px rgba(0,212,176,.6)}
.noise-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;flex:1}
.noise-fill{height:100%;border-radius:3px;transition:width .15s,background .3s}
.mic-btn{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:all .2s}
.mic-start{background:rgba(0,212,176,.1);border:1px solid #00d4b0;color:#00d4b0}
.mic-stop{background:rgba(252,129,129,.1);border:1px solid #fc8181;color:#fc8181}
.canvas-wrap{border-radius:4px;overflow:hidden;background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.05)}
.det-badge{font-size:12px;padding:4px 10px;border-radius:10px;background:rgba(246,173,85,.12);
  border:1px solid rgba(246,173,85,.3);color:#f6ad55;flex-shrink:0;align-self:flex-start}

/* ─── Seats widget ─── */
.seat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}
.seat-cell{border-radius:6px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;padding:5px;transition:all .3s;position:relative}
.seat-cell.occ{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.04)}
.seat-cell.warn{border-color:rgba(246,173,85,.5);background:rgba(246,173,85,.06)}
.seat-cell.crit{border-color:rgba(252,129,129,.5);background:rgba(252,129,129,.06)}
.seat-icon{font-size:22px}
.seat-name{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.6)}
.seat-tag{font-size:10px;color:#f6ad55;margin-top:2px}
.seat-belt{position:absolute;top:5px;right:7px;font-size:11px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.seat-cell.warn .seat-icon,.seat-cell.crit .seat-icon{animation:pulse 1.4s infinite}

/* ─── Road Quality ─── */
.wheel-map{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex-shrink:0}
.wheel{border-radius:4px;height:24px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;transition:background .3s,color .3s}

/* ─── Timeline ─── */
.timeline{display:flex;align-items:center;gap:8px;height:100%;overflow:hidden}
.sc-scroll{display:flex;gap:4px;flex:1;overflow-x:auto;align-items:center}
.sc-scroll::-webkit-scrollbar{height:2px}
.sc-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.sc-btn{padding:6px 14px;border-radius:5px;font-size:11px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.75);cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .15s;font-family:inherit}
.sc-btn:hover{border-color:#00d4b0;color:#00d4b0}
.sc-btn.on{background:rgba(0,212,176,.1);border-color:#00d4b0;color:#00d4b0}
.demo-btn{padding:7px 18px;border-radius:5px;font-size:12px;font-weight:600;
  white-space:nowrap;flex-shrink:0;font-family:inherit;cursor:pointer}
.demo-run{background:rgba(0,212,176,.08);border:1px solid #00d4b0;color:#00d4b0}
.demo-stop{background:rgba(252,129,129,.08);border:1px solid #fc8181;color:#fc8181}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.demo-ind{font-size:9px;color:#f6ad55;animation:blink 1s infinite;flex-shrink:0}

/* ─── Overlay ─── */
.overlay{position:fixed;inset:0;background:rgba(0,4,12,.8);display:flex;
  align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.ov-box{background:#0c1420;border:1px solid rgba(0,212,176,.3);border-radius:12px;
  padding:20px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.8)}
.ov-title{font-size:13px;font-weight:600;color:#00d4b0;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center}
.cfg-sec{margin-bottom:13px}
.cfg-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.5);margin-bottom:6px}
.btn-grp{display:flex;flex-wrap:wrap;gap:5px}
.cfg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rval{font-size:11px;color:#ffffff;font-weight:600;min-width:52px;text-align:right}
.xbtn{padding:4px 10px;border-radius:4px;font-size:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.75);transition:all .15s;cursor:pointer;font-family:inherit}
.xbtn.sel{background:rgba(0,212,176,.1);border-color:#00d4b0;color:#00d4b0}
.close-btn{background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);border-radius:5px;
  padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit}

/* ─── Infotainment View — half-size centered panel ─── */
.iv-shell{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 42%,#0c1828 0%,#040810 65%)}
.iv{display:flex;flex-direction:row;width:81vw;height:81vh;min-width:900px;min-height:480px;
  border-radius:14px;overflow:auto;resize:both;
  border:1px solid rgba(0,212,176,.2);
  background:linear-gradient(150deg,#0c1420 0%,#080d18 100%);
  box-shadow:0 0 0 1px rgba(0,212,176,.06),0 30px 80px rgba(0,0,0,.95),
    0 0 60px rgba(0,212,176,.04),inset 0 1px 0 rgba(255,255,255,.04)}
.iv-col{flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:18px 16px;overflow:hidden;border-right:1px solid #1c2740}
.iv-col:last-child{border-right:none}
.iv-cabin{background:#090d12;align-items:center;justify-content:center}
.iv-issue{background:#0c1520}
.iv-gauge{background:#090d12;align-items:center;justify-content:center;gap:0}
.iv-rec{background:#0c1520}

/* infotainment text — white */
.iss-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:#ffffff;font-weight:600;margin-bottom:8px}
.iss-name{font-size:16px;font-weight:700;color:#ffffff;line-height:1.25;margin-bottom:10px}
.iss-conf{font-size:36px;font-weight:700;line-height:1;margin-bottom:2px}
.iss-clbl{font-size:8px;color:rgba(255,255,255,.55);margin-bottom:12px}
.iss-meta{display:flex;flex-direction:column;gap:0}
.iss-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:10px}
.iss-row:last-child{border-bottom:none}
.iss-k{color:rgba(255,255,255,.55)}
.iss-v{color:#ffffff;font-weight:600;font-variant-numeric:tabular-nums}

/* gauge */
.gauge-sec{text-align:center;width:100%}
.gauge-ttl{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:#ffffff;font-weight:600;margin-bottom:12px}
.gauge-lbl{font-size:16px;font-weight:700;margin-top:10px;color:#ffffff}

/* rec panel */
.rec-ttl{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:#ffffff;font-weight:600;margin-bottom:14px}
.rec-list{display:flex;flex-direction:column;gap:11px;margin-bottom:16px}
.rec-item{display:flex;gap:10px;align-items:flex-start}
.rec-num{width:20px;height:20px;border-radius:50%;background:rgba(0,212,176,.1);
  border:1px solid rgba(0,212,176,.3);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#00d4b0;flex-shrink:0;margin-top:1px}
.rec-text{font-size:14px;color:#ffffff;line-height:1.35}
.rec-detail{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.rec-empty{font-size:14px;color:rgba(255,255,255,.45);padding:4px 0}
.apply-btn{display:block;width:100%;padding:9px;border-radius:7px;font-size:12px;font-weight:700;
  background:rgba(0,212,176,.14);border:1px solid #00d4b0;color:#00d4b0;
  cursor:pointer;transition:all .2s;font-family:inherit;text-align:center}
.apply-btn:hover{background:rgba(0,212,176,.26)}
.apply-btn:disabled{opacity:.3;cursor:not-allowed}
.dismiss-btn{display:block;width:100%;padding:6px;border-radius:5px;font-size:10px;margin-top:6px;
  background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.3);
  cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<div id="err" style="display:none;position:fixed;inset:0;background:#020508;color:#ff4d4f;
  font-family:monospace;font-size:12px;padding:32px;white-space:pre-wrap;z-index:9999"></div>
<script>
window.onerror=function(m,s,l,c,e){
  var d=document.getElementById('err');d.style.display='block';
  d.textContent='JS ERROR\n'+m+'\n'+s+':'+l+(e?'\nStack:\n'+e.stack:'');};
window.addEventListener('unhandledrejection',function(e){
  var d=document.getElementById('err');d.style.display='block';
  d.textContent='PROMISE ERROR\n'+(e.reason&&e.reason.stack||e.reason);});
</script>
<script>
/* AudioWorklet must live OUTSIDE the Babel block — no backtick template literals inside Babel */
window._CHUNKER_TARGET=Math.round(16000*0.96);
window._CHUNKER_SRC=[
  'class Chunker extends AudioWorkletProcessor {',
  '  constructor(){super();this._buf=[];this._target='+window._CHUNKER_TARGET+';}',
  '  process(inputs){',
  '    var ch=inputs[0][0];if(!ch)return true;',
  '    for(var i=0;i<ch.length;i++){this._buf.push(ch[i]);}',
  '    while(this._buf.length>=this._target){',
  '      this.port.postMessage(this._buf.splice(0,this._target));',
  '    }',
  '    return true;',
  '  }',
  '}',
  'registerProcessor("chunker",Chunker);'
].join('\n');
window._CHUNKER_URL=URL.createObjectURL(new Blob([window._CHUNKER_SRC],{type:'application/javascript'}));
</script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

/* ── constants ── */
const SEAT_IDS=['driver','front_passenger','rear_left','rear_right'];
const SEAT_LABELS={driver:'Driver',front_passenger:'Front Pass.',rear_left:'Rear Left',rear_right:'Rear Right'};
const ICONS={adult:'👤',child:'🧒',pet:'🐾',unknown:'👤'};
const AICONS={none:'—',talking:'💬',shouting:'📢',crying:'😢',happy:'😊',barking:'🐕'};
const loadCol=function(v){return v<33?'#00d4b0':v<66?'#f6ad55':'#fc8181';};
const loadLbl=function(v){return v<20?'Nominal':v<40?'Low':v<66?'Medium':v<85?'High':'Critical';};
const fmt2=function(n){return n<10?'0'+n:''+n;};

/* human-readable issue names for infotainment */
var ISSUE_MAP={
  'crying in cabin':'High Cabin Noise',
  'barking in cabin':'Pet Disturbance',
  'animal in cabin':'Pet Disturbance',
  'shouting in cabin':'Cabin Noise Alert',
  'rattling object':'Loose Object',
  'speech activity':'Passenger Activity',
  'elevated heart rate':'Driver Distracted',
  'driver stressed':'Driver Distracted',
  'driver fatigued':'Driver Fatigue',
  'low arousal / fatigue':'Driver Fatigue',
  'rapid breathing':'Driver Stress',
  'drowsy eyes (camera)':'Driver Drowsiness',
  'stress expression (camera)':'Driver Distracted',
  'reduced visibility':'Reduced Visibility',
  'high speed':'High Speed Alert',
  'pothole / road shock (IMU)':'Road Discomfort',
  'rough road (IMU)':'Road Discomfort',
  'rough road ahead (IMU)':'Rough Road Ahead',
  'agitated child':'Passenger Disturbance',
  'agitated pet':'Pet Disturbance',
  'baby babbling in cabin':'Baby Active',
  'baby happy in cabin':'Baby Content'
};

/* IMU driving presets */
var IMU_PRESETS=[
  {id:'smooth', label:'Smooth Road',   q:'smooth',  rms:0.04},
  {id:'breaker',label:'Speed Breaker', q:'rough',   rms:0.38},
  {id:'pothole',label:'Pothole',       q:'pothole', rms:0.65},
  {id:'turn',   label:'Agg. Turn',     q:'rough',   rms:0.35},
  {id:'brake',  label:'Hard Braking',  q:'rough',   rms:0.45}
];

/* Road quality presets */
var RQ_PRESETS=[
  {id:'highway',       label:'Highway',          rms:0.04, q:'smooth'},
  {id:'city',          label:'City Road',         rms:0.14, q:'smooth'},
  {id:'broken',        label:'Broken Road',       rms:0.36, q:'rough'},
  {id:'construction',  label:'Construction Zone', rms:0.56, q:'pothole'},
  {id:'offroad',       label:'Offroad',           rms:0.78, q:'pothole'}
];

/* ── Clock ── */
function Clock(){
  const [t,setT]=useState('');
  useEffect(function(){
    var upd=function(){
      var d=new Date(),h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
      var ap=h>=12?'PM':'AM';h=h%12||12;
      setT(fmt2(h)+':'+fmt2(m)+':'+fmt2(s)+' '+ap);
    };
    upd();var id=setInterval(upd,1000);return function(){clearInterval(id);};
  },[]);
  return <span className="hmi-clock">{t}</span>;
}

/* ── WaveformCanvas: oscilloscope ── */
function WaveformCanvas({analyserRef}){
  const cvRef=useRef(null);
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var id;
    var draw=function(){
      var W=cv.clientWidth||340;var H=cv.clientHeight||44;
      if(W<2||H<2){id=requestAnimationFrame(draw);return;}
      if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
      ctx.fillStyle='#040a10';ctx.fillRect(0,0,W,H);
      var buf=new Uint8Array(analyserRef.current?analyserRef.current.fftSize:256);
      if(analyserRef.current)analyserRef.current.getByteTimeDomainData(buf);
      ctx.beginPath();ctx.strokeStyle='#00d4b0';ctx.lineWidth=1.5;
      var sl=W/buf.length;
      for(var i=0;i<buf.length;i++){
        var x=i*sl,y=((buf[i]/128)-1)*(H/2)+H/2;
        if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.stroke();
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[]);
  return <canvas ref={cvRef} style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ── SpectrogramCanvas: scrolling waterfall ── */
function SpectrogramCanvas({analyserRef}){
  const cvRef=useRef(null);
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var id;
    var draw=function(){
      var W=cv.clientWidth||340;var H=cv.clientHeight||80;
      if(W<2||H<2){id=requestAnimationFrame(draw);return;}
      if(cv.width!==W||cv.height!==H){
        cv.width=W;cv.height=H;
        ctx.fillStyle='#040a10';ctx.fillRect(0,0,W,H);
      }
      var img=ctx.getImageData(1,0,W-1,H);ctx.putImageData(img,0,0);
      var data=new Uint8Array(128);
      if(analyserRef.current)analyserRef.current.getByteFrequencyData(data);
      for(var i=0;i<H;i++){
        var bi=Math.floor((H-1-i)*data.length/H);
        var v=data[Math.min(bi,data.length-1)];
        var r=v>128?255:v*2;
        var g=v<128?v*2:Math.max(0,255-(v-128)*2);
        var b=v<64?v*4:0;
        ctx.fillStyle='rgb('+r+','+g+','+b+')';
        ctx.fillRect(W-1,i,1,1);
      }
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[]);
  return <canvas ref={cvRef} style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ── AudioWidget ── */
var AUDIO_FILES=[
  {id:'off',          label:'Audio Off'},
  {id:'mic',          label:'Live Mic'},
  {id:'baby_crying',  label:'baby_crying.mp3'},
  {id:'baby_talking', label:'baby_talking.mp3'},
  {id:'baby_happy',   label:'baby_happy.mp3'}
];
var AUDIO_SEAT_OPTS=[
  {id:'none',              label:'No seat'},
  {id:'driver',            label:'Driver'},
  {id:'front_passenger',   label:'Front P.'},
  {id:'rear_left',         label:'Rear L'},
  {id:'rear_right',        label:'Rear R'}
];
var AUDIO_KIND_OPTS=[{id:'child',label:'Baby'},{id:'pet',label:'Pet'}];
var _AUDIO_EVENT_MAP={baby_crying:'crying',baby_talking:'talking',baby_happy:'happy'};
var _AUDIO_DISTRESS={baby_crying:0.85,baby_talking:0.35,baby_happy:0.1};

function AudioWidget({ws,liveAudio,audio,send,playTrigger,stopTrigger}){
  const [audioMode,setAudioMode]=useState('off');
  const [seatTarget,setSeatTarget]=useState('none');
  const [kindTarget,setKindTarget]=useState('child');
  const [db,setDb]=useState(28);
  const [vad,setVad]=useState(false);
  const procRef=useRef(null);
  const ctxRef=useRef(null);
  const analyserRef=useRef(null);
  const dbTimerRef=useRef(null);
  const prevCfgRef=useRef(null);
  const audioModeRef=useRef('off');
  const seatTargetRef=useRef('none');
  const kindTargetRef=useRef('child');
  const SR=16000;

  /* reset the previously configured seat */
  var _clearSeat=function(){
    if(prevCfgRef.current&&send){
      send({cmd:'configure_seat',seat:prevCfgRef.current,audio_event:'none',distress:0});
    }
    prevCfgRef.current=null;
  };

  /* configure a seat with the current audio mode */
  var _applySeat=function(seat,kind,mode){
    if(!seat||seat==='none'||!send)return;
    var audioEvent=_AUDIO_EVENT_MAP[mode]||'none';
    var distress=_AUDIO_DISTRESS[mode]||0;
    send({cmd:'configure_seat',seat:seat,occupied:true,kind:kind,
          audio_event:audioEvent,distress:distress});
    prevCfgRef.current=seat;
  };

  var stopAudio=function(){
    clearInterval(dbTimerRef.current);
    analyserRef.current=null;
    if(procRef.current){
      if(procRef.current.stream)
        procRef.current.stream.getTracks().forEach(function(t){t.stop();});
      if(procRef.current.bufSrc)
        try{procRef.current.bufSrc.stop();}catch(e){}
    }
    if(ctxRef.current){ctxRef.current.close();ctxRef.current=null;}
    procRef.current=null;setDb(28);setVad(false);
  };

  var _setupContext=async function(){
    var actx=new AudioContext({sampleRate:SR});
    ctxRef.current=actx;
    var an=actx.createAnalyser();an.fftSize=512;an.smoothingTimeConstant=0.6;
    analyserRef.current=an;
    await actx.audioWorklet.addModule(window._CHUNKER_URL);
    var chunker=new AudioWorkletNode(actx,'chunker');
    chunker.port.onmessage=function(e){
      if(ws.current&&ws.current.readyState===1)
        ws.current.send(JSON.stringify({cmd:'audio_chunk',data:Array.from(e.data)}));
    };
    var tdata=new Uint8Array(an.fftSize);
    dbTimerRef.current=setInterval(function(){
      if(!analyserRef.current)return;
      analyserRef.current.getByteTimeDomainData(tdata);
      var rms=0;
      for(var i=0;i<tdata.length;i++){var s=(tdata[i]-128)/128;rms+=s*s;}
      rms=Math.sqrt(rms/tdata.length);
      var dbVal=rms>0?Math.round(20*Math.log10(rms)+90):28;
      setDb(Math.max(28,Math.min(110,dbVal)));setVad(dbVal>45);
    },80);
    return {actx,an,chunker};
  };

  var startMic=async function(){
    try{
      var st=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:SR,channelCount:1}});
      var {actx,an,chunker}=await _setupContext();
      var src=actx.createMediaStreamSource(st);
      src.connect(an);src.connect(chunker);
      procRef.current={stream:st,src};
    }catch(e){alert('Mic denied: '+e.message);setAudioMode('off');}
  };

  var startFile=async function(filename){
    try{
      var resp=await fetch('/static/audio/'+filename+'.mp3');
      var arrayBuf=await resp.arrayBuffer();
      var {actx,an,chunker}=await _setupContext();
      var audioBuf=await actx.decodeAudioData(arrayBuf);
      var bufSrc=actx.createBufferSource();
      bufSrc.buffer=audioBuf;bufSrc.loop=true;
      bufSrc.connect(an);bufSrc.connect(chunker);
      bufSrc.start();
      procRef.current={bufSrc};
    }catch(e){console.error('Audio file error:',e);setAudioMode('off');}
  };

  var handleMode=function(newMode){
    _clearSeat();
    stopAudio();
    setAudioMode(newMode);audioModeRef.current=newMode;
    if(newMode==='mic')startMic();
    else if(newMode!=='off'){
      startFile(newMode);
      _applySeat(seatTargetRef.current,kindTargetRef.current,newMode);
    }
  };

  var handleSeat=function(newSeat){
    _clearSeat();
    setSeatTarget(newSeat);seatTargetRef.current=newSeat;
    if(audioModeRef.current!=='off'&&audioModeRef.current!=='mic')
      _applySeat(newSeat,kindTargetRef.current,audioModeRef.current);
  };

  var handleKind=function(newKind){
    setKindTarget(newKind);kindTargetRef.current=newKind;
    if(audioModeRef.current!=='off'&&audioModeRef.current!=='mic'&&seatTargetRef.current!=='none')
      _applySeat(seatTargetRef.current,newKind,audioModeRef.current);
  };

  useEffect(function(){return function(){_clearSeat();stopAudio();};},[]);
  useEffect(function(){
    if((playTrigger||0)>0){
      var m=audioModeRef.current;
      if(m&&m!=='off'){
        stopAudio();
        if(m==='mic')startMic();
        else{startFile(m);_applySeat(seatTargetRef.current,kindTargetRef.current,m);}
      }
    }
  },[playTrigger]);
  useEffect(function(){if((stopTrigger||0)>0){_clearSeat();stopAudio();}},[stopTrigger]);

  var aud=audio||{};
  var audActive=aud.label&&aud.label!=='none';
  var isFile=audioMode!=='off'&&audioMode!=='mic';
  var dbPct=Math.min(100,((db-28)/82)*100);
  var dbCol=db>75?'#fc8181':db>55?'#f6ad55':'#00d4b0';

  return (
    <div className="panel" style={{gap:0}}>
      {/* Header row: title + file dropdown */}
      <div className="ph">
        <span className="pt">Audio Input</span>
        <select value={audioMode} onChange={function(e){handleMode(e.target.value);}}
          style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(255,255,255,.15)',
            color:'rgba(255,255,255,.85)',borderRadius:4,padding:'2px 6px',
            fontSize:10,cursor:'pointer',maxWidth:160}}>
          {AUDIO_FILES.filter(function(f){return f.id!=='mic'||liveAudio;}).map(function(f){
            return <option key={f.id} value={f.id}>{f.label}</option>;
          })}
        </select>
      </div>
      {/* Seat + type selector — only when a file is playing */}
      {isFile&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6,flexShrink:0,alignItems:'center'}}>
          <span style={{fontSize:9,color:'rgba(255,255,255,.5)'}}>Seat:</span>
          {AUDIO_SEAT_OPTS.map(function(o){
            var active=seatTarget===o.id;
            return (
              <button key={o.id} onClick={function(){handleSeat(o.id);}}
                style={{padding:'2px 7px',fontSize:9,borderRadius:3,cursor:'pointer',border:'none',
                  background:active?'rgba(0,212,176,.25)':'rgba(255,255,255,.07)',
                  color:active?'#00d4b0':'rgba(255,255,255,.65)',
                  outline:active?'1px solid #00d4b0':'none'}}>
                {o.label}
              </button>
            );
          })}
          <span style={{fontSize:9,color:'rgba(255,255,255,.5)',marginLeft:4}}>As:</span>
          {AUDIO_KIND_OPTS.map(function(o){
            var active=kindTarget===o.id;
            return (
              <button key={o.id} onClick={function(){handleKind(o.id);}}
                style={{padding:'2px 7px',fontSize:9,borderRadius:3,cursor:'pointer',border:'none',
                  background:active?'rgba(246,173,85,.25)':'rgba(255,255,255,.07)',
                  color:active?'#f6ad55':'rgba(255,255,255,.65)',
                  outline:active?'1px solid #f6ad55':'none'}}>
                {o.label}
              </button>
            );
          })}
        </div>
      )}
      {/* dB meter */}
      <div className="row" style={{marginBottom:6,flexShrink:0}}>
        <span className="vad-dot" style={{background:vad?'#00d4b0':'#1c2740',
          boxShadow:vad?'0 0 6px rgba(0,212,176,.6)':'none'}}/>
        <span style={{fontSize:9,color:vad?'#00d4b0':'#2a3a50',marginRight:6}}>
          {vad?'Voice Active':'Quiet'}
        </span>
        <span className="noise-bar" style={{flex:1}}>
          <span className="noise-fill" style={{display:'block',width:dbPct+'%',background:dbCol}}/>
        </span>
        <span style={{fontSize:22,fontWeight:700,color:dbCol,marginLeft:8,minWidth:56,
          fontVariantNumeric:'tabular-nums',lineHeight:1}}>{db}</span>
        <span style={{fontSize:10,color:'rgba(255,255,255,.8)',alignSelf:'flex-end',marginBottom:2}}>dB</span>
      </div>
      {/* Waveform 25% / Spectrogram 75% */}
      <div className="canvas-wrap" style={{flex:1,minHeight:0,marginBottom:4}}>
        <WaveformCanvas analyserRef={analyserRef}/>
      </div>
      <div className="canvas-wrap" style={{flex:3,minHeight:0}}>
        <SpectrogramCanvas analyserRef={analyserRef}/>
      </div>
      {/* Status + detection */}
      {isFile&&seatTarget!=='none'&&(
        <div style={{fontSize:9,color:'#f6ad55',marginTop:4,flexShrink:0}}>
          {ICONS[kindTarget]||'👤'} {kindTarget==='child'?'Baby':'Pet'} in {seatTarget.replace(/_/g,' ')} — {audioMode.replace('baby_','')}.mp3
        </div>
      )}
      {audActive&&(
        <div className="det-badge" style={{marginTop:4}}>
          {AICONS[aud.label]||''} {aud.label} · {Math.round((aud.confidence||0)*100)}% conf
        </div>
      )}
    </div>
  );
}

/* ── VideoWidget ── */
var SYNTH_CLIPS=[
  {id:'off',          label:'Camera Off'},
  {id:'default_video',label:'Default Video (video_1.mp4)'},
  {id:'live',         label:'Live Camera'}
];

function VideoWidget({ws,liveVision,visionDriver,send,playTrigger,stopTrigger}){
  const [mode,setMode]=useState('off');
  const vRef=useRef(null);
  const camRef=useRef(null);  /* {interval, canvas, ctx, stream} */
  const synthRef=useRef(null); /* {audio, interval} */
  const modeRef=useRef('off');

  /* ── helpers ── */
  var wsSend=function(msg){
    if(ws.current&&ws.current.readyState===1)
      ws.current.send(JSON.stringify(msg));
  };

  var stopAll=function(){
    if(camRef.current){
      clearInterval(camRef.current.interval);
      if(camRef.current.stream)
        camRef.current.stream.getTracks().forEach(function(t){t.stop();});
      camRef.current=null;
    }
    if(synthRef.current){
      clearInterval(synthRef.current.interval);
      if(synthRef.current.audio){
        synthRef.current.audio.pause();
        synthRef.current.audio.src='';
      }
      synthRef.current=null;
    }
    if(vRef.current){vRef.current.srcObject=null;vRef.current.src='';}
  };

  var startLive=async function(){
    try{
      var st=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240}});
      vRef.current.srcObject=st;await vRef.current.play();
      var cv2=document.createElement('canvas');cv2.width=320;cv2.height=240;
      var c2=cv2.getContext('2d');
      /* throttle to 500 ms; guard against null ref after unmount */
      var interval=setInterval(function(){
        var v=vRef.current;
        if(!v||!v.videoWidth)return;
        try{
          c2.drawImage(v,0,0,320,240);
          var b64=cv2.toDataURL('image/jpeg',.7).split(',')[1];
          wsSend({cmd:'vision_frame',data:b64});
        }catch(e){/* frame skipped */}
      },500);
      camRef.current={interval,canvas:cv2,ctx:c2,stream:st};
    }catch(e){alert('Camera denied: '+e.message);setMode('off');}
  };

  var startSynth=function(clipId){
    /* Draw a simple synthetic cabin on canvas + loop audio */
    var cv2=document.createElement('canvas');cv2.width=320;cv2.height=240;
    var c2=cv2.getContext('2d');
    var draw=function(){
      c2.fillStyle='#0c1420';c2.fillRect(0,0,320,240);
      /* seats outline */
      [[80,80],[240,80],[80,160],[240,160]].forEach(function(p,i){
        c2.strokeStyle='#1c2740';c2.lineWidth=2;
        c2.strokeRect(p[0]-35,p[1]-35,70,70);
        if(i===2){/* rear-left: baby */
          c2.fillStyle='rgba(0,212,176,.15)';c2.fillRect(p[0]-35,p[1]-35,70,70);
          c2.font='32px serif';c2.textAlign='center';c2.fillStyle='#fff';
          var icons={baby_crying:'😢',baby_talking:'👶',baby_happy:'😊'};
          c2.fillText(icons[clipId]||'👶',p[0],p[1]+12);
        }
      });
      c2.fillStyle='rgba(0,212,176,.6)';c2.font='10px monospace';
      c2.textAlign='left';c2.fillText('SYNTHETIC FEED — '+clipId,8,230);
    };
    draw();
    var interval=setInterval(function(){
      draw();
      var b64=cv2.toDataURL('image/jpeg',.7).split(',')[1];
      wsSend({cmd:'vision_frame',data:b64});
    },1000); /* 1 fps for synthetic — Qwen doesn't need fast updates */

    /* Play audio via <audio> element + Web Audio chain for BabyNet */
    var audio=new Audio('/static/audio/'+clipId+'.mp3');
    audio.loop=true;
    audio.play().catch(function(){});

    synthRef.current={interval,audio};

    /* Show the synthetic canvas in the video box */
    if(vRef.current){
      try{var s=cv2.captureStream(1);vRef.current.srcObject=s;vRef.current.play().catch(function(){});}
      catch(e){/* captureStream not supported — just skip video preview */}
    }
  };

  var startDefaultVideo=function(){
    /* Play video_1.mp4 in the <video> element, capture frames for Qwen */
    var vid=vRef.current;
    if(!vid)return;
    vid.src='/static/video_1.mp4';
    vid.loop=true;
    vid.muted=true;
    vid.playsInline=true;
    vid.play().catch(function(e){console.warn('video play:',e);});
    var cv2=document.createElement('canvas');cv2.width=320;cv2.height=240;
    var c2=cv2.getContext('2d');
    var interval=setInterval(function(){
      var v=vRef.current;
      if(!v||!v.videoWidth||v.readyState<2)return;
      try{
        c2.drawImage(v,0,0,320,240);
        var b64=cv2.toDataURL('image/jpeg',.7).split(',')[1];
        wsSend({cmd:'vision_frame',data:b64});
      }catch(e){/* frame skipped */}
    },1000); /* 1 fps — enough for Qwen scene analysis */
    camRef.current={interval,canvas:cv2,ctx:c2,stream:null};
  };

  var handleMode=function(newMode){
    stopAll();
    if(vRef.current)vRef.current.src='';
    setMode(newMode);modeRef.current=newMode;
    if(newMode==='live')startLive();
    else if(newMode==='default_video')startDefaultVideo();
    else if(newMode.startsWith('baby_'))startSynth(newMode);
  };

  useEffect(function(){return stopAll;},[]);
  useEffect(function(){
    if((playTrigger||0)>0){
      var m=modeRef.current;
      if(m&&m!=='off'){stopAll();if(m==='live')startLive();else if(m==='default_video')startDefaultVideo();else if(m.startsWith('baby_'))startSynth(m);}
    }
  },[playTrigger]);
  useEffect(function(){if((stopTrigger||0)>0)stopAll();},[stopTrigger]);

  var vd=visionDriver||{};
  var isDefault=mode==='default_video';
  return (
    <div className="panel">
      <div className="ph">
        <span className="pt">Cabin Video Feed</span>
        <select value={mode} onChange={function(e){handleMode(e.target.value);}
        } style={{background:'rgba(0,0,0,.5)',border:'1px solid rgba(255,255,255,.15)',
          color:'rgba(255,255,255,.85)',borderRadius:4,padding:'2px 6px',fontSize:10,cursor:'pointer'}}>
          {SYNTH_CLIPS.filter(function(c){return c.id!=='live'||liveVision;}).map(function(c){
            return <option key={c.id} value={c.id}>{c.label}</option>;
          })}
        </select>
      </div>
      <div className="vid-box" style={{position:'relative'}}>
        {mode==='off'&&<span style={{color:'rgba(255,255,255,.5)'}}>Select feed above</span>}
        <video ref={vRef} muted playsInline
          style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:5,
            display:(mode!=='off')?'block':'none'}}/>
        {isDefault&&(
          <div style={{position:'absolute',bottom:6,left:6,fontSize:9,
            color:'#f6ad55',background:'rgba(0,0,0,.6)',padding:'2px 6px',borderRadius:3}}>
            DEFAULT VIDEO
          </div>
        )}
      </div>
      {vd.face_detected&&(
        <div style={{display:'flex',gap:10,marginTop:5,fontSize:10,flexShrink:0}}>
          <span style={{color:'rgba(255,255,255,.8)'}}>Driver emotion:</span>
          <span style={{color:vd.drowsy?'#fc8181':'#00d4b0',fontWeight:600}}>
            {vd.emotion}{vd.drowsy?' ⚠ Drowsy':''}
          </span>
        </div>
      )}
    </div>
  );
}

/* ── SeatWidget ── */
function SeatWidget({seatConfigs,onSelect}){
  return (
    <div className="panel">
      <div className="ph">
        <span className="pt">Seat Status</span>
        <span className="ps">tap to configure</span>
      </div>
      <div className="seat-grid">
        {SEAT_IDS.map(function(sid){

}

/* ── VehicleWidget ── */

              }}/>
            <span className="val">{visSlider}%</span>

        </div>
        <div className="divider"/>
        {/* Traffic Density */}

          <div className="lbl" style={{marginBottom:4}}>Traffic Density</div>

              </button>;

          </div>
        </div>
        <div className="divider"/>
        {/* Weather */}
        <div>
          <div className="lbl" style={{marginBottom:4}}>Weather</div>
          <div className="btn-row">
            {[['Sunny','good'],['Rain','rain'],['Fog','fog'],['Night','low']].map(function(pair){
              return <button key={pair[0]}
                className={'btn'+(weather===pair[0].toLowerCase()?' on':'')}
                onClick={function(){
                  setWeather(pair[0].toLowerCase());
                  send({cmd:'configure_vehicle',visibility:pair[1]});
                }}>
                {pair[0]}
              </button>;
            })}

        </div>

    </div>

/* ── IMUWidget ── */
function IMUWidget({vibState,send}){
  var [ax,setAx]=useState(0);
  var [ay,setAy]=useState(0);
  var [az,setAz]=useState(9.81);
  var [roll,setRoll]=useState(0);
  var [pitch,setPitch]=useState(0);
  var [yaw,setYaw]=useState(0);
  var [preset,setPreset]=useState('smooth');

  var sendVib=function(q,rms){
    send({cmd:'configure_vibration',override:true,road_quality:q,rms:rms});
  };

  return (
    <div className="panel">
      <div className="ph"><span className="pt">IMU Signals</span>
        {vibState&&vibState.override&&<span className="ps" style={{color:'#f6ad55'}}>override</span>}
      </div>
      <div className="pb" style={{overflowY:'auto'}}>
        {/* Acceleration */}
        <div>
          <div className="lbl" style={{marginBottom:4}}>Acceleration</div>
          {[['X (Lateral)',ax,setAx,-5,5],['Y (Longitudinal)',ay,setAy,-5,5],
            ['Z (Vertical)',az,setAz,8,12]].map(function(r){
            return (
              <div key={r[0]} className="row" style={{marginBottom:4}}>
                <span style={{fontSize:9,color:'rgba(255,255,255,.8)',width:72,flexShrink:0}}>{r[0]}</span>
                <input type="range" min={r[3]} max={r[4]} step="0.1"
                  value={r[1]}
                  onChange={function(e){
                    var v=parseFloat(e.target.value);
                    r[2](v);
                    if(r[0].indexOf('Z')>=0){
                      var rms=Math.max(0,Math.abs(v-9.81)-0.05);
                      var q=rms>0.5?'pothole':rms>0.15?'rough':'smooth';
                      sendVib(q,Math.min(0.9,rms));
                    }
                  }}/>
                <span className="val" style={{minWidth:34}}>{r[1].toFixed(1)}g</span>
              </div>
            );
          })}
        </div>
        <div className="divider"/>
        {/* Orientation */}
        <div>
          <div className="lbl" style={{marginBottom:4}}>Orientation</div>
          {[['Roll',roll,setRoll,-45,45],['Pitch',pitch,setPitch,-30,30],['Yaw',yaw,setYaw,-180,180]].map(function(r){
            return (
              <div key={r[0]} className="row" style={{marginBottom:4}}>
                <span style={{fontSize:9,color:'rgba(255,255,255,.8)',width:32,flexShrink:0}}>{r[0]}</span>
                <input type="range" min={r[3]} max={r[4]} step="1" value={r[1]}
                  onChange={function(e){r[2](parseInt(e.target.value));}}/>
                <span className="val" style={{minWidth:36}}>{r[1]}°</span>
              </div>
            );
          })}
        </div>
        <div className="divider"/>
        {/* Driving Condition */}
        <div>
          <div className="lbl" style={{marginBottom:4}}>Driving Condition</div>
          <div className="btn-row">
            {IMU_PRESETS.map(function(p){
              return <button key={p.id} className={'btn'+(preset===p.id?' warn':'')}
                onClick={function(){
                  setPreset(p.id);
                  setAz(p.id==='pothole'?11.2:p.id==='breaker'?10.5:9.81);
                  setAy(p.id==='brake'?-4:p.id==='breaker'?-2:0);
                  setAx(p.id==='turn'?3.5:0);
                  sendVib(p.q,p.rms);
                }}>
                {p.label}
              </button>;
            })}
            <button className={'btn'+(preset==='replay'?' on':'')}
              onClick={function(){setPreset('replay');send({cmd:'configure_vibration',override:false});}}>
              CSV Replay
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── RoadQualityWidget ── */
function RoadQualityWidget({vib,send}){
  const cvRef=useRef(null);
  const histRef=useRef([]);
  const [roughness,setRoughness]=useState(5);
  const [rqPreset,setRqPreset]=useState('highway');

  useEffect(function(){
    var rms=(vib&&vib.rms_z)||0;
    histRef.current.push(rms);
    if(histRef.current.length>100)histRef.current.shift();
  });

  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var W=cv.width,H=cv.height,id;
    var draw=function(){
      ctx.fillStyle='#040a10';ctx.fillRect(0,0,W,H);
      var h=histRef.current;
      if(h.length>1){
        ctx.beginPath();ctx.strokeStyle='#00d4b0';ctx.lineWidth=1.5;
        for(var i=0;i<h.length;i++){
          var x=(i/(h.length-1))*W,y=H-(h[i]/0.9)*(H-4)-2;
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.beginPath();ctx.strokeStyle='rgba(246,173,85,.25)';ctx.lineWidth=1;
        ctx.setLineDash([3,3]);var ty=H-(0.18/0.9)*(H-4)-2;
        ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();ctx.setLineDash([]);
      }
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[]);

  var q=(vib&&vib.road_quality)||'smooth';
  var qCol={smooth:'#00d4b0',rough:'#f6ad55',pothole:'#fc8181'};
  var rms=(vib&&vib.rms_z)||0;
  var wPct=Math.min(100,(rms/0.9)*100);
  /* wheel heatmap: 4 wheels, z-axis affects all, x lateral affects LR, y longitudinal affects front/rear */
  var wheels={fl:wPct,fr:wPct,rl:wPct*0.9,rr:wPct*0.9};
  var wCol=function(p){return p>65?'#fc8181':p>30?'#f6ad55':'#2a3f5a';};
  return (
    <div className="panel">
      <div className="ph">
        <span className="pt">Road Quality</span>
        <span style={{fontSize:13,fontWeight:700,color:qCol[q]||'#d4dce8'}}>{q}</span>
      </div>
      {/* RMS chart */}
      <div className="canvas-wrap" style={{marginBottom:6}}>
        <canvas ref={cvRef} width="280" height="46" style={{width:'100%',height:'46px',display:'block'}}/>
      </div>
      {/* Wheel vibration heatmap */}
      <div style={{flexShrink:0,marginBottom:6}}>
        <div style={{fontSize:9,color:'rgba(255,255,255,.8)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.7px'}}>Wheel Vibration</div>
        <div className="wheel-map">
          {[['FL',wheels.fl],['FR',wheels.fr],['RL',wheels.rl],['RR',wheels.rr]].map(function(w){
            return <div key={w[0]} className="wheel"
              style={{background:wCol(w[1])+'22',border:'1px solid '+wCol(w[1]),color:wCol(w[1])}}>
              {w[0]} {Math.round(w[1])}%
            </div>;
          })}
        </div>
      </div>
      <div className="divider"/>
      {/* Roughness slider */}
      <div style={{flexShrink:0,marginBottom:6}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
          <span className="lbl">Road Roughness</span>
          <span style={{fontSize:11,fontWeight:600,color:loadCol(roughness)}}>{roughness}</span>
        </div>
        <input type="range" min="0" max="100" step="1" value={roughness}
          style={{width:'100%'}}
          onChange={function(e){
            var v=parseInt(e.target.value);setRqPreset('');setRoughness(v);
            var r=v/100*0.9;var qq=r>0.5?'pothole':r>0.15?'rough':'smooth';
            send({cmd:'configure_vibration',override:true,road_quality:qq,rms:parseFloat(r.toFixed(2))});
          }}/>
      </div>
      {/* Road presets */}
      <div style={{flexShrink:0}}>
        <div className="lbl" style={{marginBottom:4}}>Presets</div>
        <div className="btn-row">
          {RQ_PRESETS.map(function(p){
            return <button key={p.id} className={'btn'+(rqPreset===p.id?' on':'')}
              onClick={function(){
                setRqPreset(p.id);setRoughness(Math.round(p.rms/0.9*100));
                send({cmd:'configure_vibration',override:true,road_quality:p.q,rms:p.rms});
              }}>
              {p.label}
            </button>;
          })}
          <button className={'btn'+(rqPreset==='csv'?' on':'')}
            onClick={function(){setRqPreset('csv');send({cmd:'configure_vibration',override:false});}}>
            CSV
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── IssuePanel ── */
function IssuePanel({state}){
  var load=state.cognitive_load||0;
  var factors=state.factors||[];
  var rawFactor=factors[0]||null;
  var issueName=rawFactor?(ISSUE_MAP[rawFactor]||rawFactor.replace(/\(.*\)/g,'').trim()||'Disturbance Detected'):'No Issues Detected';
  var col=loadCol(load);
  var conf=load>0?Math.min(99,Math.round(load*0.9+5)):0;

  const detRef=useRef(null);
  const [dur,setDur]=useState(0);
  var above=load>20;
  useEffect(function(){
    if(above){
      if(!detRef.current)detRef.current=new Date();
      var id=setInterval(function(){
        if(detRef.current)
          setDur(Math.round((Date.now()-detRef.current.getTime())/1000));
      },1000);
      return function(){clearInterval(id);};
    }
    detRef.current=null;setDur(0);
  },[above]);

  var detTime=detRef.current
    ?detRef.current.toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit',second:'2-digit'})
    :'—';
  var durStr=dur>0?dur+'s':'0s';

  return (
    <div>
      <div className="iss-lbl">Issue / Distract</div>
      <div className="iss-name">{issueName}</div>
      <div className="iss-conf" style={{color:col}}>{conf}%</div>
      <div className="iss-clbl">Confidence</div>
      <div className="iss-meta">
        <div className="iss-row">
          <span className="iss-k">Detected In</span>
          <span className="iss-v">{detTime}</span>
        </div>
        <div className="iss-row">
          <span className="iss-k">Duration</span>
          <span className="iss-v">{durStr}</span>
        </div>
      </div>
    </div>
  );
}

/* ── CircularGauge ── */
function CircularGauge({value}){
  var R=95,CX=110,CY=110;
  var circ=Math.round(2*Math.PI*R);
  var filled=Math.round((value/100)*circ);
  var col=loadCol(value);
  return (
    <div className="gauge-sec">
      <div className="gauge-ttl">Cognitive Load Score</div>
      <svg width="150" height="150" viewBox="0 0 220 220" style={{maxWidth:'100%',maxHeight:'25vh'}}>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke="#1a2535" strokeWidth="14"/>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke={col} strokeWidth="14"
          strokeDasharray={filled+' '+circ} strokeLinecap="round"
          transform={'rotate(-90 '+CX+' '+CY+')'}/>
        <text x={CX} y={CY+8} textAnchor="middle" fill={col}
          fontSize="58" fontWeight="700" fontFamily="inherit">{value}</text>
        <text x={CX} y={CY+34} textAnchor="middle" fill={col}
          fontSize="13" fontFamily="inherit" opacity="0.7">/ 100</text>
      </svg>
      <div className="gauge-lbl" style={{color:col,fontSize:18}}>{loadLbl(value)}</div>
    </div>
  );
}

      'Passenger content':'Maintain Cabin Comfort'
    };
    return map[t]||t;
  };

  return (
    <div>
      <div className="rec-ttl">Recommendation</div>
      <div className="rec-list">
        {vis.length===0&&<div className="rec-empty">All systems nominal.</div>}
        {vis.slice(0,4).map(function(m,i){
          var sc={active:'#00d4b0',proposed:'#f6ad55',critical:'#fc8181'};
          return (
            <div key={m.id} className="rec-item">
              <div className="rec-num" style={{
                background:m.severity==='critical'?'rgba(252,129,129,.12)':'rgba(0,212,176,.1)',
                borderColor:m.severity==='critical'?'#fc8181':'rgba(0,212,176,.3)',
                color:m.severity==='critical'?'#fc8181':'#00d4b0'
              }}>{i+1}</div>
              <div>
                <div className="rec-text">{friendlyTitle(m.title)}</div>
                <div className="rec-detail">{m.usecase}</div>
              </div>
            </div>
          );
        })}
      </div>
      <button className="apply-btn" disabled={proposed.length===0}
        onClick={function(){proposed.forEach(function(m){send({cmd:'confirm',id:m.id});});}}>
        Apply Recommendation
      </button>
      {vis.length>0&&(
        <button className="dismiss-btn"
          onClick={function(){vis.forEach(function(m){send({cmd:'dismiss',id:m.id});});}}>
          Dismiss All
        </button>
      )}
    </div>
  );
}

/* ── OccupantList — reusable ── */
function OccupantList({seatConfigs}){
  var occupied=SEAT_IDS.filter(function(sid){
    var c=(seatConfigs&&seatConfigs[sid])||{};return c.occupied;
  });
  if(occupied.length===0)
    return <div style={{fontSize:10,color:'rgba(255,255,255,.35)',textAlign:'center',marginTop:8}}>No occupants</div>;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:5,width:'100%',marginTop:10}}>
      {occupied.map(function(sid){
        var c=(seatConfigs&&seatConfigs[sid])||{};
        var d=c.distress||0;
        var col=d>0.7?'#fc8181':d>0.35?'#f6ad55':'#00d4b0';
        return (
          <div key={sid} style={{display:'flex',alignItems:'center',gap:7,
            background:'rgba(255,255,255,.04)',borderRadius:5,padding:'5px 8px',
            border:'1px solid rgba(255,255,255,.08)'}}>
            <span style={{color:col,fontSize:13}}>{ICONS[c.kind]||'👤'}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:8,color:'rgba(255,255,255,.6)',textTransform:'uppercase',letterSpacing:'.5px'}}>{SEAT_LABELS[sid]}</div>
              <div style={{fontSize:10,color:col,fontWeight:600,marginTop:1}}>
                {c.audio_event&&c.audio_event!=='none'
                  ?(AICONS[c.audio_event]+' '+c.audio_event)
                  :(c.emotion||'calm')}
              </div>
            </div>
            <span style={{fontSize:11,color:c.buckled?'#00d4b0':'#fc8181',fontWeight:700,flexShrink:0}}>
              {c.buckled?'✓':'✗'}
            </span>
          </div>
        );
      })}
    </div>
  );
}

/* ── InfotainmentView (Tab 2) — 4 equal columns, single row ── */
function InfotainmentView({state,send}){
  var load=state.cognitive_load||0;
  var factors=state.factors||[];
  return (
    <div className="iv">
      {/* Col 1: Vehicle Cabin — centered */}
      <div className="iv-col iv-cabin">
        <div style={{fontSize:7,textTransform:'uppercase',letterSpacing:'1.5px',
          color:'#ffffff',fontWeight:600,marginBottom:10,textAlign:'center'}}>Vehicle Cabin</div>
        <CabinSVG seatConfigs={state.seat_configs} factors={factors}/>
      </div>
      {/* Col 2: Issue / Distract */}
      <div className="iv-col iv-issue">
        <IssuePanel state={state}/>
      </div>
      {/* Col 3: Load Score + Occupant Status — centered as a unit */}
      <div className="iv-col iv-gauge">
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:'100%'}}>
          <CircularGauge value={load}/>
          <div style={{width:'100%',marginTop:12}}>
            <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'1.2px',
              color:'#ffffff',fontWeight:600,marginBottom:8,textAlign:'center'}}>Cabin Status</div>
            <OccupantList seatConfigs={state.seat_configs}/>
          </div>
        </div>
      </div>
      {/* Col 4: Recommendation */}
      <div className="iv-col iv-rec">
        <RecommendationPanel mitigations={state.mitigations} send={send}/>
      </div>
    </div>
  );
}

/* ── BrandBar ── */
function BrandBar(){
  return (
    <div className="brand-bar">
      {/* JLR logo */}
      <div className="jag-side">
        <img src="/static/jlr.png" alt="Jaguar Land Rover"
          style={{height:36,objectFit:'contain',filter:'invert(1)',mixBlendMode:'screen',opacity:.95}}/>
      </div>
      {/* Separator */}
      <div className="brand-sep"/>
      {/* CabinSense side */}
      <div className="cs-side">
        <div className="cs-name"><em>Cabin</em>Sense</div>
        <div className="cs-sub">In-Cabin Intelligence</div>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const INIT={
    cognitive_load:0,factors:[],radar:{},audio:{},vehicle:{},mitigations:[],
    scenario:'idle',demo_running:false,latency_ms:0,
    seat_configs:{
      driver:{occupied:true,kind:'adult',buckled:true,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      front_passenger:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      rear_left:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      rear_right:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
    },
    driver_emotion:'calm',vib_override:false,vib_road_quality:'smooth',vib_rms:0.05,
    world_speed_kmh:60,world_visibility:'good',world_pothole_ahead_m:null,
    vision_driver:null,vision_objects:null,vibration:{},
  };
  const [state,setState]=useState(INIT);
  const [conn,setConn]=useState(false);
  const [scenarios,setScenarios]=useState([]);
  const [liveAudio,setLiveAudio]=useState(false);
  const [liveVision,setLiveVision]=useState(false);
  const [tab,setTab]=useState('sensor');
  const [selSeat,setSelSeat]=useState(null);
  const [demoTrigger,setDemoTrigger]=useState(0);
  const [demoStopTrigger,setDemoStopTrigger]=useState(0);
  const [localDemoRunning,setLocalDemoRunning]=useState(false);
  const ws=useRef(null);

  var onDemoToggle=useCallback(function(running){
    setLocalDemoRunning(running);
    if(running){
      setDemoTrigger(function(t){return t+1;});
      setTab('info');
    } else {
      setDemoStopTrigger(function(t){return t+1;});
    }
  },[]);

  useEffect(function(){
    fetch('/api/scenarios').then(function(r){return r.json();})
      .then(function(d){setScenarios(d.scenarios||[]);}).catch(function(){});
    fetch('/api/caps').then(function(r){return r.json();})
      .then(function(d){setLiveAudio(d.live_audio);setLiveVision(d.live_vision);}).catch(function(){});
    var proto=location.protocol==='https:'?'wss:':'ws:';
    var sock=new WebSocket(proto+'//'+location.host+'/ws');
    ws.current=sock;
    sock.onopen=function(){setConn(true);};
    sock.onclose=function(){setConn(false);};
    sock.onmessage=function(e){setState(JSON.parse(e.data));};
    return function(){sock.close();};
  },[]);

  const send=useCallback(function(msg){
    if(ws.current&&ws.current.readyState===1)ws.current.send(JSON.stringify(msg));
  },[]);

  return (
    <div className="hmi">
      {/* Slim utility bar — just clock + conn */}
      <div className="hmi-hdr">
        <div className="sp"/>
        <Clock/>
        <div className={'dot'+(conn?' on':'')}/>
        <span className="lat">{state.latency_ms}ms</span>
      </div>
      <div className="hmi-content">
        {tab==='sensor'&&(
          <div className="view iv-shell">
            <BrandBar/>
            <SensorView state={state} send={send} ws={ws}
              liveAudio={liveAudio} liveVision={liveVision}
              scenarios={scenarios} onSelectSeat={setSelSeat}
              playTrigger={demoTrigger} stopTrigger={demoStopTrigger}
              onDemoToggle={onDemoToggle} localDemoRunning={localDemoRunning}/>
          </div>
        )}
        {tab==='info'&&(
          <div className="view iv-shell">
            <BrandBar/>
            <InfotainmentView state={state} send={send}/>
          </div>
        )}
      </div>
      <div className="hmi-tabs">
        <button className={'tab'+(tab==='sensor'?' on':'')} onClick={function(){setTab('sensor');}}>
          Sensor Simulation &amp; Replay
        </button>
        <button className={'tab'+(tab==='info'?' on':'')} onClick={function(){setTab('info');}}>
          Infotainment View
        </button>
      </div>
      {selSeat&&(
        <SeatConfigOverlay seatId={selSeat}
          config={state.seat_configs&&state.seat_configs[selSeat]}
          send={send} onClose={function(){setSelSeat(null);}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
