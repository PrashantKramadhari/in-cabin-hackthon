/* ── Pipeline debug visualizations ── */
var DBG_MODEL_NAMES={
  clap_zs:'CLAP zero-shot · laion/clap-htsat-fused',
  baby_net:'BabyNet CNN',
  ast:'AST AudioSet transformer',
  synthetic:'Synthetic (world/scenario)',
  qwen2vl:'Qwen2-VL-2B-Instruct',
  qwen2vl_cpu:'Qwen2-VL-2B-Instruct (CPU)',
  qwen2vl_gpu:'Qwen2-VL-2B-Instruct (GPU 4-bit)',
  mediapipe:'MediaPipe Face + YOLOv8n',
  mediapipe_yolo:'MediaPipe Face + YOLOv8n localization',
  yunet_hsemotion_yolo:'YuNet + HSEmotion + YOLOv8n',
  none:'not loaded'
};

var SEAT_DBG_RECTS={
  driver:{x:.06,y:.12,w:.26,h:.40},
  front_passenger:{x:.68,y:.12,w:.26,h:.40},
  rear_left:{x:.06,y:.54,w:.18,h:.40},
  rear_middle:{x:.41,y:.54,w:.18,h:.40},
  rear_right:{x:.76,y:.54,w:.18,h:.40}
};

var DBG_THRESH_DEFAULTS={
  yolo_conf_thresh:0.35,yunet_score_thresh:0.55,emotion_min_conf:0.35,
  display_conf_thresh:0.6,temporal_min_hits:2
};
function dbgFilterDets(dets,minConf){
  var m=minConf!=null?minConf:DBG_THRESH_DEFAULTS.display_conf_thresh;
  return (dets||[]).filter(function(d){return (d.confidence||0)>=m;});
}
function dbgFilterFaces(faces,minConf){
  var m=minConf!=null?minConf:DBG_THRESH_DEFAULTS.display_conf_thresh;
  return (faces||[]).filter(function(f){return (f.confidence||0)>=m;});
}

function DebugVisionThresholds({thresholds,onChange}){
  var t=Object.assign({},DBG_THRESH_DEFAULTS,thresholds||{});
  var rows=[
    {k:'yolo_conf_thresh',label:'YOLO detect',pct:true},
    {k:'yunet_score_thresh',label:'Face (YuNet)',pct:true},
    {k:'emotion_min_conf',label:'Emotion',pct:true},
    {k:'display_conf_thresh',label:'Show boxes ≥',pct:true},
    {k:'temporal_min_hits',label:'Confirm frames',pct:false,min:1,max:5,step:1}
  ];
  return (
    <div className="dbg-thresh-strip">
      <div className="dbg-viz-lbl">Detection thresholds</div>
      {rows.map(function(r){
        var raw=t[r.k];
        var sliderVal=r.pct?Math.round(raw*100):raw;
        var min=r.min!=null?r.min:(r.pct?5:1);
        var max=r.max!=null?r.max:(r.pct?95:5);
        var step=r.step||(r.pct?5:1);
        var shown=r.pct?(sliderVal+'%'):String(sliderVal);
        return (
          <div key={r.k} className="dbg-thresh-row">
            <span className="dbg-thresh-lbl">{r.label}</span>
            <input type="range" min={min} max={max} step={step} value={sliderVal}
              onChange={function(e){
                var v=Number(e.target.value);
                var next=Object.assign({},t);
                next[r.k]=r.pct?v/100:v;
                onChange(next);
              }}/>
            <span className="dbg-thresh-val">{shown}</span>
          </div>
        );
      })}
    </div>
  );
}

function DebugVisionCanvas({pipelineDebugRef,visionObjects,visionFaces,visionDriver,visionAllSeats,visionThresh}){
  const cvRef=useRef(null);
  const imgRef=useRef(new Image());
  const srcRef=useRef('');
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var id;
    var draw=function(){
      var W=cv.clientWidth||480;var H=cv.clientHeight||220;
      if(W<2||H<2){id=requestAnimationFrame(draw);return;}
      if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
      ctx.fillStyle=cssVar('--canvas-bg','#0c1220');ctx.fillRect(0,0,W,H);
      var frame=pipelineDebugRef&&pipelineDebugRef.current&&pipelineDebugRef.current.lastFrame;
      var imgW=frame?frame.w:W;var imgH=frame?frame.h:H;
      var scale=frame?Math.min(W/imgW,H/imgH):1;
      var dw=imgW*scale,dh=imgH*scale,dx=(W-dw)/2,dy=(H-dh)/2;
      if(frame&&frame.b64){
        var dataUrl='data:image/jpeg;base64,'+frame.b64;
        if(srcRef.current!==dataUrl){
          srcRef.current=dataUrl;
          imgRef.current.onload=function(){};
          imgRef.current.src=dataUrl;
        }
        if(imgRef.current.complete&&imgRef.current.naturalWidth>0)
          ctx.drawImage(imgRef.current,dx,dy,dw,dh);
      }else{
        ctx.fillStyle=cssVar('--text-faint','#64748b');
        ctx.font='12px monospace';ctx.textAlign='center';
        ctx.fillText('No video frame — start camera/video on Sensor tab',W/2,H/2);
      }
      SEAT_IDS.forEach(function(sid){
        var sv=visionAllSeats[sid]||{};
        var r=SEAT_DBG_RECTS[sid];if(!r)return;
        var rx=dx+r.x*dw,ry=dy+r.y*dh,rw=r.w*dw,rh=r.h*dh;
        var occ=!!sv.occupied;
        ctx.strokeStyle=occ?'#14b8a6':'rgba(148,163,184,.4)';
        ctx.lineWidth=occ?2:1;ctx.setLineDash(occ?[]:[4,3]);
        ctx.strokeRect(rx,ry,rw,rh);ctx.setLineDash([]);
        if(occ){
          var lbl=sid.replace(/_/g,' ')+(sv.kind&&sv.kind!=='unknown'?' · '+sv.kind:'');
          ctx.font='bold 10px monospace';ctx.textAlign='left';
          var tw=ctx.measureText(lbl).width+8;
          ctx.fillStyle='rgba(20,184,166,.88)';ctx.fillRect(rx,Math.max(dy,ry-14),tw,14);
          ctx.fillStyle='#0c1220';ctx.fillText(lbl,rx+4,Math.max(dy+2,ry-3));
        }
      });
      var dispMin=(visionThresh&&visionThresh.display_conf_thresh)!=null
        ?visionThresh.display_conf_thresh:DBG_THRESH_DEFAULTS.display_conf_thresh;
      var faceDets=dbgFilterFaces((visionFaces&&visionFaces.faces)||[],dispMin);
      faceDets.forEach(function(fh){
        var b=fh.box;if(!b||b.length<4)return;
        var bx=dx+(b[0]/imgW)*dw,by=dy+(b[1]/imgH)*dh;
        var bw=((b[2]-b[0])/imgW)*dw,bh=((b[3]-b[1])/imgH)*dh;
        ctx.strokeStyle='#22d3ee';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
        var tag=(fh.emotion||'?')+' '+Math.round((fh.confidence||0)*100)+'%';
        if(fh.seat)tag=fh.seat.replace(/_/g,' ')+' · '+tag;
        ctx.font='bold 10px monospace';ctx.textAlign='left';
        var tw=ctx.measureText(tag).width+8;
        ctx.fillStyle='rgba(34,211,238,.9)';ctx.fillRect(bx,Math.max(dy,by-14),tw,14);
        ctx.fillStyle='#0c1220';ctx.fillText(tag,bx+4,Math.max(dy+2,by-3));
      });
      var dets=dbgFilterDets(visionObjects&&visionObjects.detections,dispMin);
      dets.forEach(function(det){
        var b=det.box;if(!b||b.length<4)return;
        var bx=dx+(b[0]/imgW)*dw,by=dy+(b[1]/imgH)*dh;
        var bw=((b[2]-b[0])/imgW)*dw,bh=((b[3]-b[1])/imgH)*dh;
        ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
        var tag=(det.label||'?')+' '+Math.round((det.confidence||0)*100)+'%';
        ctx.font='bold 10px monospace';ctx.textAlign='left';
        var tw=ctx.measureText(tag).width+8;
        ctx.fillStyle='rgba(245,158,11,.9)';ctx.fillRect(bx,Math.max(dy,by-14),tw,14);
        ctx.fillStyle='#0c1220';ctx.fillText(tag,bx+4,Math.max(dy+2,by-3));
      });
      if(visionDriver&&visionDriver.face_detected){
        var badge='DRIVER'+(visionDriver.drowsy?' · DROWSY':'')+' · '+(visionDriver.emotion||'calm');
        ctx.font='bold 11px monospace';ctx.textAlign='right';
        var btw=ctx.measureText(badge).width+10;
        ctx.fillStyle=visionDriver.drowsy?'rgba(252,129,129,.92)':'rgba(20,184,166,.88)';
        ctx.fillRect(W-btw-6,6,btw,18);
        ctx.fillStyle='#0c1220';ctx.fillText(badge,W-10,19);
      }
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[visionObjects,visionFaces,visionDriver,visionAllSeats,visionThresh,pipelineDebugRef]);
  return <canvas ref={cvRef} className="dbg-viz-canvas"/>;
}

function DebugChunkWaveform({pipelineDebugRef}){
  const cvRef=useRef(null);
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var id;
    var draw=function(){
      var W=cv.clientWidth||400;var H=cv.clientHeight||48;
      if(W<2||H<2){id=requestAnimationFrame(draw);return;}
      if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
      ctx.fillStyle=cssVar('--canvas-bg','#0c1220');ctx.fillRect(0,0,W,H);
      var samples=pipelineDebugRef&&pipelineDebugRef.current&&pipelineDebugRef.current.lastChunk;
      if(samples&&samples.length>1){
        ctx.beginPath();ctx.strokeStyle=cssVar('--accent','#14b8a6');ctx.lineWidth=1.2;
        var step=W/(samples.length-1);
        for(var i=0;i<samples.length;i++){
          var x=i*step,y=(0.5-samples[i]*0.42)*H;
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }else{
        ctx.strokeStyle=cssVar('--border-strong','#334155');
        ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
        ctx.fillStyle=cssVar('--text-faint','#64748b');
        ctx.font='10px monospace';ctx.textAlign='center';
        ctx.fillText('no PCM chunks — enable mic or MP3 on Sensor tab',W/2,H/2+4);
      }
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[pipelineDebugRef]);
  return <canvas ref={cvRef} style={{width:'100%',height:'100%',display:'block'}}/>;
}

          <span className="hint-text" style={{marginLeft:6}}>
            [{audio.distress_class} distress]
          </span>
        )}
      </div>
      {audio.prompt&&(
        <div className="hint-text" style={{marginTop:2,fontStyle:'italic'}}>

      <div className="det-badge" style={{marginTop:4,
        borderColor:effLabel!=='none'?'var(--accent-border)':'var(--border-subtle)'}}>

      </div>
      {clsLabel==='none'&&!hasChunk&&(

      {clsLabel==='none'&&effLabel!=='none'&&effSrc==='world'&&(
        <div className="hint-text" style={{marginTop:4,color:'var(--accent)'}}>
          Classifier idle — fusion is using scenario/seat audio config.
        </div>

  /* radar badge */
  var rpts=radar.point_count||0;
  var rBadge=rpts>0?rpts+' pts':'no signal';
  var rBadgeCls=rpts>0?'ok':'warn';

  /* audio badge — show what fusion actually uses */
  var effLabel=audioEff.label||audio.label||'none';
  var effConf=Math.round((audioEff.confidence||audio.confidence||0)*100);
  var aBadge=effLabel!=='none'?(effLabel+' '+effConf+'%'):'quiet';
  var aBadgeCls=effLabel!=='none'?'warn':'ok';

  /* vision badge */
  var qwenSeats=Object.entries(vis).filter(function(e){return e[0]!=='ts'&&e[1]&&e[1].occupied;});
  var vBadge=qwenSeats.length?qwenSeats.length+' detected':'none';
  var vBadgeCls=qwenSeats.length?'ok':'warn';

  /* fusion badge */
  var load=state.cognitive_load||0;
  var fBadgeCls=load>=66?'crit':load>=33?'warn':'ok';
  var yoloDets=dbgFilterDets(visObj.detections,
    (visionThresh&&visionThresh.display_conf_thresh)!=null
      ?visionThresh.display_conf_thresh:DBG_THRESH_DEFAULTS.display_conf_thresh);
  var c=caps||{};
  var audioNode=c.audio_node||'none';
  var visionNode=c.vision_node||'none';
  var audioModel=DBG_MODEL_NAMES[audioNode]||audioNode;
  var visionModel=DBG_MODEL_NAMES[visionNode]||visionNode;
  var busAudioSrc=audio.source||'—';
  var clsOccCount=SEAT_IDS.filter(function(sid){return vis[sid]&&vis[sid].occupied;}).length;

  return (
    <div style={{width:'100%',maxWidth:1400}}>
      <div className="dbg-models-bar">
        <div className="dbg-models-title">Active pipeline models</div>
        <div className="dbg-model-chip">
          <span className="dbg-model-kind">Audio classifier</span>
          <span className="dbg-model-name">{audioModel}</span>
          <span className={'dbg-model-status'+(c.live_audio?'':' off')}>
            {c.live_audio?'● server node: '+audioNode:'○ synthetic fallback'}
          </span>
        </div>
        <div className="dbg-model-chip">
          <span className="dbg-model-kind">Vision classifier</span>
          <span className="dbg-model-name">{visionModel}</span>
          <span className={'dbg-model-status'+(c.vision_ready?'':' off')}>
            {c.vision_ready
              ?('● '+visionNode+(c.vision_device?' on '+c.vision_device:'')+(c.yolo_ready?' · YOLO':'')+(c.emotion_ready?' · HSEmotion':''))
              :('○ '+(c.vision_status||'not loaded'))}
          </span>
        </div>
        <div className="dbg-model-chip">
          <span className="dbg-model-kind">Fusion engine</span>
          <span className="dbg-model-name">Rule-based · 10 Hz</span>
          <span className="dbg-model-status">● latency {state.latency_ms||0} ms</span>
        </div>
        <div className="dbg-model-chip">
          <span className="dbg-model-kind">Last audio bus publish</span>
          <span className="dbg-model-name">{busAudioSrc}</span>
          <span className="dbg-model-status">{audio.label||'none'} · {Math.round((audio.confidence||0)*100)}%</span>
        </div>
        <div className="dbg-model-chip">
          <span className="dbg-model-kind">Last vision inference</span>
          <span className="dbg-model-name">{visionNode}</span>
          <span className="dbg-model-status">
            {clsOccCount} seat(s) · driver {visDrv.face_detected?(visDrv.emotion||'?'):'—'}
            {yoloDets.length?' · '+yoloDets.length+' YOLO':''}
          </span>
        </div>
      </div>
      <div className="dbg-viz-row">
        <div className="dbg-viz-panel">
          <Card title="Video Frame + Classification" badge={vBadge} badgeCls={vBadgeCls}>
            <DebugVisionPanel pipelineDebugRef={pipelineDebugRef}
              visionDriver={visDrv} visionObjects={visObj} visionFaces={visFaces}
              visionAllSeats={vis} seatConfigs={sc} caps={caps}
              visionThresh={visionThresh} onVisionThreshChange={onVisionThreshChange}/>
          </Card>
        </div>
        <div className="dbg-viz-panel">
          <Card title="Audio Signal + Classification" badge={aBadge} badgeCls={aBadgeCls}>
            <DebugAudioPanel pipelineDebugRef={pipelineDebugRef} audio={audio}
              audioEffective={audioEff}/>
          </Card>
        </div>
      </div>
      <div className="dbg-grid">
        {/* ── Col 1: Radar + Audio ── */}
        <div className="dbg-col">
          <Card title="Radar Stage" badge={rBadge} badgeCls={rBadgeCls}>
            <Rows rows={[
              {k:'point_count', v:rpts, hi:rpts>0},
              {k:'source',      v:radar.source||'—'},
              {k:'ts',          v:radar.ts?new Date(radar.ts*1000).toLocaleTimeString():'—'},
            ]}/>
            {/* per-seat vitals */}
            <div className="dbg-seat-grid">
              {radarSeats.map(function(s){
                var occ=s.occupied;
                return (
                  <div key={s.seat} className={'dbg-seat'+(occ?' occ':'')}>
                    <div className="dbg-seat-id">{s.seat.replace(/_/g,' ')}</div>
                    {[
                      {k:'kind',  v:occ?(s.occupant||'?'):'empty'},
                      {k:'HR',    v:s.heart_rate_bpm?Math.round(s.heart_rate_bpm)+' bpm':'—'},
                      {k:'Resp',  v:s.respiration_rpm?Math.round(s.respiration_rpm)+' rpm':'—'},
                      {k:'motion',v:s.motion!=null?s.motion.toFixed(2):'—'},
                      {k:'buckle',v:s.buckled?'✓':'✗'},
                    ].map(function(r,i){return(
                      <div key={i} className="dbg-seat-row">
                        <span className="dbg-seat-k">{r.k}</span>
                        <span className="dbg-seat-v">{r.v}</span>
                      </div>
                    );})}
                  </div>
                );
              })}
            </div>
          </Card>

          <Card title="Audio Stage" badge={aBadge} badgeCls={aBadgeCls}>
            <Rows rows={[
              {k:'classifier', v:(audio.label||'none')+(audio.confidence?(' '+Math.round(audio.confidence*100)+'%'):'')},
              {k:'distress',   v:audio.distress_class||'none', warn:audio.distress_class&&audio.distress_class!=='none'},
              {k:'CLAP prompt',v:audio.prompt||'—'},
              {k:'fusion uses',v:effLabel+(effConf?' '+effConf+'%':'')+(audioEff.source?' ('+audioEff.source+')':''), warn:effLabel!=='none'&&effLabel!=='happy', hi:effLabel==='happy'},
              {k:'bus source', v:audio.source||'—'},
              {k:'ts',         v:audio.ts?new Date(audio.ts*1000).toLocaleTimeString():'—'},
            ]}/>
          </Card>
        </div>

        {/* ── Col 2: Vision + Vehicle ── */}
        <div className="dbg-col">
          <Card title="Vision Stage" badge={vBadge} badgeCls={vBadgeCls}>
            <Rows rows={[
              {k:'classifier',  v:visionNode},
              {k:'driver ML',   v:visDrv.face_detected?((visDrv.emotion||'?')+(visDrv.drowsy?' drowsy':'')):'no face'},
              {k:'seats ML',    v:clsOccCount+' occupied'},
              {k:'YOLO objs',   v:yoloDets.length?yoloDets.length+' detected':'none', warn:yoloDets.length>0},
              {k:'fusion seats',v:SEAT_IDS.filter(function(s){return sc[s]&&sc[s].occupied;}).length+' occupied'},
              {k:'ts',          v:visDrv.ts?new Date(visDrv.ts*1000).toLocaleTimeString():(vis.ts?new Date(vis.ts*1000).toLocaleTimeString():'—')},
            ]}/>
            <div className="dbg-seat-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
              {SEAT_IDS.map(function(sid){
                var sv=vis[sid]||{};
                var occ=sv.occupied;
                return (
                  <div key={sid} className={'dbg-seat'+(occ?' occ':'')}>
                    <div className="dbg-seat-id">{sid.replace(/_/g,' ')}</div>
                    {[
                      {k:'occ',  v:occ?'yes':'no'},
                      {k:'kind', v:sv.kind||'—'},
                      {k:'emot', v:sv.emotion||'—'},
                      {k:'belt', v:occ?(sv.buckled?'✓':'✗'):'—'},
                      {k:'objs', v:sv.objects&&sv.objects.length?sv.objects.join(', '):'none'},
                    ].map(function(r,i){return(
                      <div key={i} className="dbg-seat-row">
                        <span className="dbg-seat-k">{r.k}</span>
                        <span className="dbg-seat-v" style={{maxWidth:70,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.v}</span>
                      </div>
                    );})}
                  </div>
                );
              })}
            </div>
          </Card>

          <Card title="Vehicle / Road">
            <Rows rows={[
              {k:'speed',          v:Math.round(state.world_speed_kmh||0)+' km/h'},
              {k:'visibility',     v:state.world_visibility||'good'},
              {k:'pothole ahead',  v:state.world_pothole_ahead_m!=null?(state.world_pothole_ahead_m+'m'):'no', warn:state.world_pothole_ahead_m!=null},
              {k:'road quality',   v:state.vib_road_quality||'smooth'},
              {k:'vib rms',        v:(state.vib_rms||0).toFixed(3), warn:(state.vib_rms||0)>0.18},
              {k:'vib override',   v:state.vib_override?'ON':'off'},
            ]}/>
          </Card>
        </div>

        {/* ── Col 3: Seat Configs (merged) + Fusion output ── */}
        <div className="dbg-col">
          <Card title="Seat Configs (Merged)" badge="post-fusion">
            <div className="dbg-seat-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
              {SEAT_IDS.map(function(sid){
                var c=sc[sid]||{};
                var occ=c.occupied;
                return (
                  <div key={sid} className={'dbg-seat'+(occ?' occ':'')}>
                    <div className="dbg-seat-id">{sid.replace(/_/g,' ')}</div>
                    {[
                      {k:'occ',  v:occ?'yes':'no'},
                      {k:'kind', v:c.kind||'—'},
                      {k:'emot', v:c.emotion||'—'},
                      {k:'audio',v:c.audio_event||'none'},
                      {k:'belt', v:occ?(c.buckled?'✓':'✗'):'—'},
                      {k:'dist', v:c.distress!=null?c.distress.toFixed(2):'—'},
                      {k:'HR',   v:c.heart_rate_bpm?Math.round(c.heart_rate_bpm)+' bpm':'—'},
                    ].map(function(r,i){return(
                      <div key={i} className="dbg-seat-row">
                        <span className="dbg-seat-k">{r.k}</span>
                        <span className="dbg-seat-v">{r.v}</span>
                      </div>
                    );})}
                  </div>
                );
              })}
            </div>
          </Card>

          <Card title="Fusion Output" badge={'load: '+load} badgeCls={fBadgeCls}>
            <Rows rows={[
              {k:'cognitive_load', v:load, crit:load>=66, warn:load>=33&&load<66, hi:load<33},
              {k:'latency',        v:(state.latency_ms||0)+'ms', warn:(state.latency_ms||0)>100},
              {k:'scenario',       v:state.scenario||'idle'},
              {k:'factors',        v:(state.factors||[]).length+' active'},
            ]}/>
            {(state.factors||[]).length>0&&(
              <div className="dbg-body" style={{paddingTop:0}}>
                {(state.factors||[]).map(function(f,i){
                  return <div key={i} style={{fontSize:'0.65rem',color:'var(--text-secondary)',
                    background:'var(--bg-subtle)',borderRadius:4,padding:'2px 6px',
                    border:'1px solid var(--border-subtle)',fontFamily:'monospace'}}>
                    {f}
                  </div>;
                })}
              </div>
            )}
            {(state.mitigations||[]).length>0&&(
              <>
                <div className="dbg-body" style={{paddingTop:4,paddingBottom:0}}>
                  <div className="dbg-k" style={{textTransform:'uppercase',letterSpacing:'.5px'}}>Mitigations</div>
                </div>
                <div className="dbg-body" style={{paddingTop:2}}>
                  {(state.mitigations||[]).slice(0,6).map(function(m,i){
                    var cls=m.severity==='critical'?'crit':m.status==='proposed'?'warn':'';
                    return <div key={i} className="dbg-row">
                      <span className="dbg-k" style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.title}</span>
                      <span className={'dbg-v '+cls}>{m.status}</span>
                    </div>;
                  })}
                </div>
              </>
            )}
          </Card>
        </div>
      </div>
    </div>
  );
}

/* ── BrandBar ── */
function BrandBar(){
  return (
    <div className="brand-bar">
      {/* JLR logo */}
      <div className="jag-side">
        <img src="/static/jlr.png" alt="Jaguar Land Rover" className="brand-logo"/>
      </div>
      {/* Separator */}
      <div className="brand-sep"/>
      {/* CabinSense side */}
      <div className="cs-side">
        <div className="cs-name"><em>Cabin</em>Sense</div>
        <div className="cs-sub">In-Cabin Intelligence</div>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const INIT={
    cognitive_load:0,factors:[],radar:{},audio:{},audio_effective:{label:'none',confidence:0,source:'none'},vehicle:{},mitigations:[],
    scenario:'idle',demo_running:false,latency_ms:0,
    seat_configs:{
      driver:{occupied:true,kind:'adult',buckled:true,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      front_passenger:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      rear_left:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      rear_middle:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      rear_right:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
    },
    driver_emotion:'calm',vib_override:false,vib_road_quality:'smooth',vib_rms:0.05,
    world_speed_kmh:60,world_visibility:'good',world_pothole_ahead_m:null,
    vision_driver:null,vision_objects:null,vision_faces:null,vibration:{},
  };
  const [state,setState]=useState(INIT);
  const [conn,setConn]=useState(false);
  const [scenarios,setScenarios]=useState([]);
  const [liveAudio,setLiveAudio]=useState(false);
  const [liveVision,setLiveVision]=useState(false);
  const [caps,setCaps]=useState({});
  const [visionThresh,setVisionThresh]=useState(DBG_THRESH_DEFAULTS);
  const visionThreshTimer=useRef(null);
  const [tab,setTab]=useState('sensor');
  const [selSeat,setSelSeat]=useState(null);
  const [demoTrigger,setDemoTrigger]=useState(0);
  const [demoStopTrigger,setDemoStopTrigger]=useState(0);
  const [localDemoRunning,setLocalDemoRunning]=useState(false);
  const [theme,setTheme]=useState(function(){
    return document.documentElement.getAttribute('data-theme')||'dark';
  });
  const ws=useRef(null);
  const pipelineDebugRef=useRef({});

  useEffect(function(){
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem('cabinsense-theme',theme);
  },[theme]);

  var _wsSend=function(msg){
    if(ws.current&&ws.current.readyState===1)ws.current.send(JSON.stringify(msg));
  };
  var onDemoToggle=useCallback(function(running){
    setLocalDemoRunning(running);
    if(running){
      /* reset backend world before the new config arrives */
      _wsSend({cmd:'scenario',name:'idle'});
      setDemoTrigger(function(t){return t+1;});
      setTab('info');
    } else {
      setDemoStopTrigger(function(t){return t+1;});
    }
  },[]);

  useEffect(function(){
    fetch('/api/scenarios').then(function(r){return r.json();})
      .then(function(d){setScenarios(d.scenarios||[]);}).catch(function(){});
    fetch('/api/caps').then(function(r){return r.json();})
      .then(function(d){
        setCaps(d);setLiveAudio(d.live_audio);setLiveVision(!!d.vision_ready);
        if(d.vision_thresholds){
          setVisionThresh(Object.assign({},DBG_THRESH_DEFAULTS,d.vision_thresholds));
        }
        if(d.audio_chunk_samples){
          window._AUDIO_CHUNK_SAMPLES=d.audio_chunk_samples;
        }
      }).catch(function(){});
    var proto=location.protocol==='https:'?'wss:':'ws:';
    var sock=new WebSocket(proto+'//'+location.host+'/ws');
    ws.current=sock;
    sock.onopen=function(){setConn(true);};
    sock.onclose=function(){setConn(false);};
    sock.onmessage=function(e){setState(JSON.parse(e.data));};
    return function(){sock.close();};
  },[]);

  const send=useCallback(function(msg){
    if(ws.current&&ws.current.readyState===1)ws.current.send(JSON.stringify(msg));
  },[]);

  var onVisionThreshChange=useCallback(function(next){
    setVisionThresh(next);
    if(visionThreshTimer.current)clearTimeout(visionThreshTimer.current);
    visionThreshTimer.current=setTimeout(function(){
      fetch('/api/vision-thresholds',{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({thresholds:next})
      }).catch(function(){});
    },300);
  },[]);

  return (
    <div className="hmi">
      {/* Slim utility bar — just clock + conn */}
      <div className="hmi-hdr">
        <ThemeToggle theme={theme} setTheme={setTheme}/>
        <div className="sp"/>
        <Clock/>
        <div className={'dot'+(conn?' on':'')}/>
        <span className="lat">{state.latency_ms}ms</span>
        <button onClick={function(){_wsSend({cmd:'reset_vision'});}}
          style={{marginLeft:10,padding:'3px 10px',fontSize:'var(--font-xs)',fontWeight:700,
            borderRadius:5,cursor:'pointer',border:'1px solid var(--border-strong)',
            background:'var(--bg-subtle)',color:'var(--text-secondary)',fontFamily:'inherit',
            letterSpacing:'.5px',textTransform:'uppercase'}}>
          ↺ Reset
        </button>
      </div>
      <div className="hmi-content">
        {/* Sensor shell stays in DOM always — opacity/size trick keeps video playing (display:none pauses <video>) */}
        <div className="view iv-shell sensor-shell" style={tab==='sensor'?{}:{position:'absolute',width:0,height:0,overflow:'hidden',opacity:0,pointerEvents:'none'}}>
          <BrandBar/>
          <SensorView state={state} send={send} ws={ws}
            liveAudio={liveAudio} liveVision={liveVision}
            scenarios={scenarios} onSelectSeat={setSelSeat}
            playTrigger={demoTrigger} stopTrigger={demoStopTrigger}
            onDemoToggle={onDemoToggle} localDemoRunning={localDemoRunning}
            pipelineDebugRef={pipelineDebugRef}/>
        </div>
        <div className="view iv-shell info-shell" style={{display:tab==='info'?undefined:'none'}}>
          <BrandBar/>
          <InfotainmentView state={state} send={send}/>
        </div>
        <div className="view iv-shell info-shell" style={{display:tab==='debug'?undefined:'none'}}>
          <DebugView state={state} pipelineDebugRef={pipelineDebugRef} caps={caps}
            visionThresh={visionThresh} onVisionThreshChange={onVisionThreshChange}/>
        </div>
      </div>
      <div className="hmi-tabs">
        <button className={'tab'+(tab==='sensor'?' on':'')} onClick={function(){setTab('sensor');}}>
          Sensor Simulation &amp; Replay
        </button>
        <button className={'tab'+(tab==='info'?' on':'')} onClick={function(){setTab('info');}}>
          Infotainment View
        </button>
        <button className={'tab'+(tab==='debug'?' on':'')} onClick={function(){setTab('debug');}}>
          Pipeline Debug
        </button>
      </div>
      {selSeat&&(
        <SeatConfigOverlay seatId={selSeat}
          config={state.seat_configs&&state.seat_configs[selSeat]}
          send={send} scenario={state.scenario} onClose={function(){setSelSeat(null);}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
