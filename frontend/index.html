<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CabinSense</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.12.17/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#090d12;color:#d4dce8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:12px;-webkit-font-smoothing:antialiased}

/* ── Layout ── */
.hmi{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hmi-hdr{height:44px;display:flex;align-items:center;padding:0 16px;gap:10px;
  background:#0c1018;border-bottom:1px solid #1c2740;flex-shrink:0}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px;line-height:1}
.logo span{color:#00d4b0}
.tagline{font-size:9px;color:#2a3a50;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.sp{flex:1}
.view-lbl{font-size:10px;color:#3d5070;font-weight:500;letter-spacing:.5px}
.hmi-clock{font-size:11px;color:#4a6580;font-variant-numeric:tabular-nums}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#1c2740;transition:background .4s}
.conn-dot.on{background:#00d4b0;box-shadow:0 0 7px rgba(0,212,176,.5)}
.lat{font-size:9px;color:#2a3a50;font-variant-numeric:tabular-nums}

.hmi-content{flex:1;overflow:hidden;position:relative}
.hmi-view{position:absolute;inset:0;overflow:hidden}

.hmi-tabs{height:48px;display:flex;background:#0c1018;border-top:1px solid #1c2740;flex-shrink:0}
.hmi-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  font-size:11px;font-weight:500;color:#2a3a50;cursor:pointer;border:none;background:none;
  border-top:2px solid transparent;transition:all .25s;letter-spacing:.3px}
.hmi-tab.on{color:#00d4b0;border-top-color:#00d4b0;background:rgba(0,212,176,.04)}

/* ── Data Replay View ── */
.drv{display:grid;grid-template-columns:27% 1fr 29%;gap:8px;padding:8px;height:100%;overflow:hidden}
.drv-col{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0}
.dp{background:#111720;border:1px solid #1c2740;border-radius:8px;padding:9px 11px;
  display:flex;flex-direction:column;overflow:hidden;min-height:0}
.dp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-shrink:0}
.dp-ttl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#00d4b0;font-weight:600}
.dp-sub{font-size:9px;color:#2a3a50}
.dp-body{flex:1;overflow:hidden;min-height:0}

/* video box */
.vid-box{background:#060c14;border-radius:5px;display:flex;align-items:center;
  justify-content:center;color:#1c2740;font-size:11px;width:100%;height:100%;overflow:hidden}
.vid-box video{width:100%;height:100%;object-fit:cover;border-radius:5px}

/* vehicle feed */
.vf-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #111820}
.vf-row:last-child{border-bottom:none}
.vf-key{color:#2a3a50;font-size:10px;width:70px;flex-shrink:0}
.vf-val{font-size:11px;font-weight:600}
.vis-btns{display:flex;gap:4px;flex-wrap:wrap}
.vbtn{padding:2px 7px;border-radius:3px;font-size:9px;border:1px solid #1c2740;
  background:#0d1520;color:#3d5070;cursor:pointer;transition:all .15s}
.vbtn.on{background:rgba(0,212,176,.1);border-color:#00d4b0;color:#00d4b0}

/* audio canvas */
.audio-wrap{flex:1;min-height:0;border-radius:4px;overflow:hidden;background:#060d16}

/* road chart */
.rq-wrap{flex:1;min-height:0;border-radius:4px;overflow:hidden;background:#060d16}
.rq-qual{font-size:18px;font-weight:700;margin-bottom:4px;flex-shrink:0}

/* seat table */
.stbl{width:100%;border-collapse:collapse;font-size:10px}
.stbl th{color:#2a3a50;font-weight:500;font-size:9px;text-transform:uppercase;
  letter-spacing:.7px;padding:3px 5px;text-align:left;border-bottom:1px solid #1c2740}
.stbl td{padding:5px 5px;border-bottom:1px solid #0d1420;vertical-align:middle}
.stbl tr:hover td{background:rgba(0,212,176,.03);cursor:pointer}
.stbl tr:last-child td{border-bottom:none}
.kind-chip{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;
  background:#151f30;color:#4a6580}
.belt-y{color:#00d4b0}
.belt-n{color:#fc8181}
.dmini{height:3px;background:#151f30;border-radius:2px;width:38px;display:inline-block;overflow:hidden}
.dmini span{display:block;height:100%;border-radius:2px}

/* cabin mini map */
.cmap{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px;height:100%}
.cseat{border-radius:6px;border:1px solid #1c2740;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;font-size:9px;color:#2a3a50;
  padding:6px;background:#0d1520;cursor:pointer;transition:all .3s;position:relative}
.cseat.occ{border-color:#2a3f5a;background:#111f30;color:#4a6580}
.cseat.warn{border-color:rgba(246,173,85,.5);background:rgba(246,173,85,.05)}
.cseat.crit{border-color:rgba(252,129,129,.5);background:rgba(252,129,129,.05)}
.cseat .ci{font-size:18px}
.cseat .cn{font-size:8px;text-transform:uppercase;letter-spacing:.5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.cseat.warn .ci,.cseat.crit .ci{animation:pulse 1.4s infinite}

/* scenario row */
.sc-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.sc-btn{padding:3px 8px;border-radius:4px;font-size:9px;border:1px solid #1c2740;
  background:#0d1520;color:#3d5070;cursor:pointer;transition:all .15s;font-family:inherit}
.sc-btn:hover{border-color:#00d4b0;color:#00d4b0}
.sc-btn.on{background:rgba(0,212,176,.1);border-color:#00d4b0;color:#00d4b0}
.demo-row{display:flex;align-items:center;gap:8px}
.demo-go{padding:3px 10px;border-radius:4px;font-size:9px;border:1px solid #00d4b0;
  background:rgba(0,212,176,.08);color:#00d4b0;cursor:pointer;font-family:inherit}
.demo-stop{padding:3px 10px;border-radius:4px;font-size:9px;border:1px solid #fc8181;
  background:rgba(252,129,129,.08);color:#fc8181;cursor:pointer;font-family:inherit}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.demo-indicator{font-size:9px;color:#f6ad55;animation:blink 1s infinite}

/* range */
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;
  background:#1a2535;outline:none;flex:1;cursor:pointer;border:none;min-width:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#00d4b0;cursor:pointer;border:2px solid #090d12}
input[type=checkbox]{accent-color:#00d4b0;cursor:pointer}

/* ── IMU drive condition buttons ── */
.imu-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.imu-btn{padding:3px 9px;border-radius:4px;font-size:9px;border:1px solid #1c2740;
  background:#0d1520;color:#3d5070;cursor:pointer;transition:all .15s;font-family:inherit}
.imu-btn:hover{border-color:#f6ad55;color:#f6ad55}
.imu-btn.on{background:rgba(246,173,85,.1);border-color:#f6ad55;color:#f6ad55}

/* ── noise level dB ── */
.noise-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-shrink:0}
.noise-db{font-size:22px;font-weight:700;color:#00d4b0;font-variant-numeric:tabular-nums;min-width:52px}
.noise-bar-wrap{flex:1;height:6px;background:#0d1520;border-radius:3px;overflow:hidden}
.noise-bar{height:100%;border-radius:3px;transition:width .15s,background .3s}
.vad{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
.vad.on{background:rgba(0,212,176,.15);color:#00d4b0;border:1px solid rgba(0,212,176,.3)}
.vad.off{background:transparent;color:#1c2740;border:1px solid #1c2740}

/* ── Infotainment View ── */
.iv{display:flex;flex-direction:column;height:100%;overflow:hidden}
.iv-top{flex:0 0 44%;background:#090d12;border-bottom:1px solid #1c2740;
  display:flex;align-items:center;justify-content:center;gap:40px;padding:12px 24px}
.iv-bottom{flex:1;display:flex;overflow:hidden}
.iv-col{display:flex;flex-direction:column;justify-content:center;padding:20px 22px;overflow:hidden}
.iv-l{flex:0 0 33%;background:#0d1420;border-right:1px solid #1c2740}
.iv-c{flex:0 0 34%;background:#090d12;border-right:1px solid #1c2740;align-items:center}
.iv-r{flex:1;background:#0d1420}

.iss-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#2a3a50;margin-bottom:4px}
.iss-title{font-size:14px;font-weight:600;color:#d4dce8;margin-bottom:12px;line-height:1.4}
.iss-conf{font-size:42px;font-weight:700;line-height:1;margin-bottom:3px}
.iss-clbl{font-size:9px;color:#2a3a50;margin-bottom:14px}
.iss-meta-row{display:flex;justify-content:space-between;padding:5px 0;
  border-bottom:1px solid #111820;font-size:11px}
.iss-meta-row:last-child{border-bottom:none}
.iss-mk{color:#2a3a50}
.iss-mv{color:#d4dce8;font-weight:600;font-variant-numeric:tabular-nums}

.gauge-ttl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#2a3a50;
  margin-bottom:16px;text-align:center}
.gauge-sub{font-size:14px;font-weight:600;margin-top:8px;text-align:center}
.factors-mini{margin-top:14px;display:flex;flex-direction:column;gap:4px;text-align:center}
.fchip{font-size:9px;color:#2a3a50}

.rec-ttl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#2a3a50;margin-bottom:16px}
.rec-list{display:flex;flex-direction:column;gap:12px;margin-bottom:22px}
.rec-item{display:flex;gap:11px;align-items:flex-start}
.rec-num{width:22px;height:22px;border-radius:50%;background:rgba(0,212,176,.1);
  border:1px solid rgba(0,212,176,.3);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#00d4b0;flex-shrink:0;margin-top:1px}
.rec-txt{font-size:12px;color:#d4dce8;line-height:1.45}
.rec-uc{font-size:9px;color:#2a3a50;margin-top:2px}
.rec-empty{font-size:12px;color:#2a3a50;padding:4px 0}
.rec-acts{display:flex;gap:9px;flex-wrap:wrap}
.btn-apply{padding:8px 22px;border-radius:6px;font-size:11px;font-weight:600;
  background:rgba(0,212,176,.1);border:1px solid #00d4b0;color:#00d4b0;
  cursor:pointer;transition:all .2s;font-family:inherit}
.btn-apply:hover{background:rgba(0,212,176,.2)}
.btn-dis{padding:8px 14px;border-radius:6px;font-size:11px;background:transparent;
  border:1px solid #1c2740;color:#3d5070;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-dis:hover{border-color:#3d5070;color:#6b8199}

/* ── Seat config overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,4,10,.78);display:flex;
  align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.ov-panel{background:#111720;border:1px solid #00d4b0;border-radius:12px;
  padding:20px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto}
.ov-ttl{font-size:13px;font-weight:600;color:#00d4b0;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center}
.cfg-sec{margin-bottom:13px}
.cfg-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#2a3a50;margin-bottom:6px}
.btn-grp{display:flex;flex-wrap:wrap;gap:5px}
.cfg-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.cfg-row .cfg-lbl{margin:0;width:88px;flex-shrink:0}
.cfg-row .right{flex:1;display:flex;align-items:center;gap:8px}
.rval{font-size:11px;color:#d4dce8;font-weight:600;min-width:52px;text-align:right}
.cfg-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.xbtn{padding:4px 10px;border-radius:4px;font-size:10px;border:1px solid #1c2740;
  background:#0d1520;color:#3d5070;transition:all .15s;cursor:pointer;font-family:inherit}
.xbtn.sel{background:rgba(0,212,176,.1);border-color:#00d4b0;color:#00d4b0}
.close-btn{background:none;border:1px solid #1c2740;color:#3d5070;border-radius:5px;
  padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit}
button{font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<div id="err" style="display:none;position:fixed;inset:0;background:#030508;color:#ff4d4f;
  font-family:monospace;font-size:12px;padding:32px;white-space:pre-wrap;z-index:9999"></div>
<script>
window.onerror=function(m,s,l,c,e){
  var d=document.getElementById('err');d.style.display='block';
  d.textContent='JS ERROR\n'+m+'\n'+s+':'+l+(e?'\nStack:\n'+e.stack:'');};
window.addEventListener('unhandledrejection',function(e){
  var d=document.getElementById('err');d.style.display='block';
  d.textContent='PROMISE ERROR\n'+(e.reason&&e.reason.stack||e.reason);});
</script>
<script>
/* AudioWorklet outside Babel — no backtick template literals allowed inside Babel */
window._CHUNKER_TARGET=Math.round(16000*0.96);
window._CHUNKER_SRC=[
  'class Chunker extends AudioWorkletProcessor {',
  '  constructor(){super();this._buf=[];this._target='+window._CHUNKER_TARGET+';}',
  '  process(inputs){',
  '    var ch=inputs[0][0];if(!ch)return true;',
  '    for(var i=0;i<ch.length;i++){this._buf.push(ch[i]);}',
  '    while(this._buf.length>=this._target){',
  '      this.port.postMessage(this._buf.splice(0,this._target));',
  '    }',
  '    return true;',
  '  }',
  '}',
  'registerProcessor("chunker",Chunker);'
].join('\n');
window._CHUNKER_URL=URL.createObjectURL(new Blob([window._CHUNKER_SRC],{type:'application/javascript'}));
</script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

/* ── constants ── */
const SEAT_LABELS={driver:'Driver',front_passenger:'Front Pass.',rear_left:'Rear Left',rear_right:'Rear Right'};
const SEAT_IDS=['driver','front_passenger','rear_left','rear_right'];
const ICONS={adult:'👤',child:'🧒',pet:'🐾',unknown:'👤'};
const AICONS={none:'—',talking:'💬',shouting:'📢',crying:'😢',happy:'😊',barking:'🐕'};
const loadCol=function(v){return v<33?'#00d4b0':v<66?'#f6ad55':'#fc8181';};
const loadLbl=function(v){return v<20?'Nominal':v<40?'Low':v<66?'Medium':v<85?'High':'Critical';};
const fmt2=function(n){return n<10?'0'+n:''+n;};

/* ── Clock ── */
function Clock(){
  const [t,setT]=useState('');
  useEffect(function(){
    var upd=function(){
      var d=new Date(),h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
      var ap=h>=12?'PM':'AM';h=h%12||12;
      setT(fmt2(h)+':'+fmt2(m)+':'+fmt2(s)+' '+ap);
    };
    upd();var id=setInterval(upd,1000);return function(){clearInterval(id);};
  },[]);
  return <span className="hmi-clock">{t}</span>;
}

/* ── AudioBarsCanvas ── */
function AudioBarsCanvas({analyserRef,audioActive,onStats}){
  const cvRef=useRef(null);
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');
    var W=cv.width,H=cv.height,N=40,id;
    var draw=function(){
      ctx.fillStyle='#060d16';ctx.fillRect(0,0,W,H);
      var data=new Uint8Array(128);
      if(analyserRef.current)analyserRef.current.getByteFrequencyData(data);
      var sum=0;
      var bw=Math.floor((W-N+1)/N);
      for(var i=0;i<N;i++){
        var bi=Math.floor(i*64/N);
        var raw=analyserRef.current?data[bi]:(audioActive?Math.random()*50+15:Math.random()*10+4);
        sum+=raw;
        var h=Math.max(3,(raw/255)*H);
        var x=i*(bw+1),y=H-h;
        var grd=ctx.createLinearGradient(0,y,0,H);
        var g1=Math.round(160+raw*0.37),g2=Math.round(70+raw*0.2);
        grd.addColorStop(0,'rgba(0,'+g1+','+Math.round(140+raw*0.3)+',1)');
        grd.addColorStop(1,'rgba(0,'+g2+','+Math.round(60+raw*0.15)+',.4)');
        ctx.fillStyle=grd;ctx.fillRect(x,y,bw,h);
      }
      if(onStats){
        var avg=sum/N;
        // map 0-255 avg to 30-110 dB
        var db=Math.round(30+avg*(80/255));
        onStats({db:db,vad:avg>30});
      }
      id=requestAnimationFrame(draw);
    };
    draw();
    return function(){cancelAnimationFrame(id);};
  },[]);
  return <canvas ref={cvRef} width="400" height="90" style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ── RoadQualityChart ── */
function RoadQualityChart({vib}){
  const cvRef=useRef(null);
  const histRef=useRef([]);
  useEffect(function(){
    var rms=(vib&&vib.rms_z)||0;
    histRef.current.push(rms);
    if(histRef.current.length>120)histRef.current.shift();
  });
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');
    var W=cv.width,H=cv.height,id;
    var draw=function(){
      ctx.fillStyle='#060d16';ctx.fillRect(0,0,W,H);
      var h=histRef.current;
      if(h.length>1){
        ctx.beginPath();ctx.strokeStyle='#00d4b0';ctx.lineWidth=1.5;
        for(var i=0;i<h.length;i++){
          var x=(i/(h.length-1))*W,y=H-(h[i]/0.9)*(H-4)-2;
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.beginPath();ctx.strokeStyle='rgba(246,173,85,.25)';
        ctx.lineWidth=1;ctx.setLineDash([3,3]);
        var ty=H-(0.18/0.9)*(H-4)-2;
        ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();ctx.setLineDash([]);
      }
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[]);
  var q=(vib&&vib.road_quality)||'smooth';
  var qc={smooth:'#00d4b0',rough:'#f6ad55',pothole:'#fc8181'};
  var ah=vib&&vib.pothole_ahead_m;
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',gap:5}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexShrink:0}}>
        <span className="rq-qual" style={{color:qc[q]||'#d4dce8'}}>{q}</span>
        {ah!=null&&<span style={{fontSize:9,color:'#f6ad55'}}>⚠ {Math.round(ah)}m ahead</span>}
      </div>
      <div className="rq-wrap" style={{flex:1}}>
        <canvas ref={cvRef} width="280" height="50" style={{width:'100%',height:'100%',display:'block'}}/>
      </div>
    </div>
  );
}

/* ── SeatStatusTable ── */
function SeatStatusTable({seatConfigs,radarSeats,onSelect}){
  var rm={};((radarSeats&&radarSeats.seats)||[]).forEach(function(s){rm[s.seat]=s;});
  return (
    <table className="stbl">
      <thead>
        <tr><th>Seat</th><th>Type</th><th>Audio</th><th>Belt</th><th>Risk</th></tr>
      </thead>
      <tbody>
        {SEAT_IDS.map(function(sid){
          var c=(seatConfigs&&seatConfigs[sid])||{};
          var d=c.distress||0;
          var dc=d>0.7?'#fc8181':d>0.35?'#f6ad55':'#00d4b0';
          return (
            <tr key={sid} onClick={function(){onSelect(sid);}}>
              <td style={{color:'#4a6580',fontSize:10}}>{SEAT_LABELS[sid]}</td>
              <td>{c.occupied
                ?<span className="kind-chip">{ICONS[c.kind]||'👤'} {c.kind||'adult'}</span>
                :<span style={{color:'#1c2740'}}>—</span>}</td>
              <td style={{fontSize:10,color:'#f6ad55'}}>
                {c.audio_event&&c.audio_event!=='none'
                  ?(AICONS[c.audio_event]||'')+' '+c.audio_event
                  :<span style={{color:'#1c2740'}}>—</span>}
              </td>
              <td>{c.occupied
                ?(c.buckled?<span className="belt-y">✓</span>:<span className="belt-n">✗</span>)
                :<span style={{color:'#1c2740'}}>—</span>}</td>
              <td>{c.occupied
                ?<div className="dmini"><span style={{width:Math.round(d*100)+'%',background:dc}}/></div>
                :<span style={{color:'#1c2740'}}>—</span>}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

/* ── CabinMapMini ── */
function CabinMapMini({seatConfigs,onSelect}){

/* ── VideoSection ── */
function VideoSection({ws,liveVision}){
  const [on,setOn]=useState(false);
  const vRef=useRef(null);
  const tRef=useRef(null);
  const startCam=async function(){
    try{
      var st=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240}});
      vRef.current.srcObject=st;await vRef.current.play();
      var cv=document.createElement('canvas');cv.width=320;cv.height=240;
      var c2=cv.getContext('2d');
      tRef.current=setInterval(function(){
        c2.drawImage(vRef.current,0,0,320,240);
        var b64=cv.toDataURL('image/jpeg',.7).split(',')[1];
        if(ws.current&&ws.current.readyState===1)
          ws.current.send(JSON.stringify({cmd:'vision_frame',data:b64}));
      },200);setOn(true);
    }catch(e){alert('Camera denied: '+e.message);}
  };
  const stopCam=function(){
    clearInterval(tRef.current);
    if(vRef.current&&vRef.current.srcObject)
      vRef.current.srcObject.getTracks().forEach(function(t){t.stop();});
    setOn(false);
  };
  return (
    <div className="vid-box" style={{position:'relative'}}>
      {!on&&!liveVision&&<span>No camera · synthetic</span>}
      {!on&&liveVision&&(
        <button onClick={startCam} style={{fontSize:10,padding:'5px 12px',
          background:'rgba(0,212,176,.08)',border:'1px solid #00d4b0',borderRadius:5,color:'#00d4b0'}}>
          📷 Start Camera
        </button>
      )}
      <video ref={vRef} muted playsInline
        style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:5,display:on?'block':'none'}}/>
      {on&&<button onClick={stopCam} style={{position:'absolute',top:6,right:6,fontSize:9,
        padding:'2px 7px',background:'rgba(252,129,129,.12)',border:'1px solid #fc8181',
        borderRadius:4,color:'#fc8181'}}>⏹</button>}
    </div>
  );
}

/* ── CircularGauge ── */
function CircularGauge({value}){
  var R=65,CX=80,CY=80;
  var circ=Math.round(2*Math.PI*R);
  var filled=Math.round((value/100)*circ);
  var col=loadCol(value);
  var tr='rotate(-90 '+CX+' '+CY+')';
  return (
    <div className="gauge-section">
      <div className="gauge-ttl">Load Score</div>
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx={CX} cy={CY} r={R} fill="none" stroke="#1a2535" strokeWidth="11"/>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke={col} strokeWidth="11"
          strokeDasharray={filled+' '+circ} strokeLinecap="round" transform={tr}/>
        <text x={CX} y={CY+8} textAnchor="middle" fill={col}
          fontSize="40" fontWeight="700" fontFamily="inherit">{value}</text>
      </svg>
      <div className="gauge-sub" style={{color:col}}>{loadLbl(value)}</div>
    </div>
  );
}

/* ── IssuePanel ── */
function IssuePanel({state}){
  var load=state.cognitive_load||0;
  var factors=state.factors||[];
  var top=factors[0]||null;
  var audio=state.audio||{};
  var conf=audio.confidence
    ?Math.round(audio.confidence*100)
    :(load>0?Math.min(98,Math.round(load*0.82+8)):0);
  var col=loadCol(load);

  const detRef=useRef(null);
  const [dur,setDur]=useState(0);
  var above=load>25;
  useEffect(function(){
    if(above){
      if(!detRef.current)detRef.current=new Date();
      var id=setInterval(function(){
        setDur(Math.round((Date.now()-detRef.current.getTime())/1000));
      },1000);
      return function(){clearInterval(id);};
    }else{detRef.current=null;setDur(0);}
  },[above]);

  var detTime=detRef.current
    ?detRef.current.toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit',second:'2-digit'})
    :'—';
  var durStr=dur>0?'00:'+fmt2(Math.floor(dur/60))+':'+fmt2(dur%60):'00:00:00';

  return (
    <div>
      <div className="iss-lbl">Issue / Distract</div>
      <div className="iss-title">
        {top?(top.charAt(0).toUpperCase()+top.slice(1)):'No disturbance detected'}
      </div>
      {load>0&&<>
        <div className="iss-conf" style={{color:col}}>{conf}%</div>
        <div className="iss-clbl">Confidence</div>
      </>}
      <div>
        <div className="iss-meta-row">
          <span className="iss-mk">Detected In</span>
          <span className="iss-mv">{detTime}</span>
        </div>
        <div className="iss-meta-row">
          <span className="iss-mk">Duration</span>
          <span className="iss-mv">{durStr}</span>
        </div>
        <div className="iss-meta-row">
          <span className="iss-mk">Scenario</span>
          <span className="iss-mv" style={{color:'#4a6580',fontSize:10}}>
            {(state.scenario||'idle').replace(/_/g,' ')}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ── RecommendationPanel ── */
function RecommendationPanel({mitigations,send}){
  var vis=(mitigations||[]).filter(function(m){return m.status!=='dismissed';});
  var proposed=vis.filter(function(m){return m.status==='proposed'&&m.confirm;});
  return (
    <div>
      <div className="rec-ttl">Recommendation</div>
      <div className="rec-list">
        {vis.length===0&&<div className="rec-empty">Cabin nominal — no action needed.</div>}
        {vis.map(function(m,i){
          var sc={active:'#00d4b0',proposed:'#f6ad55',dismissed:'#3d5070'};
          return (
            <div key={m.id} className="rec-item">
              <div className="rec-num">{i+1}</div>
              <div>
                <div className="rec-txt">{m.title}</div>
                <div className="rec-uc">{m.usecase} ·{' '}
                  <span style={{color:sc[m.status]||'#3d5070'}}>{m.status}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {vis.length>0&&(
        <div className="rec-acts">
          {proposed.length>0&&(
            <button className="btn-apply"
              onClick={function(){proposed.forEach(function(m){send({cmd:'confirm',id:m.id});});}}>
              Apply All
            </button>
          )}
          <button className="btn-dis"
            onClick={function(){vis.forEach(function(m){send({cmd:'dismiss',id:m.id});});}}>
            Dismiss All
          </button>
        </div>
      )}
    </div>
  );
}

/* ── DataReplayView ── */
function DataReplayView({state,send,ws,liveAudio,liveVision,onSelectSeat,scenarios}){
  const [micOn,setMicOn]=useState(false);
  const [noiseDb,setNoiseDb]=useState(30);
  const [vad,setVad]=useState(false);
  const procRef=useRef(null);
  const ctxRef=useRef(null);
  const analyserRef=useRef(null);
  const SR=16000;
  var imuPresets=[
    {id:'smooth',label:'Smooth Road',q:'smooth',rms:0.05},
    {id:'breaker',label:'Speed Breaker',q:'rough',rms:0.38},
    {id:'pothole',label:'Pothole',q:'pothole',rms:0.68},
    {id:'turn',label:'Agg. Turn',q:'rough',rms:0.42},
    {id:'brake',label:'Hard Braking',q:'rough',rms:0.50}
  ];
  var curPreset=(state.vib_override&&state.vib_road_quality)||'replay';

  const startMic=async function(){
    try{
      var st=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:SR,channelCount:1}});
      var ctx=new AudioContext({sampleRate:SR});
      ctxRef.current=ctx;
      var src=ctx.createMediaStreamSource(st);
      var an=ctx.createAnalyser();an.fftSize=256;an.smoothingTimeConstant=0.6;
      analyserRef.current=an;src.connect(an);
      await ctx.audioWorklet.addModule(window._CHUNKER_URL);
      var node=new AudioWorkletNode(ctx,'chunker');
      node.port.onmessage=function(e){
        if(ws.current&&ws.current.readyState===1)
          ws.current.send(JSON.stringify({cmd:'audio_chunk',data:Array.from(e.data)}));
      };
      src.connect(node);procRef.current={stream:st,node,src};setMicOn(true);
    }catch(e){alert('Mic denied: '+e.message);}
  };
  const stopMic=function(){
    analyserRef.current=null;
    if(procRef.current&&procRef.current.stream)
      procRef.current.stream.getTracks().forEach(function(t){t.stop();});
    if(ctxRef.current)ctxRef.current.close();
    procRef.current=null;setMicOn(false);
  };
  useEffect(function(){return stopMic;},[]);

  var aud=state.audio||{};
  var audActive=aud.label&&aud.label!=='none';
  var audCol=audActive?'#f6ad55':'#2a3a50';

  return (
    <div className="drv">
      {/* ── Col 1: Video + Vehicle ── */}
      <div className="drv-col">
        <div className="dp" style={{flex:'0 0 56%'}}>
          <div className="dp-hdr">
            <span className="dp-ttl">Video In-Cabin</span>
            {state.vision_driver&&state.vision_driver.face_detected&&(
              <span style={{fontSize:9,color:state.vision_driver.drowsy?'#fc8181':'#00d4b0'}}>
                {state.vision_driver.emotion}{state.vision_driver.drowsy?' ⚠ drowsy':''}
              </span>
            )}
          </div>
          <div className="dp-body" style={{display:'flex'}}>
            <VideoSection ws={ws} liveVision={liveVision}/>
          </div>
        </div>
        <div className="dp" style={{flex:1}}>
          <div className="dp-hdr">
            <span className="dp-ttl">Vehicle Feed</span>
          </div>
          <div className="dp-body" style={{overflowY:'auto'}}>
            <VehicleFeedPanel
              speed={state.world_speed_kmh}
              visibility={state.world_visibility}
              potholeAhead={state.world_pothole_ahead_m}
              send={send}/>
          </div>
        </div>
      </div>

      {/* ── Col 2: Audio + Road Quality + Scenarios ── */}
      <div className="drv-col">
        <div className="dp" style={{flex:'0 0 52%'}}>
          <div className="dp-hdr">
            <span className="dp-ttl">Audio Input</span>
            {liveAudio&&(
              <button onClick={micOn?stopMic:startMic}
                style={{fontSize:9,padding:'2px 8px',borderRadius:4,
                  background:micOn?'rgba(252,129,129,.1)':'rgba(0,212,176,.08)',
                  border:'1px solid '+(micOn?'#fc8181':'#00d4b0'),
                  color:micOn?'#fc8181':'#00d4b0'}}>
                {micOn?'⏹ Stop':'🎤 Start Microphone'}
              </button>
            )}
          </div>
          <div className="noise-row">
            <span className="noise-db" style={{color:noiseDb>75?'#fc8181':noiseDb>55?'#f6ad55':'#00d4b0'}}>
              {noiseDb} dB
            </span>
            <div className="noise-bar-wrap">
              <div className="noise-bar"
                style={{width:Math.min(100,((noiseDb-30)/80)*100)+'%',
                  background:noiseDb>75?'#fc8181':noiseDb>55?'#f6ad55':'#00d4b0'}}/>
            </div>
            <span className={'vad '+(vad?'on':'off')}>{vad?'● Voice':'○ Quiet'}</span>
          </div>
          <div className="dp-body audio-wrap">
            <AudioBarsCanvas analyserRef={analyserRef} audioActive={audActive}
              onStats={function(s){setNoiseDb(s.db);setVad(s.vad);}}/>
          </div>
          {audActive&&<div style={{fontSize:10,color:'#f6ad55',marginTop:5,flexShrink:0}}>
            {AICONS[aud.label]||''} {aud.label} detected · {Math.round((aud.confidence||0)*100)}% conf
          </div>}
          {!liveAudio&&<div style={{fontSize:9,color:'#1c2740',marginTop:4,flexShrink:0}}>
            synthetic · per-seat config active
          </div>}
        </div>

        <div className="dp" style={{flex:'0 0 28%'}}>
          <div className="dp-hdr">
            <span className="dp-ttl">IMU / Road Quality</span>
            {state.vib_override&&<span style={{fontSize:9,color:'#f6ad55'}}>override</span>}
          </div>
          <div className="dp-body" style={{display:'flex',flexDirection:'column',gap:6}}>
            <RoadQualityChart vib={state.vibration}/>
            <div style={{flexShrink:0}}>
              <div style={{fontSize:9,color:'#2a3a50',marginBottom:4,textTransform:'uppercase',letterSpacing:'.8px'}}>Driving Condition</div>
              <div className="imu-btns">
                {imuPresets.map(function(p){
                  var isOn=state.vib_override&&state.vib_road_quality===p.q&&
                    Math.abs((state.vib_rms||0)-p.rms)<0.1;
                  return <button key={p.id} className={'imu-btn'+(isOn?' on':'')}
                    onClick={function(){send({cmd:'configure_vibration',override:true,road_quality:p.q,rms:p.rms});}}>
                    {p.label}
                  </button>;
                })}
                <button className={'imu-btn'+((!state.vib_override)?' on':'')}
                  onClick={function(){send({cmd:'configure_vibration',override:false});}}>
                  CSV Replay
                </button>
              </div>
            </div>
          </div>
        </div>

        <div className="dp" style={{flex:1}}>
          <div className="dp-hdr">
            <span className="dp-ttl">Scenarios</span>
          </div>
          <div className="dp-body" style={{overflowY:'auto'}}>
            <ScenarioBar list={scenarios} current={state.scenario}
              demoRunning={state.demo_running} send={send}/>
          </div>
        </div>
      </div>

      {/* ── Col 3: Seat Status + Cabin Map ── */}
      <div className="drv-col">
        <div className="dp" style={{flex:'0 0 52%'}}>
          <div className="dp-hdr">
            <span className="dp-ttl">Seat Configuration &amp; Status</span>
            <span className="dp-sub">click to edit</span>
          </div>
          <div className="dp-body" style={{overflowY:'auto'}}>
            <SeatStatusTable
              seatConfigs={state.seat_configs}
              radarSeats={state.radar}
              onSelect={onSelectSeat}/>
          </div>
        </div>
        <div className="dp" style={{flex:1}}>
          <div className="dp-hdr">
            <span className="dp-ttl">Cabin Occupancy</span>
          </div>
          <div className="dp-body">
            <CabinMapMini seatConfigs={state.seat_configs} onSelect={onSelectSeat}/>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── InfotainmentView ── */
function InfotainmentView({state,send}){
  var load=state.cognitive_load||0;
  var col=loadCol(load);
  var top=(state.factors||[])[0]||null;
  return (
    <div className="iv">
      {/* Top: full-width vehicle cabin visualization */}
      <div className="iv-top">
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'1.5px',color:'#2a3a50',marginBottom:10}}>
            Vehicle Cabin Status
          </div>
          <CarSVG seatConfigs={state.seat_configs}/>
          <div style={{fontSize:10,color:'#2a3a50',marginTop:8}}>
            {top
              ? (top.charAt(0).toUpperCase()+top.slice(1))
              : 'All occupants nominal'}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,minWidth:160}}>
          {SEAT_IDS.map(function(sid){
            var c=(state.seat_configs&&state.seat_configs[sid])||{};
            if(!c.occupied)return null;
            var d=c.distress||0;
            var sc=d>0.7?'#fc8181':d>0.35?'#f6ad55':'#00d4b0';
            return (
              <div key={sid} style={{display:'flex',alignItems:'center',gap:8,fontSize:10}}>
                <span style={{color:sc}}>{ICONS[c.kind]||'👤'}</span>
                <span style={{color:'#4a6580',width:70}}>{SEAT_LABELS[sid]}</span>
                <span style={{color:sc,fontWeight:600}}>{c.audio_event&&c.audio_event!=='none'?c.audio_event:c.emotion||'calm'}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Bottom: Issue | Load Score | Recommendation */}
      <div className="iv-bottom">
        <div className="iv-col iv-l">
          <IssuePanel state={state}/>
        </div>
        <div className="iv-col iv-c">
          <CircularGauge value={load}/>
        </div>
        <div className="iv-col iv-r">
          <RecommendationPanel mitigations={state.mitigations} send={send}/>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const INIT={
    cognitive_load:0,factors:[],radar:{},audio:{},vehicle:{},mitigations:[],
    scenario:'idle',demo_running:false,latency_ms:0,
    seat_configs:{
      driver:{occupied:true,kind:'adult',buckled:true,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      front_passenger:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      rear_left:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
      rear_right:{occupied:false,kind:'unknown',buckled:false,distress:0,audio_event:'none',heart_rate_bpm:null,respiration_rpm:null,emotion:'calm'},
    },
    driver_emotion:'calm',
    vib_override:false,vib_road_quality:'smooth',vib_rms:0.05,
    world_speed_kmh:60,world_visibility:'good',world_pothole_ahead_m:null,
    vision_driver:null,vision_objects:null,vibration:{},
  };
  const [state,setState]=useState(INIT);
  const [conn,setConn]=useState(false);
  const [scenarios,setScenarios]=useState([]);
  const [liveAudio,setLiveAudio]=useState(false);
  const [liveVision,setLiveVision]=useState(false);
  const [tab,setTab]=useState('replay');
  const [selSeat,setSelSeat]=useState(null);
  const ws=useRef(null);

  useEffect(function(){
    fetch('/api/scenarios').then(function(r){return r.json();})
      .then(function(d){setScenarios(d.scenarios||[]);}).catch(function(){});
    fetch('/api/caps').then(function(r){return r.json();})
      .then(function(d){setLiveAudio(d.live_audio);setLiveVision(d.live_vision);}).catch(function(){});
    var proto=location.protocol==='https:'?'wss:':'ws:';
    var sock=new WebSocket(proto+'//'+location.host+'/ws');
    ws.current=sock;
    sock.onopen=function(){setConn(true);};
    sock.onclose=function(){setConn(false);};
    sock.onmessage=function(e){setState(JSON.parse(e.data));};
    return function(){sock.close();};
  },[]);

  const send=useCallback(function(msg){
    if(ws.current&&ws.current.readyState===1)ws.current.send(JSON.stringify(msg));
  },[]);

  var tabNames={replay:'Data Replay View',info:'Infotainment View'};

  return (
    <div className="hmi">
      <div className="hmi-hdr">
        <div>
          <div className="logo"><span>Cabin</span>Sense</div>
          <div className="tagline">In-Cabin Intelligence</div>
        </div>
        <div className="sp"/>
        <span className="view-lbl">{tabNames[tab]}</span>
        <div className="sp"/>
        <Clock/>
        <div className={'conn-dot'+(conn?' on':'')}/>
        <span className="lat">{state.latency_ms}ms</span>
      </div>

      <div className="hmi-content">
        {tab==='replay'&&(
          <div className="hmi-view">
            <DataReplayView state={state} send={send} ws={ws}
              liveAudio={liveAudio} liveVision={liveVision}
              onSelectSeat={setSelSeat} scenarios={scenarios}/>
          </div>
        )}
        {tab==='info'&&(
          <div className="hmi-view">
            <InfotainmentView state={state} send={send}/>
          </div>
        )}
      </div>

      <div className="hmi-tabs">
        <button className={'hmi-tab'+(tab==='replay'?' on':'')}
          onClick={function(){setTab('replay');}}>
          📊 Data Replay View
        </button>
        <button className={'hmi-tab'+(tab==='info'?' on':'')}
          onClick={function(){setTab('info');}}>
          🚗 Infotainment View
        </button>
      </div>

      {selSeat&&(
        <SeatConfigPanel
          seatId={selSeat}
          config={state.seat_configs&&state.seat_configs[selSeat]}
          send={send}
          onClose={function(){setSelSeat(null);}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
