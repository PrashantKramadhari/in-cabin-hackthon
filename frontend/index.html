<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CabinSense</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.12.17/babel.min.js"></script>
<style>
/* ─── Theme tokens (web-standard typography + semantic colors) ─── */
:root,[data-theme="dark"]{
  color-scheme:dark;
  --font-base:16px;
  --font-sm:0.875rem;
  --font-xs:0.75rem;
  --font-lg:1.125rem;
  --font-xl:1.25rem;
  --font-2xl:1.5rem;
  --line-height:1.5;
  --bg-page:#0f172a;
  --bg-shell:#020617;
  --bg-surface:rgba(255,255,255,.04);
  --bg-panel:rgba(255,255,255,.03);
  --bg-elevated:#1e293b;
  --bg-input:rgba(0,0,0,.35);
  --bg-video:rgba(0,0,0,.4);
  --bg-subtle:rgba(255,255,255,.04);
  --bg-chip:rgba(255,255,255,.06);
  --bg-chip-active:rgba(13,148,136,.14);
  --bg-overlay:rgba(2,6,23,.82);
  --text-primary:#f8fafc;
  --text-secondary:#cbd5e1;
  --text-muted:#94a3b8;
  --text-faint:#64748b;
  --border-default:rgba(255,255,255,.1);
  --border-subtle:rgba(255,255,255,.07);
  --border-strong:rgba(255,255,255,.14);
  --accent:#14b8a6;
  --accent-hover:#2dd4bf;
  --accent-muted:rgba(20,184,166,.12);
  --accent-border:rgba(20,184,166,.35);
  --warn:#f59e0b;
  --warn-muted:rgba(245,158,11,.12);
  --crit:#ef4444;
  --crit-muted:rgba(239,68,68,.12);
  --info:#60a5fa;
  --shadow-lg:0 24px 64px rgba(0,0,0,.55);
  --shadow-panel:0 30px 80px rgba(0,0,0,.75);
  --grid-bg:linear-gradient(150deg,#0f172a 0%,#020617 100%);
  --grid-border:rgba(20,184,166,.22);
  --grid-glow:rgba(20,184,166,.05);
  --canvas-bg:#0c1220;
  --radar-grid:rgba(20,184,166,.22);
  --radar-dot:rgba(20,184,166,.55);
  --radar-label:#94a3b8;
  --range-track:rgba(255,255,255,.14);
  --range-thumb-border:#0f172a;
  --tab-active-bg:rgba(20,184,166,.08);
  --logo-filter:invert(1);
  --logo-blend:screen;
  --transition-theme:background .2s,color .2s,border-color .2s;
}
[data-theme="light"]{
  color-scheme:light;
  --bg-page:#f1f5f9;
  --bg-shell:#ffffff;
  --bg-surface:#ffffff;
  --bg-panel:#ffffff;
  --bg-elevated:#f8fafc;
  --bg-input:#ffffff;
  --bg-video:#e2e8f0;
  --bg-subtle:#f1f5f9;
  --bg-chip:#f1f5f9;
  --bg-chip-active:rgba(13,148,136,.12);
  --bg-overlay:rgba(15,23,42,.45);
  --text-primary:#0f172a;
  --text-secondary:#334155;
  --text-muted:#64748b;
  --text-faint:#94a3b8;
  --border-default:#e2e8f0;
  --border-subtle:#f1f5f9;
  --border-strong:#cbd5e1;
  --accent:#0d9488;
  --accent-hover:#0f766e;
  --accent-muted:rgba(13,148,136,.1);
  --accent-border:rgba(13,148,136,.35);
  --warn:#d97706;
  --warn-muted:rgba(217,119,6,.1);
  --crit:#dc2626;
  --crit-muted:rgba(220,38,38,.1);
  --info:#2563eb;
  --shadow-lg:0 20px 48px rgba(15,23,42,.12);
  --shadow-panel:0 16px 40px rgba(15,23,42,.1);
  --grid-bg:linear-gradient(150deg,#ffffff 0%,#f8fafc 100%);
  --grid-border:rgba(13,148,136,.25);
  --grid-glow:rgba(13,148,136,.06);
  --canvas-bg:#e2e8f0;
  --radar-grid:rgba(13,148,136,.4);
  --radar-dot:rgba(13,148,136,.75);
  --radar-label:#475569;
  --range-track:#cbd5e1;
  --range-thumb-border:#ffffff;
  --tab-active-bg:rgba(13,148,136,.08);
  --logo-filter:none;
  --logo-blend:normal;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg-page);color:var(--text-secondary);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:var(--font-base);line-height:var(--line-height);-webkit-font-smoothing:antialiased;
  transition:var(--transition-theme)}

/* ─── Shell ─── */
.hmi{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg-page)}
.hmi-hdr{height:48px;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;
  background:var(--bg-shell);border-bottom:1px solid var(--border-default);transition:var(--transition-theme)}
.sp{flex:1}
.hmi-clock{font-size:var(--font-sm);color:var(--text-muted);font-variant-numeric:tabular-nums}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);transition:background .4s}
.dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent-border)}
.lat{font-size:var(--font-xs);color:var(--text-faint);font-variant-numeric:tabular-nums}
.theme-toggle{display:flex;align-items:center;gap:2px;padding:3px;border-radius:8px;
  background:var(--bg-chip);border:1px solid var(--border-default)}
.theme-toggle button{padding:5px 12px;border-radius:6px;font-size:var(--font-xs);font-weight:600;
  font-family:inherit;cursor:pointer;border:none;background:transparent;color:var(--text-muted);
  transition:all .15s;line-height:1.2}
.theme-toggle button:hover{color:var(--text-secondary)}
.theme-toggle button.on{background:var(--bg-surface);color:var(--accent);
  box-shadow:0 1px 2px rgba(15,23,42,.08)}
.hmi-content{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow:hidden}
.hmi-tabs{height:48px;display:flex;background:var(--bg-shell);border-top:1px solid var(--border-default);flex-shrink:0}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-size:var(--font-sm);
  font-weight:500;color:var(--text-muted);cursor:pointer;border:none;background:none;
  border-top:2px solid transparent;transition:all .2s}
.tab.on{color:var(--accent);border-top-color:var(--accent);background:var(--tab-active-bg);font-weight:600}

/* ─── Brand Bar ─── */
.brand-bar{display:flex;align-items:center;justify-content:space-between;
  width:81vw;min-width:900px;padding:0 6px;margin-bottom:12px}
.jag-side{display:flex;align-items:center;gap:12px}
.brand-sep{flex:1;height:1px;margin:0 20px;
  background:linear-gradient(to right,var(--border-subtle),var(--accent-border),var(--border-subtle))}
.cs-side{text-align:right}
.cs-name{font-size:var(--font-2xl);font-weight:700;letter-spacing:-.5px;color:var(--text-primary);line-height:1.2}
.cs-name em{color:var(--accent);font-style:normal}
.cs-sub{font-size:var(--font-xs);letter-spacing:2px;color:var(--text-muted);
  text-transform:uppercase;margin-top:4px;font-weight:500}

/* ─── Sensor View — free-form draggable panels ─── */
.sv-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;
  width:100%;min-height:0;padding:0 12px 12px}
.sv{position:relative;
  width:81vw;height:81vh;min-width:900px;min-height:520px;
  max-width:98vw;max-height:calc(100vh - 140px);
  border-radius:14px;overflow:hidden;
  border:1px solid var(--grid-border);background:var(--grid-bg);
  box-shadow:0 0 0 1px var(--grid-glow),var(--shadow-panel),inset 0 1px 0 var(--border-subtle);
  transition:var(--transition-theme);
  resize:both;flex-shrink:0}
.sv::after{content:'';position:absolute;right:3px;bottom:3px;width:18px;height:18px;
  pointer-events:none;z-index:50;border-radius:0 0 12px 0;opacity:.65;
  background:linear-gradient(135deg,transparent 45%,var(--accent) 45%,var(--accent) 55%,transparent 55%),
    linear-gradient(135deg,transparent 58%,var(--accent) 58%,var(--accent) 66%,transparent 66%)}
.sv:hover::after{opacity:1}
.iv-shell.sensor-shell{justify-content:flex-start;overflow:auto;min-height:0;padding:10px 0;gap:10px}
.iv-shell.info-shell{justify-content:flex-start;overflow-y:auto;padding:14px 0 20px;gap:0}
.panel-slot{position:absolute;box-sizing:border-box;padding:0;min-width:140px;min-height:90px;
  display:flex;flex-direction:column}
.panel-drag-bar{height:10px;cursor:grab;border-radius:10px 10px 0 0;flex-shrink:0;
  background:var(--border-subtle);display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border-default);border-bottom:none;user-select:none}
.panel-drag-bar:active{cursor:grabbing;background:var(--accent-muted)}
.panel-grip{font-size:11px;color:var(--text-faint);letter-spacing:3px;line-height:1;pointer-events:none}
.panel-slot-body{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
.panel-slot-body>.panel{flex:1;height:100%;min-height:0;border-radius:0 0 10px 10px;margin:0}
.panel-resize-handle{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;
  z-index:2;border-radius:0 0 10px 0;
  background:linear-gradient(135deg,transparent 45%,var(--accent) 45%,var(--accent) 55%,transparent 55%),
    linear-gradient(135deg,transparent 60%,var(--accent) 60%,var(--accent) 68%,transparent 68%);
  opacity:.55}
.panel-resize-handle:hover{opacity:1}
.row-lbl{font-size:var(--font-sm);color:var(--text-secondary);flex-shrink:0}
.row-lbl.wide{width:88px}
.row-lbl.narrow{width:40px}

/* ─── Panels ─── */
.panel{background:var(--bg-panel);border:1px solid var(--border-default);border-radius:10px;
  padding:14px 16px;display:flex;flex-direction:column;overflow:auto;
  min-height:80px;min-width:120px;transition:var(--transition-theme)}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0}
.pt{font-size:var(--font-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:600}
.ps{font-size:var(--font-sm);color:var(--text-secondary)}
.pb{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;
  gap:0;justify-content:space-evenly}

/* ─── Shared controls ─── */
.row{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lbl{font-size:var(--font-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);flex-shrink:0;font-weight:600}
.val{font-size:var(--font-base);font-weight:600;color:var(--text-primary);min-width:52px;text-align:right;flex-shrink:0}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.btn{padding:8px 16px;border-radius:6px;font-size:var(--font-sm);border:1px solid var(--border-default);
  background:var(--bg-subtle);color:var(--text-secondary);cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--accent-muted);border-color:var(--accent);color:var(--accent)}
.btn.warn{background:var(--warn-muted);border-color:var(--warn);color:var(--warn)}
.btn.crit{background:var(--crit-muted);border-color:var(--crit);color:var(--crit)}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;
  background:var(--range-track);outline:none;flex:1;cursor:pointer;border:none;min-width:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--range-thumb-border)}
input[type=checkbox]{accent-color:var(--accent);cursor:pointer;width:16px;height:16px}
.divider{height:1px;background:var(--border-default);flex-shrink:0;margin:0}
.select-input{background:var(--bg-input);border:1px solid var(--border-default);
  color:var(--text-primary);border-radius:6px;padding:4px 8px;font-size:var(--font-sm);cursor:pointer;max-width:180px}

/* ─── Video ─── */
.vid-box{background:var(--bg-video);border-radius:8px;flex:1;display:flex;align-items:center;
  justify-content:center;color:var(--text-faint);font-size:var(--font-sm);overflow:hidden;min-height:0;
  border:1px solid var(--border-default)}
.vid-box video{width:100%;height:100%;object-fit:cover;border-radius:8px}

/* ─── Audio widget ─── */
.db-big{font-size:2rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.db-unit{font-size:var(--font-sm);color:var(--text-muted);margin-left:4px}
.vad-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;
  background:var(--border-strong);transition:background .2s}
.vad-dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent-border)}
.noise-bar{height:6px;background:var(--range-track);border-radius:3px;overflow:hidden;flex:1}
.noise-fill{height:100%;border-radius:3px;transition:width .15s,background .3s}
.mic-btn{padding:8px 16px;border-radius:6px;font-size:var(--font-sm);font-weight:600;
  font-family:inherit;cursor:pointer;transition:all .2s}
.mic-start{background:var(--accent-muted);border:1px solid var(--accent);color:var(--accent)}
.mic-stop{background:var(--crit-muted);border:1px solid var(--crit);color:var(--crit)}
.canvas-wrap{border-radius:6px;overflow:hidden;background:var(--canvas-bg);
  border:1px solid var(--border-default)}
.det-badge{font-size:var(--font-sm);padding:5px 12px;border-radius:10px;background:var(--warn-muted);
  border:1px solid var(--warn);color:var(--warn);flex-shrink:0;align-self:flex-start;font-weight:500}

/* ─── Seats widget ─── */
.seat-grid{display:flex;flex-wrap:wrap;gap:6px;flex:1;align-content:flex-start}
.seat-grid>.seat-cell:nth-child(-n+2){width:calc(50% - 3px)}
.seat-grid>.seat-cell:nth-child(n+3){width:calc(33.33% - 4px)}
.seat-cell{border-radius:8px;border:1px solid var(--border-default);background:var(--bg-subtle);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;padding:8px;transition:all .3s;position:relative}
.seat-cell.occ{border-color:var(--border-strong);background:var(--bg-chip)}
.seat-cell.warn{border-color:var(--warn);background:var(--warn-muted)}
.seat-cell.crit{border-color:var(--crit);background:var(--crit-muted)}
.seat-icon{font-size:24px}
.seat-name{font-size:var(--font-xs);text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);font-weight:600}
.seat-tag{font-size:var(--font-xs);color:var(--warn);margin-top:2px}
.seat-belt{position:absolute;top:6px;right:8px;font-size:var(--font-sm)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.seat-cell.warn .seat-icon,.seat-cell.crit .seat-icon{animation:pulse 1.4s infinite}

/* ─── Road Quality ─── */
.wheel-map{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex-shrink:0}
.wheel{border-radius:6px;height:28px;display:flex;align-items:center;justify-content:center;
  font-size:var(--font-sm);font-weight:600;transition:background .3s,color .3s}

/* ─── Timeline ─── */
.timeline{display:flex;align-items:center;gap:10px;height:100%;overflow:hidden}
.sc-scroll{display:flex;gap:6px;flex:1;overflow-x:auto;align-items:center}
.sc-scroll::-webkit-scrollbar{height:4px}
.sc-scroll::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:2px}
.sc-btn{padding:8px 16px;border-radius:6px;font-size:var(--font-sm);border:1px solid var(--border-default);
  background:var(--bg-subtle);color:var(--text-secondary);cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .15s;font-family:inherit;font-weight:500}
.sc-btn:hover{border-color:var(--accent);color:var(--accent)}
.sc-btn.on{background:var(--accent-muted);border-color:var(--accent);color:var(--accent)}
.demo-btn{padding:8px 20px;border-radius:6px;font-size:var(--font-sm);font-weight:600;
  white-space:nowrap;flex-shrink:0;font-family:inherit;cursor:pointer}
.demo-run{background:var(--accent-muted);border:1px solid var(--accent);color:var(--accent)}
.demo-stop{background:var(--crit-muted);border:1px solid var(--crit);color:var(--crit)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.demo-ind{font-size:var(--font-xs);color:var(--warn);animation:blink 1s infinite;flex-shrink:0}

/* ─── Overlay ─── */
.overlay{position:fixed;inset:0;background:var(--bg-overlay);display:flex;
  align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.ov-box{background:var(--bg-elevated);border:1px solid var(--accent-border);border-radius:12px;
  padding:24px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg)}
.ov-title{font-size:var(--font-base);font-weight:600;color:var(--accent);margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center}
.cfg-sec{margin-bottom:14px}
.cfg-lbl{font-size:var(--font-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.btn-grp{display:flex;flex-wrap:wrap;gap:6px}
.cfg-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rval{font-size:var(--font-sm);color:var(--text-primary);font-weight:600;min-width:52px;text-align:right}
.xbtn{padding:6px 12px;border-radius:6px;font-size:var(--font-sm);border:1px solid var(--border-default);
  background:var(--bg-subtle);color:var(--text-secondary);transition:all .15s;cursor:pointer;font-family:inherit}
.xbtn.sel{background:var(--accent-muted);border-color:var(--accent);color:var(--accent)}
.close-btn{background:none;border:1px solid var(--border-default);color:var(--text-muted);border-radius:6px;
  padding:6px 14px;font-size:var(--font-sm);cursor:pointer;font-family:inherit}
.close-btn:hover{color:var(--text-secondary);border-color:var(--border-strong)}

/* ─── Debug View ─── */
.dbg-shell{justify-content:flex-start;overflow-y:auto;padding:14px 20px 20px;gap:14px}
.dbg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%}
.dbg-col{display:flex;flex-direction:column;gap:14px}
.dbg-card{background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:10px;overflow:hidden}
.dbg-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-subtle);border-bottom:1px solid var(--border-default)}
.dbg-title{font-size:var(--font-xs);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted)}
.dbg-badge{font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.dbg-badge.ok{background:rgba(20,184,166,.15);color:var(--accent);border:1px solid var(--accent-border)}
.dbg-badge.warn{background:rgba(246,173,85,.12);color:#f6ad55;border:1px solid rgba(246,173,85,.3)}
.dbg-badge.crit{background:rgba(252,129,129,.12);color:#fc8181;border:1px solid rgba(252,129,129,.3)}
.dbg-body{padding:10px 12px;font-size:var(--font-xs);font-family:monospace;display:flex;flex-direction:column;gap:5px}
.dbg-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-bottom:1px solid var(--border-subtle);padding-bottom:4px}
.dbg-row:last-child{border-bottom:none;padding-bottom:0}
.dbg-k{color:var(--text-muted);flex-shrink:0}
.dbg-v{color:var(--text-primary);font-weight:600;text-align:right;word-break:break-all}
.dbg-v.hi{color:var(--accent)}
.dbg-v.warn{color:#f6ad55}
.dbg-v.crit{color:#fc8181}
.dbg-seat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 12px}
.dbg-seat{background:var(--bg-subtle);border:1px solid var(--border-default);border-radius:6px;padding:6px 8px}
.dbg-seat.occ{border-color:var(--accent-border)}
.dbg-seat-id{font-size:0.6rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-faint);margin-bottom:3px}
.dbg-seat-row{display:flex;justify-content:space-between;font-size:var(--font-xs);font-family:monospace}
.dbg-seat-k{color:var(--text-muted)}
.dbg-seat-v{color:var(--text-primary);font-weight:600}
.dbg-viz-row{display:grid;grid-template-columns:1.2fr 1fr;gap:14px;width:100%;margin-bottom:14px}
.dbg-models-bar{width:100%;margin-bottom:14px;background:var(--bg-elevated);border:1px solid var(--border-default);
  border-radius:10px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:12px 24px;align-items:center}
.dbg-models-title{font-size:var(--font-xs);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--text-muted);width:100%;margin-bottom:2px}
.dbg-model-chip{display:flex;flex-direction:column;gap:2px;min-width:140px}
.dbg-model-kind{font-size:0.6rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:600}

<script>
window.onerror=function(m,s,l,c,e){
  var d=document.getElementById('err');d.style.display='block';
  d.textContent='JS ERROR\n'+m+'\n'+s+':'+l+(e?'\nStack:\n'+e.stack:'');};

<script>
/* AudioWorklet — chunk size synced from /api/caps (default 2.0 s @ 16 kHz) */
window._AUDIO_CHUNK_SAMPLES=32000;
window._makeChunkerUrl=function(target){
  var src=[
    'class Chunker extends AudioWorkletProcessor {',
    '  constructor(){super();this._buf=[];this._target='+target+';}',
    '  process(inputs){',
    '    var ch=inputs[0][0];if(!ch)return true;',
    '    for(var i=0;i<ch.length;i++){this._buf.push(ch[i]);}',
    '    while(this._buf.length>=this._target){',
    '      this.port.postMessage(this._buf.splice(0,this._target));',
    '    }',
    '    return true;',
    '  }',
    '}',
    'registerProcessor("chunker",Chunker);'
  ].join('\n');
  return URL.createObjectURL(new Blob([src],{type:'application/javascript'}));
};
window._CHUNKER_URL=window._makeChunkerUrl(window._AUDIO_CHUNK_SAMPLES);
</script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

/* ── constants ── */
const SEAT_IDS=['driver','front_passenger','rear_left','rear_middle','rear_right'];
const SEAT_LABELS={driver:'Driver',front_passenger:'Front Pass.',rear_left:'Rear Left',rear_middle:'Rear Mid.',rear_right:'Rear Right'};
const ICONS={adult:'👤',child:'🧒',infant:'🧒',pet:'🐾',unknown:'👤'};
const AICONS={none:'—',talking:'💬',shouting:'📢',crying:'😢',happy:'😊',barking:'🐕'};
const loadCol=function(v){return v<33?'#14b8a6':v<66?'#f59e0b':'#ef4444';};
const loadLbl=function(v){return v<20?'Nominal':v<40?'Low':v<66?'Medium':v<85?'High':'Critical';};
const fmt2=function(n){return n<10?'0'+n:''+n;};
const cssVar=function(name,fallback){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||fallback;
};

/* human-readable issue names for infotainment */
var ISSUE_MAP={

  'loose backpack (camera)':'Loose Object Detected',

  'loose bottle (camera)':'Loose Object Detected',
  'loose laptop (camera)':'Loose Object Detected'
};

/* IMU driving presets */
var IMU_PRESETS=[
  {id:'smooth', label:'Smooth Road',   q:'smooth',  rms:0.04},
  {id:'breaker',label:'Speed Breaker', q:'rough',   rms:0.38},
  {id:'pothole',label:'Pothole',       q:'pothole', rms:0.65},
  {id:'turn',   label:'Agg. Turn',     q:'rough',   rms:0.35},
  {id:'brake',  label:'Hard Braking',  q:'rough',   rms:0.45}
];

/* Road quality presets */
var RQ_PRESETS=[
  {id:'highway',       label:'Highway',          rms:0.04, q:'smooth'},
  {id:'city',          label:'City Road',         rms:0.14, q:'smooth'},
  {id:'broken',        label:'Broken Road',       rms:0.36, q:'rough'},

  {id:'offroad',       label:'Offroad',           rms:0.78, q:'pothole'}
];

/* ── Clock ── */
function Clock(){
  const [t,setT]=useState('');
  useEffect(function(){
    var upd=function(){
      var d=new Date(),h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
      var ap=h>=12?'PM':'AM';h=h%12||12;
      setT(fmt2(h)+':'+fmt2(m)+':'+fmt2(s)+' '+ap);
    };
    upd();var id=setInterval(upd,1000);return function(){clearInterval(id);};
  },[]);
  return <span className="hmi-clock">{t}</span>;
}

function ThemeToggle({theme,setTheme}){
  return (
    <div className="theme-toggle" role="group" aria-label="Color theme">
      <button type="button" className={theme==='light'?'on':''}
        onClick={function(){setTheme('light');}}>Light</button>
      <button type="button" className={theme==='dark'?'on':''}
        onClick={function(){setTheme('dark');}}>Dark</button>
    </div>
  );
}

/* ── WaveformCanvas: oscilloscope ── */
function WaveformCanvas({analyserRef}){
  const cvRef=useRef(null);
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var id;
    var draw=function(){
      var W=cv.clientWidth||340;var H=cv.clientHeight||44;
      if(W<2||H<2){id=requestAnimationFrame(draw);return;}
      if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
      ctx.fillStyle=cssVar('--canvas-bg','#0c1220');ctx.fillRect(0,0,W,H);
      var buf=new Uint8Array(analyserRef.current?analyserRef.current.fftSize:256);
      if(analyserRef.current)analyserRef.current.getByteTimeDomainData(buf);
      ctx.beginPath();ctx.strokeStyle=cssVar('--accent','#14b8a6');ctx.lineWidth=1.5;
      var sl=W/buf.length;
      for(var i=0;i<buf.length;i++){
        var x=i*sl,y=((buf[i]/128)-1)*(H/2)+H/2;
        if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.stroke();
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[]);
  return <canvas ref={cvRef} style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ── SpectrogramCanvas: scrolling waterfall ── */
function SpectrogramCanvas({analyserRef}){
  const cvRef=useRef(null);
  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var id;
    var draw=function(){
      var W=cv.clientWidth||340;var H=cv.clientHeight||80;
      if(W<2||H<2){id=requestAnimationFrame(draw);return;}
      if(cv.width!==W||cv.height!==H){
        cv.width=W;cv.height=H;
        ctx.fillStyle=cssVar('--canvas-bg','#0c1220');ctx.fillRect(0,0,W,H);
      }
      var img=ctx.getImageData(1,0,W-1,H);ctx.putImageData(img,0,0);
      var data=new Uint8Array(128);
      if(analyserRef.current)analyserRef.current.getByteFrequencyData(data);
      for(var i=0;i<H;i++){
        var bi=Math.floor((H-1-i)*data.length/H);
        var v=data[Math.min(bi,data.length-1)];
        var r=v>128?255:v*2;
        var g=v<128?v*2:Math.max(0,255-(v-128)*2);
        var b=v<64?v*4:0;
        ctx.fillStyle='rgb('+r+','+g+','+b+')';
        ctx.fillRect(W-1,i,1,1);
      }
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[]);
  return <canvas ref={cvRef} style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ── AudioWidget ── */
var AUDIO_FILES=[
  {id:'off',          label:'Audio Off'},
  {id:'mic',          label:'Live Mic'},
  {id:'baby_crying',  label:'baby_crying.mp3'},
  {id:'baby_talking', label:'baby_talking.mp3'},
  {id:'baby_happy',   label:'baby_happy.mp3'}
];
var AUDIO_SEAT_OPTS=[
  {id:'none',              label:'No seat'},
  {id:'driver',            label:'Driver'},
  {id:'front_passenger',   label:'Front P.'},
  {id:'rear_left',         label:'Rear L'},
  {id:'rear_middle',       label:'Rear M'},
  {id:'rear_right',        label:'Rear R'}
];
var AUDIO_KIND_OPTS=[{id:'child',label:'Baby'},{id:'pet',label:'Pet'}];
var _AUDIO_EVENT_MAP={baby_crying:'crying',baby_talking:'talking',baby_happy:'happy'};
var _AUDIO_DISTRESS={baby_crying:0.85,baby_talking:0.35,baby_happy:0.1};

function AudioWidget({ws,liveAudio,audio,send,playTrigger,stopTrigger,pipelineDebugRef}){
  const [audioMode,setAudioMode]=useState('off');
  const [seatTarget,setSeatTarget]=useState('none');
  const [kindTarget,setKindTarget]=useState('child');
  const [db,setDb]=useState(28);
  const [vad,setVad]=useState(false);
  const procRef=useRef(null);
  const ctxRef=useRef(null);
  const analyserRef=useRef(null);
  const dbTimerRef=useRef(null);
  const prevCfgRef=useRef(null);
  const audioModeRef=useRef('off');
  const seatTargetRef=useRef('none');
  const kindTargetRef=useRef('child');
  const SR=16000;

  /* fully vacate the previously configured seat */
  var _clearSeat=function(){
    if(prevCfgRef.current&&send){
      send({cmd:'configure_seat',seat:prevCfgRef.current,
            occupied:false,kind:'unknown',audio_event:'none',distress:0});
    }
    prevCfgRef.current=null;
  };

  /* configure a seat with the current audio mode */
  var _applySeat=function(seat,kind,mode){
    if(!seat||seat==='none'||!send)return;
    var audioEvent=_AUDIO_EVENT_MAP[mode]||'none';
    var distress=_AUDIO_DISTRESS[mode]||0;
    send({cmd:'configure_seat',seat:seat,occupied:true,kind:kind,
          audio_event:audioEvent,distress:distress});
    prevCfgRef.current=seat;
  };

  var stopAudio=function(){
    clearInterval(dbTimerRef.current);
    analyserRef.current=null;
    if(procRef.current){
      if(procRef.current.stream)
        procRef.current.stream.getTracks().forEach(function(t){t.stop();});
      if(procRef.current.bufSrc)
        try{procRef.current.bufSrc.stop();}catch(e){}
    }
    if(ctxRef.current){ctxRef.current.close();ctxRef.current=null;}
    procRef.current=null;setDb(28);setVad(false);
    if(pipelineDebugRef&&pipelineDebugRef.current){
      pipelineDebugRef.current.analyserRef={current:null};
      pipelineDebugRef.current.db=28;
      pipelineDebugRef.current.vad=false;
    }
  };

  var _setupContext=async function(){
    var actx=new AudioContext({sampleRate:SR});
    ctxRef.current=actx;
    var an=actx.createAnalyser();an.fftSize=512;an.smoothingTimeConstant=0.6;
    analyserRef.current=an;
    var chunkTarget=window._AUDIO_CHUNK_SAMPLES||32000;
    await actx.audioWorklet.addModule(window._makeChunkerUrl(chunkTarget));
    var chunker=new AudioWorkletNode(actx,'chunker');
    chunker.port.onmessage=function(e){
      if(pipelineDebugRef&&pipelineDebugRef.current)
        pipelineDebugRef.current.lastChunk=e.data;
      if(ws.current&&ws.current.readyState===1)
        ws.current.send(JSON.stringify({cmd:'audio_chunk',data:Array.from(e.data)}));
    };
    var tdata=new Uint8Array(an.fftSize);
    dbTimerRef.current=setInterval(function(){
      if(!analyserRef.current)return;
      analyserRef.current.getByteTimeDomainData(tdata);
      var rms=0;
      for(var i=0;i<tdata.length;i++){var s=(tdata[i]-128)/128;rms+=s*s;}
      rms=Math.sqrt(rms/tdata.length);
      var dbVal=rms>0?Math.round(20*Math.log10(rms)+90):28;
      var dbClamped=Math.max(28,Math.min(110,dbVal));
      setDb(dbClamped);setVad(dbVal>45);
      if(pipelineDebugRef&&pipelineDebugRef.current){
        pipelineDebugRef.current.db=dbClamped;
        pipelineDebugRef.current.vad=dbVal>45;
      }
    },80);
  if(pipelineDebugRef&&pipelineDebugRef.current)
      pipelineDebugRef.current.analyserRef=analyserRef;
    return {actx,an,chunker};
  };

  var startMic=async function(){
    try{
      var st=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:SR,channelCount:1}});
      var {actx,an,chunker}=await _setupContext();
      var src=actx.createMediaStreamSource(st);
      src.connect(an);src.connect(chunker);
      procRef.current={stream:st,src};
    }catch(e){alert('Mic denied: '+e.message);setAudioMode('off');}
  };

  var startFile=async function(filename){
    try{
      var resp=await fetch('/static/audio/'+filename+'.mp3');
      var arrayBuf=await resp.arrayBuffer();
      var {actx,an,chunker}=await _setupContext();
      var audioBuf=await actx.decodeAudioData(arrayBuf);
      var bufSrc=actx.createBufferSource();
      bufSrc.buffer=audioBuf;bufSrc.loop=true;
      bufSrc.connect(an);bufSrc.connect(chunker);
      bufSrc.start();
      procRef.current={bufSrc};
    }catch(e){console.error('Audio file error:',e);setAudioMode('off');}
  };

  var handleMode=function(newMode){
    _clearSeat();
    stopAudio();
    setAudioMode(newMode);audioModeRef.current=newMode;
    if(newMode==='mic')startMic();
    else if(newMode!=='off'){
      startFile(newMode);
      _applySeat(seatTargetRef.current,kindTargetRef.current,newMode);
    }
  };

  var handleSeat=function(newSeat){
    _clearSeat();
    setSeatTarget(newSeat);seatTargetRef.current=newSeat;
    if(audioModeRef.current!=='off'&&audioModeRef.current!=='mic')
      _applySeat(newSeat,kindTargetRef.current,audioModeRef.current);
  };

  var handleKind=function(newKind){
    setKindTarget(newKind);kindTargetRef.current=newKind;
    if(audioModeRef.current!=='off'&&audioModeRef.current!=='mic'&&seatTargetRef.current!=='none')
      _applySeat(seatTargetRef.current,newKind,audioModeRef.current);
  };

  useEffect(function(){return function(){_clearSeat();stopAudio();};},[]);
  useEffect(function(){
    if((playTrigger||0)>0){
      var m=audioModeRef.current;
      if(m&&m!=='off'){
        stopAudio();
        if(m==='mic')startMic();
        else{startFile(m);_applySeat(seatTargetRef.current,kindTargetRef.current,m);}
      }
    }
  },[playTrigger]);
  useEffect(function(){if((stopTrigger||0)>0){_clearSeat();stopAudio();}},[stopTrigger]);

  var aud=audio||{};
  var audActive=aud.label&&aud.label!=='none';
  var isFile=audioMode!=='off'&&audioMode!=='mic';
  var dbPct=Math.min(100,((db-28)/82)*100);
  var dbCol=db>75?'#ef4444':db>55?'#f59e0b':'#14b8a6';

  return (
    <div className="panel" style={{gap:0}}>
      {/* Header row: title + file dropdown */}
      <div className="ph">
        <span className="pt">Audio Input</span>

/* ── VideoWidget ── */
var SYNTH_CLIPS=[
  {id:'off',  label:'Camera Off'},
  {id:'live', label:'Live Camera'}
];

function VideoWidget({ws,liveVision,visionDriver,send,playTrigger,stopTrigger,pipelineDebugRef}){
  const [mode,setMode]=useState('off');
  const [videoFiles,setVideoFiles]=useState([]);
  const vRef=useRef(null);
  const camRef=useRef(null);  /* {interval, canvas, ctx, stream} */
  const synthRef=useRef(null); /* {audio, interval} */
  const modeRef=useRef('off');

  useEffect(function(){
    fetch('/api/videos').then(function(r){return r.json();}).then(function(d){
      setVideoFiles(d.videos||[]);
    }).catch(function(){});
  },[]);

  /* ── helpers ── */
  var wsSend=function(msg){
    if(ws.current&&ws.current.readyState===1)
      ws.current.send(JSON.stringify(msg));
  };

  var pushDebugFrame=function(b64,w,h){
    if(pipelineDebugRef&&pipelineDebugRef.current)
      pipelineDebugRef.current.lastFrame={b64:b64,w:w,h:h,ts:Date.now()};
  };

  var stopAll=function(){
    if(camRef.current){
      clearInterval(camRef.current.interval);
      if(camRef.current.stream)
        camRef.current.stream.getTracks().forEach(function(t){t.stop();});
      camRef.current=null;
    }
    if(synthRef.current){
      clearInterval(synthRef.current.interval);
      if(synthRef.current.audio){
        synthRef.current.audio.pause();
        synthRef.current.audio.src='';
      }
      synthRef.current=null;
    }
    if(vRef.current){vRef.current.srcObject=null;vRef.current.src='';}
    if(pipelineDebugRef&&pipelineDebugRef.current)
      pipelineDebugRef.current.lastFrame=null;
  };

  var startLive=async function(){
    try{
      var st=await navigator.mediaDevices.getUserMedia({video:true});
      vRef.current.srcObject=st;await vRef.current.play();
      var cv2=null,c2=null;
      var interval=setInterval(function(){
        var v=vRef.current;
        if(!v||!v.videoWidth)return;
        if(!cv2){
          var scale=Math.min(1,480/Math.max(v.videoWidth,v.videoHeight));
          cv2=document.createElement('canvas');
          cv2.width=Math.round(v.videoWidth*scale);
          cv2.height=Math.round(v.videoHeight*scale);
          c2=cv2.getContext('2d');
        }
        try{
          c2.drawImage(v,0,0,cv2.width,cv2.height);
          var b64=cv2.toDataURL('image/jpeg',.85).split(',')[1];
          pushDebugFrame(b64,cv2.width,cv2.height);
          wsSend({cmd:'vision_frame',data:b64});
        }catch(e){/* frame skipped */}
      },250);
      camRef.current={interval,canvas:cv2,ctx:c2,stream:st};
    }catch(e){alert('Camera denied: '+e.message);setMode('off');}
  };

  var startSynth=function(clipId){
    /* Draw a simple synthetic cabin on canvas + loop audio */
    var cv2=document.createElement('canvas');cv2.width=320;cv2.height=240;
    var c2=cv2.getContext('2d');
    var draw=function(){
      c2.fillStyle='#0c1420';c2.fillRect(0,0,320,240);
      /* seats outline */
      [[80,80],[240,80],[80,160],[240,160]].forEach(function(p,i){
        c2.strokeStyle='#1c2740';c2.lineWidth=2;
        c2.strokeRect(p[0]-35,p[1]-35,70,70);
        if(i===2){/* rear-left: baby */
          c2.fillStyle='rgba(0,212,176,.15)';c2.fillRect(p[0]-35,p[1]-35,70,70);
          c2.font='32px serif';c2.textAlign='center';c2.fillStyle='#fff';
          var icons={baby_crying:'😢',baby_talking:'👶',baby_happy:'😊'};
          c2.fillText(icons[clipId]||'👶',p[0],p[1]+12);
        }
      });
      c2.fillStyle='rgba(0,212,176,.6)';c2.font='10px monospace';
      c2.textAlign='left';c2.fillText('SYNTHETIC FEED — '+clipId,8,230);
    };
    draw();
    var interval=setInterval(function(){
      draw();
      var b64=cv2.toDataURL('image/jpeg',.7).split(',')[1];
      pushDebugFrame(b64,cv2.width,cv2.height);
      wsSend({cmd:'vision_frame',data:b64});
    },250); /* 4 fps synthetic */

    /* Play audio via <audio> element + Web Audio chain for BabyNet */
    var audio=new Audio('/static/audio/'+clipId+'.mp3');
    audio.loop=true;
    audio.play().catch(function(){});

    synthRef.current={interval,audio};

    /* Show the synthetic canvas in the video box */
    if(vRef.current){
      try{var s=cv2.captureStream(1);vRef.current.srcObject=s;vRef.current.play().catch(function(){});}
      catch(e){/* captureStream not supported — just skip video preview */}
    }
  };

  var _isVideoFile=function(m){return /\.(mp4|mkv|webm|mov|avi)$/i.test(m);};

  var startDefaultVideo=function(filename){
    var vid=vRef.current;
    if(!vid)return;
    vid.src='/videos/'+filename;
    vid.loop=true;vid.muted=true;vid.playsInline=true;
    vid.play().catch(function(e){console.warn('video play:',e);});
    /* Canvas created lazily on first frame so we know the real resolution */
    var cv2=null,c2=null;
    var interval=setInterval(function(){
      var v=vRef.current;
      if(!v||!v.videoWidth||v.readyState<2)return;
      if(!cv2){
        /* preserve aspect ratio, max dimension 480px so Qwen gets a clear image */
        var scale=Math.min(1,480/Math.max(v.videoWidth,v.videoHeight));
        cv2=document.createElement('canvas');
        cv2.width=Math.round(v.videoWidth*scale);
        cv2.height=Math.round(v.videoHeight*scale);
        c2=cv2.getContext('2d');
      }
      try{
        c2.drawImage(v,0,0,cv2.width,cv2.height);
        var b64=cv2.toDataURL('image/jpeg',.85).split(',')[1];
        pushDebugFrame(b64,cv2.width,cv2.height);
        wsSend({cmd:'vision_frame',data:b64});
      }catch(e){/* frame skipped */}
    },250); /* 4 fps — Qwen ~150ms inference, queue maxsize 4 keeps backlog bounded */
    camRef.current={interval,canvas:cv2,ctx:c2,stream:null};
  };

  var handleMode=function(newMode){
    stopAll();
    if(vRef.current)vRef.current.src='';
    wsSend({cmd:'reset_vision'});   // clear Qwen cache + fusion vision state on source change
    setMode(newMode);modeRef.current=newMode;
    if(newMode==='live')startLive();
    else if(_isVideoFile(newMode))startDefaultVideo(newMode);
    else if(newMode.startsWith('baby_'))startSynth(newMode);
  };

  useEffect(function(){return stopAll;},[]);
  useEffect(function(){
    if((playTrigger||0)>0){
      var m=modeRef.current;
      if(m&&m!=='off'){stopAll();if(m==='live')startLive();else if(_isVideoFile(m))startDefaultVideo(m);else if(m.startsWith('baby_'))startSynth(m);}
    }
  },[playTrigger]);
  useEffect(function(){if((stopTrigger||0)>0)stopAll();},[stopTrigger]);

  var vd=visionDriver||{};
  var isDefault=mode==='default_video';
  return (
    <div className="panel">
      <div className="ph">
        <span className="pt">Cabin Video Feed</span>
        <select value={mode} onChange={function(e){handleMode(e.target.value);}} className="select-input">
          <option value="off">Camera Off</option>
          {videoFiles.map(function(f,i){
            return <option key={f} value={f}>Video {i+1} ({f})</option>;
          })}
          {liveVision&&<option value="live">Live Camera</option>}
        </select>
      </div>
      <div className="vid-box" style={{position:'relative'}}>
        {mode==='off'&&<span className="meta-text">Select feed above</span>}
        <video ref={vRef} muted playsInline
          style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:5,
            display:(mode!=='off')?'block':'none'}}/>
        {isDefault&&(
          <div style={{position:'absolute',bottom:6,left:6,fontSize:'var(--font-xs)',
            color:'var(--warn)',background:'var(--bg-overlay)',padding:'2px 6px',borderRadius:3}}>
            DEFAULT VIDEO
          </div>
        )}
      </div>
      {vd.face_detected&&(
        <div style={{display:'flex',gap:10,marginTop:5,fontSize:10,flexShrink:0}}>
          <span className="meta-text">Driver emotion:</span>
          <span style={{color:vd.drowsy?'var(--crit)':'var(--accent)',fontWeight:600}}>
            {vd.emotion}{vd.drowsy?' ⚠ Drowsy':''}
          </span>
        </div>
      )}
    </div>
  );
}

  );

/* ── RoadQualityWidget ── */
function RoadQualityWidget({vib,send}){
  const cvRef=useRef(null);
  const histRef=useRef([]);
  const [roughness,setRoughness]=useState(5);
  const [rqPreset,setRqPreset]=useState('highway');

  useEffect(function(){
    var rms=(vib&&vib.rms_z)||0;
    histRef.current.push(rms);
    if(histRef.current.length>100)histRef.current.shift();
  });

  useEffect(function(){
    var cv=cvRef.current;if(!cv)return;
    var ctx=cv.getContext('2d');var W=cv.width,H=cv.height,id;
    var draw=function(){
      ctx.fillStyle=cssVar('--canvas-bg','#0c1220');ctx.fillRect(0,0,W,H);
      var h=histRef.current;
      if(h.length>1){
        ctx.beginPath();ctx.strokeStyle=cssVar('--accent','#14b8a6');ctx.lineWidth=1.5;
        for(var i=0;i<h.length;i++){
          var x=(i/(h.length-1))*W,y=H-(h[i]/0.9)*(H-4)-2;
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.beginPath();ctx.strokeStyle='rgba(246,173,85,.25)';ctx.lineWidth=1;
        ctx.setLineDash([3,3]);var ty=H-(0.18/0.9)*(H-4)-2;
        ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();ctx.setLineDash([]);
      }
      id=requestAnimationFrame(draw);
    };
    draw();return function(){cancelAnimationFrame(id);};
  },[]);

  var q=(vib&&vib.road_quality)||'smooth';
  var qCol={smooth:'#14b8a6',rough:'#f59e0b',pothole:'#ef4444'};
  var rms=(vib&&vib.rms_z)||0;
  var wPct=Math.min(100,(rms/0.9)*100);
  /* wheel heatmap: 4 wheels, z-axis affects all, x lateral affects LR, y longitudinal affects front/rear */
  var wheels={fl:wPct,fr:wPct,rl:wPct*0.9,rr:wPct*0.9};
  var wCol=function(p){return p>65?'var(--crit)':p>30?'var(--warn)':'var(--text-secondary)';};
  var wBg=function(p){return p>65?'var(--crit-muted)':p>30?'var(--warn-muted)':'var(--bg-chip)';};
  return (
    <div className="panel">
      <div className="ph">
        <span className="pt">Road Quality</span>
        <span style={{fontSize:'var(--font-base)',fontWeight:700,color:qCol[q]||'var(--text-primary)'}}>{q}</span>
      </div>
      {/* RMS chart */}

            var r=v/100*0.9;var qq=r>0.5?'pothole':r>0.15?'rough':'smooth';
            send({cmd:'configure_vibration',override:true,road_quality:qq,rms:parseFloat(r.toFixed(2))});
          }}/>

      {/* Road presets */}
      <div style={{flexShrink:0}}>
        <div className="lbl" style={{marginBottom:4}}>Presets</div>

            return <button key={p.id} className={'btn'+(rqPreset===p.id?' on':'')}
              onClick={function(){

                send({cmd:'configure_vibration',override:true,road_quality:p.q,rms:p.rms});
              }}>
              {p.label}
            </button>;

/* ── RadarWidget ── */
var SEAT_POS_RADAR={
  driver:          {x:42, y:28},
  front_passenger: {x:118,y:28},
  rear_left:       {x:35, y:88},
  rear_middle:     {x:80, y:88},
  rear_right:      {x:125,y:88}
};
var _RADAR_SHORT={driver:'Drv',front_passenger:'FP',rear_left:'RL',rear_middle:'RM',rear_right:'RR'};
var _RADAR_KIND_CYCLE=['none','adult','child','pet'];
var _RADAR_DIST=[
  {id:0,l:'C',col:'#00d4b0'},
  {id:0.35,l:'M',col:'#f6ad55'},
  {id:0.7,l:'H',col:'#fc8181'},
  {id:1.0,l:'P',col:'#f56565'}
];

function RadarWidget({radar,seatConfigs,onSelectSeat,send,scenario}){
  var cvRef=useRef(null);
  var radarRef=useRef(radar);
  var scRef=useRef(seatConfigs);
  var dotsRef=useRef([]);
  var animRef=useRef(null);

  useEffect(function(){radarRef.current=radar;},[radar]);
  useEffect(function(){scRef.current=seatConfigs;},[seatConfigs]);

  useEffect(function(){
    var cv=cvRef.current; if(!cv)return;
    var ctx=cv.getContext('2d');
    var W=cv.width,H=cv.height,SX=W/160,SY=H/115;

    function spawnDots(){
      var r=radarRef.current||{};
      var seats=(r.seats||[]).filter(function(s){return s.occupied;});
      dotsRef.current=[];
      var perSeat=Math.max(6,Math.round((r.point_count||20)/Math.max(1,seats.length)));
      seats.forEach(function(s){
        var pos=SEAT_POS_RADAR[s.seat];if(!pos)return;
        for(var i=0;i<perSeat;i++){
          var a=Math.random()*Math.PI*2,r2=Math.random()*12;
          dotsRef.current.push({seat:s.seat,
            x:pos.x*SX+Math.cos(a)*r2*SX,y:pos.y*SY+Math.sin(a)*r2*SY,
            vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
            life:Math.floor(Math.random()*60+20),maxLife:80});
        }
      });
    }
    spawnDots();
    var si=setInterval(spawnDots,1400);

    function draw(){
      ctx.clearRect(0,0,W,H);
      var gridCol=cssVar('--radar-grid','rgba(20,184,166,.22)');
      var labelCol=cssVar('--radar-label','#94a3b8');
      var dotCol=cssVar('--radar-dot','rgba(20,184,166,.55)');
      var seatEmpty=cssVar('--bg-chip','rgba(255,255,255,.06)');
      var seatBorder=cssVar('--border-default','rgba(255,255,255,.1)');
      ctx.strokeStyle=gridCol;ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(8*SX,3*SY,144*SX,109*SY,8);ctx.stroke();
      ctx.strokeStyle=gridCol;ctx.globalAlpha=0.6;
      ctx.beginPath();ctx.roundRect(18*SX,4*SY,124*SX,18*SY,6);ctx.stroke();
      ctx.globalAlpha=1;
      ctx.fillStyle=cssVar('--accent-muted','rgba(20,184,166,.08)');
      ctx.fillRect(72*SX,10*SY,16*SX,80*SY);

      var sc=scRef.current||{};
      var seatIds=['driver','front_passenger','rear_left','rear_middle','rear_right'];
      seatIds.forEach(function(sid){
        var pos=SEAT_POS_RADAR[sid];if(!pos)return;
        var cfg=sc[sid]||{};
        var kind=cfg.occupied?(cfg.kind||'adult'):'none';
        var isOcc=kind!=='none';
        var strokeCol=isOcc?(kind==='child'?'#f59e0b':kind==='pet'?'#a78bfa':cssVar('--accent','#14b8a6')):cssVar('--border-strong','#64748b');
        ctx.beginPath();ctx.arc(pos.x*SX,pos.y*SY,18*SX,0,Math.PI*2);
        ctx.fillStyle=isOcc?cssVar('--accent-muted','rgba(20,184,166,.12)'):seatEmpty;ctx.fill();
        ctx.strokeStyle=strokeCol;ctx.lineWidth=isOcc?1.5:1;ctx.stroke();
        ctx.fillStyle=isOcc?cssVar('--text-primary','#f8fafc'):cssVar('--text-muted','#94a3b8');
        ctx.font='bold '+(10*SX)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(isOcc?(ICONS[kind]||'?'):'·',pos.x*SX,pos.y*SY);
        ctx.fillStyle=labelCol;ctx.font='600 '+(7*SX)+'px sans-serif';
        var sh=sid==='driver'?'DRV':sid==='front_passenger'?'F.P':sid==='rear_left'?'R.L':sid==='rear_middle'?'R.M':'R.R';
        ctx.fillText(sh,pos.x*SX,(pos.y+14)*SY);
      });

      var dots=dotsRef.current;
      for(var i=dots.length-1;i>=0;i--){
        var d=dots[i];d.x+=d.vx;d.y+=d.vy;d.life--;
        var pos=SEAT_POS_RADAR[d.seat];
        if(pos){var dx=d.x-pos.x*SX,dy=d.y-pos.y*SY;
          if(Math.sqrt(dx*dx+dy*dy)>16*Math.min(SX,SY)){d.vx=-d.vx*.7;d.vy=-d.vy*.7;}}
        if(d.life<=0){dots.splice(i,1);continue;}
        ctx.beginPath();ctx.arc(d.x,d.y,1.4,0,Math.PI*2);
        ctx.fillStyle=dotCol;ctx.globalAlpha=d.life/d.maxLife*.85;ctx.fill();
        ctx.globalAlpha=1;
      }
      animRef.current=requestAnimationFrame(draw);
    }
    draw();
    return function(){cancelAnimationFrame(animRef.current);clearInterval(si);};
  },[]);

  var radarSeats=(radar&&radar.seats)||[];
  var occ=radarSeats.filter(function(s){return s.occupied;});
  var pts=(radar&&radar.point_count)||0;

  return (
    <div className="panel" style={{gap:0}}>
      <div className="ph" style={{marginBottom:6}}>
        <span className="pt">mmWave Radar</span>
        <span className="hint-text" style={{color:'var(--accent)',fontWeight:600}}>{pts} pts</span>
      </div>

      <canvas ref={cvRef} width="160" height="115"
        style={{width:'100%',height:'auto',flexShrink:0,display:'block',marginBottom:6}}/>

      {/* Inline seat kind selector — FP, RL, RR (driver excluded) */}
      {(function(){
        var _seats=[
          {id:'front_passenger',label:'F.P'},
          {id:'rear_left',      label:'R.L'},
          {id:'rear_middle',    label:'R.M'},
          {id:'rear_right',     label:'R.R'},
        ];
        var _kinds=[
          {k:'none',   icon:'—',   col:'var(--text-muted)'},
          {k:'adult',  icon:'👤',  col:'var(--accent)'},
          {k:'child',  icon:'🧒',  col:'var(--warn)'},
          {k:'pet',    icon:'🐾',  col:'#a78bfa'},
        ];
        var _setKind=function(sid,k){
          if(k==='none') send({cmd:'configure_seat',seat:sid,occupied:false});
          else           send({cmd:'configure_seat',seat:sid,occupied:true,kind:k});
        };
        var _setHR=function(sid,val){
          send({cmd:'configure_seat',seat:sid,heart_rate_bpm:parseInt(val)});
        };
        return (
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:8,flexShrink:0}}>
            {_seats.map(function(s){
              var c=(seatConfigs&&seatConfigs[s.id])||{};
              var curKind=c.occupied?(c.kind||'adult'):'none';
              var hr=c.heart_rate_bpm||72;
              var hrNorm=c.kind==='child'?115:c.kind==='pet'?125:95;
              var hrCol=hr>hrNorm?'var(--crit)':hr>(hrNorm-20)?'var(--warn)':'var(--accent)';
              return (
                <div key={s.id} style={{display:'flex',flexDirection:'column',gap:3}}>
                  {/* Kind row */}
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <span className="row-lbl narrow" style={{textAlign:'right',fontWeight:600}}>{s.label}</span>
                    {_kinds.map(function(kd){
                      var sel=curKind===kd.k;
                      return (
                        <button key={kd.k} onClick={function(){_setKind(s.id,kd.k);}}
                          style={{flex:1,padding:'7px 0',fontSize:14,borderRadius:5,cursor:'pointer',border:'none',
                            background:sel?'var(--accent-muted)':'var(--bg-subtle)',
                            color:sel?kd.col:'var(--text-muted)',
                            outline:sel?('1.5px solid '+kd.col):'1px solid var(--border-default)',
                            transition:'all .15s'}}>
                          {kd.icon}
                        </button>
                      );
                    })}
                  </div>
                  {/* HR row — only when occupied */}
                  {c.occupied&&(
                    <div style={{display:'flex',alignItems:'center',gap:6,paddingLeft:30}}>
                      <span className="hint-text" style={{flexShrink:0}}>HR</span>
                      <input type="range" min="40" max="180" step="1" value={hr}
                        onChange={function(e){_setHR(s.id,e.target.value);}}
                        style={{flex:1,accentColor:hrCol,height:3,cursor:'pointer'}}/>
                      <span className="meta-text" style={{fontWeight:600,color:hrCol,minWidth:36,textAlign:'right'}}>{hr} bpm</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Live vitals — scrollable remainder */}
      <div style={{flex:1,overflowY:'auto',minHeight:0}}>
        {occ.length===0
          ? <div className="hint-text" style={{textAlign:'center',paddingTop:4}}>no radar returns</div>
          : <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 8px'}}>
            {occ.map(function(s){
              var hr=s.heart_rate_bpm||0,resp=s.respiration_rpm||0;
              var hrCol=hr>115?'var(--crit)':hr>95?'var(--warn)':'var(--accent)';
              return (
                <div key={s.seat} style={{minWidth:0}}>
                  <div className="hint-text" style={{marginBottom:2,display:'flex',gap:3,alignItems:'center'}}>
                    <span>{ICONS[s.occupant]||'👤'}</span>
                    <span style={{color:'var(--text-faint)'}}>{_RADAR_SHORT[s.seat]}</span>
                    {(s.motion||0)>0.4&&<span style={{color:'var(--crit)',marginLeft:'auto'}}>agit</span>}
                  </div>
                  {hr>0&&(
                    <div style={{display:'flex',alignItems:'center',gap:2,marginBottom:2}}>
                      <span className="hint-text" style={{width:14,flexShrink:0}}>HR</span>
                      <div style={{flex:1,height:3,background:'var(--range-track)',borderRadius:1}}>
                        <div style={{width:Math.min(100,(hr/160)*100)+'%',height:'100%',background:hrCol,borderRadius:1,transition:'width .4s'}}/>
                      </div>
                      <span className="hint-text" style={{color:hrCol,minWidth:22,textAlign:'right',fontWeight:600}}>{Math.round(hr)}</span>
                    </div>
                  )}
                  {resp>0&&(
                    <div style={{display:'flex',alignItems:'center',gap:2}}>
                      <span className="hint-text" style={{width:14,flexShrink:0}}>BR</span>
                      <div style={{flex:1,height:3,background:'var(--range-track)',borderRadius:1}}>
                        <div style={{width:Math.min(100,(resp/40)*100)+'%',height:'100%',background:'var(--info)',borderRadius:1,transition:'width .4s'}}/>
                      </div>
                      <span className="hint-text" style={{color:'var(--info)',minWidth:22,textAlign:'right',fontWeight:600}}>{Math.round(resp)}</span>
                    </div>
                  )}
                </div>
              );
            })}
            </div>
        }
      </div>
    </div>
  );
}

/* ── TimelineBar ── */
function TimelineBar({scenarios,current,demoRunning,send,onDemoToggle,onScenarioSelect,
                      showVideo,showAudio,showSeats,liveAudio,liveVision,
                      onToggleVideo,onToggleAudio,onToggleSeats}){
  var chipCls=function(on){return 'chip-btn'+(on?' on':'');};
  var pickScenario=function(name){
    send({cmd:'scenario',name:name});
    if(onScenarioSelect)onScenarioSelect();
  };

  /* Derive input mode */
  var scenarioActive=current&&current!=='idle'&&!demoRunning;
  var modeLabel=scenarioActive
    ? ('Scenario: '+current.replace(/_/g,' '))
    : (liveAudio||liveVision)?'Live A/V':'Manual';
  var modeCol=scenarioActive?'var(--warn)':(liveAudio||liveVision)?'var(--accent)':'var(--info)';

  return (
    <div className="panel" style={{flexDirection:'column',padding:'8px 12px',gap:6,height:'100%'}}>
      {/* Mode indicator row */}
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span className="hint-text" style={{textTransform:'uppercase',letterSpacing:'1px',flexShrink:0}}>Mode:</span>
        <span className="meta-text" style={{fontWeight:600,color:modeCol}}>{modeLabel}</span>
        {scenarioActive&&<span className="hint-text" style={{color:'var(--warn)',
          border:'1px solid var(--warn-muted)',borderRadius:4,padding:'2px 6px',flexShrink:0}}>
          overrides manual
        </span>}
        {!scenarioActive&&<span className="hint-text" style={{flexShrink:0}}>
          {scenarioActive?'':(liveAudio&&liveVision)?'audio+vision active'
            :liveAudio?'audio active':liveVision?'vision active':'configure via Seat Status or Radar'}
        </span>}
        <span style={{flex:1}}/>
        <span className="hint-text" style={{flexShrink:0}}>Panels:</span>
        <button className={chipCls(showVideo)} onClick={onToggleVideo}>Video</button>
        <button className={chipCls(showAudio)} onClick={onToggleAudio}>Audio</button>
        <button className={chipCls(showSeats)} onClick={onToggleSeats}>Seats</button>
      </div>
      {/* Events + Run row */}
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span className="hint-text" style={{textTransform:'uppercase',letterSpacing:'1px',flexShrink:0}}>Events</span>
        <div className="sc-scroll">
          <button className={'sc-btn'+(current==='idle'&&!demoRunning?' on':'')}
            onClick={function(){pickScenario('idle');}}>
            none
          </button>
          {(scenarios||[]).filter(function(s){return s!=='idle';}).map(function(s){
            var nm=s.replace(/_/g,' ');
            return <button key={s} className={'sc-btn'+(current===s&&!demoRunning?' on':'')}
              onClick={function(){pickScenario(s);}}>
              {nm}
            </button>;
          })}
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0,alignItems:'center',marginLeft:4}}>
          <button className={demoRunning?'demo-btn demo-stop':'demo-btn demo-run'}
            onClick={function(){
              if(onDemoToggle)onDemoToggle(!demoRunning);
            }}>
            {demoRunning?'⏹ Stop':'▶ Run'}
          </button>
          {demoRunning&&<span className="demo-ind">● live</span>}
        </div>
      </div>
    </div>
  );
}

/* ── SeatConfigOverlay ── */
function SeatConfigOverlay({seatId,config,send,onClose,scenario}){
  var c=config||{};
  /* Local optimistic state for kind+occupied so clicks are instant */
  var [localKind,setLocalKind]=useState(c.kind||'unknown');
  var [localOcc,setLocalOcc]=useState(!!c.occupied);
  /* Sync when server pushes an update (but don't clobber while user is clicking) */
  useEffect(function(){
    setLocalKind(c.kind||'unknown');
    setLocalOcc(!!c.occupied);
  },[c.kind,c.occupied]);

  var field=function(key,val){send({cmd:'configure_seat',seat:seatId,[key]:val});};
  var setOccupant=function(k){
    if(k==='empty'){
      setLocalOcc(false);
      send({cmd:'configure_seat',seat:seatId,occupied:false});
    } else {
      setLocalOcc(true);setLocalKind(k);
      send({cmd:'configure_seat',seat:seatId,occupied:true,kind:k});
    }
  };
  var aopts={adult:['none','talking','shouting','crying'],child:['none','crying','happy'],
    pet:['none','barking','happy'],unknown:['none','talking','crying','shouting']};
  var opts=aopts[localKind]||['none','talking'];
  return (
    <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div className="ov-box">
        <div className="ov-title">
          <span>{SEAT_LABELS[seatId]||seatId} — Configure</span>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="cfg-sec">
          <div className="cfg-lbl">Occupant</div>
          <div className="btn-grp">
            {['empty','adult','child','pet'].map(function(k){
              var sel=k==='empty'?!localOcc:(localOcc&&localKind===k);
              return <button key={k} className={'xbtn'+(sel?' sel':'')}
                onClick={function(){setOccupant(k);}}>
                {k==='empty'?'Empty':(ICONS[k]||'')+' '+k}
              </button>;
            })}
          </div>
        </div>
        {localOcc&&<>
          <div className="cfg-sec">
            <div className="cfg-row">
              <input type="checkbox" checked={!!c.buckled}
                onChange={function(e){field('buckled',e.target.checked);}}/>
              <span style={{fontSize:'var(--font-sm)',color:c.buckled?'var(--accent)':'var(--crit)',marginLeft:4}}>
                {c.buckled?'Seatbelt Buckled':'Seatbelt Unbuckled'}
              </span>
            </div>
          </div>
          <div className="cfg-sec">
            <div className="cfg-lbl">Audio Event</div>
            <div className="btn-grp">
              {opts.map(function(o){
                return <button key={o} className={'xbtn'+(c.audio_event===o?' sel':'')}
                  onClick={function(){field('audio_event',o);}}>{AICONS[o]||''} {o}</button>;
              })}
            </div>
          </div>
          <div className="cfg-sec">
            <div className="cfg-lbl">Distress Level</div>
            <div className="cfg-row">
              <input type="range" min="0" max="1" step="0.05" value={c.distress||0}
                onChange={function(e){field('distress',parseFloat(e.target.value));}}/>
              <span className="rval">{Math.round((c.distress||0)*100)}%</span>
            </div>
          </div>
          <div className="cfg-sec">
            <div className="cfg-lbl">Emotion</div>
            <div className="btn-grp">
              {['calm','stressed','tired','happy'].map(function(em){
                return <button key={em} className={'xbtn'+(c.emotion===em?' sel':'')}
                  onClick={function(){field('emotion',em);}}>{em}</button>;
              })}
            </div>
          </div>
          <div className="cfg-sec">
            <div className="cfg-lbl">Heart Rate</div>
            <div className="cfg-row">
              <input type="range" min="40" max="160" step="1" value={c.heart_rate_bpm||72}
                onChange={function(e){field('heart_rate_bpm',parseInt(e.target.value));}}/>
              <span className="rval" style={{minWidth:42}}>{c.heart_rate_bpm||72} bpm</span>
            </div>
          </div>
        </>}
      </div>
    </div>
  );
}

/* ── Draggable / resizable panel shell ── */
var DEFAULT_LAYOUT={
  video:   {x:1,  y:1,  w:32, h:38},
  audio:   {x:34, y:1,  w:32, h:38},
  radar:   {x:67, y:1,  w:32, h:76},
  vehicle: {x:1,  y:40, w:32, h:18},
  road:    {x:1,  y:59, w:32, h:18},
  seats:   {x:34, y:40, w:32, h:18},
  imu:     {x:34, y:59, w:32, h:18},
  timeline:{x:1,  y:78, w:98, h:21}
};
var UI_STATE_KEY='cabinsense-ui-state';
var _uiSaveTimer=null;

function mergePanels(saved){
  var merged={};
  Object.keys(DEFAULT_LAYOUT).forEach(function(id){
    var base=DEFAULT_LAYOUT[id];
    var patch=(saved&&saved[id])||{};
    merged[id]={x:patch.x!=null?patch.x:base.x,y:patch.y!=null?patch.y:base.y,
      w:patch.w!=null?patch.w:base.w,h:patch.h!=null?patch.h:base.h};
  });
  return merged;
}

function defaultUiState(){
  return {
    panels:mergePanels(null),
    container:null,
    visibility:{video:true,audio:true,seats:true},
    zOrder:['video','audio','radar','vehicle','road','seats','imu','timeline']
  };
}

function loadUiStateLocal(){
  var state=defaultUiState();
  try{
    var raw=localStorage.getItem(UI_STATE_KEY);
    if(raw){
      var parsed=JSON.parse(raw);
      if(parsed.panels)state.panels=mergePanels(parsed.panels);
      if(parsed.container)state.container=parsed.container;
      if(parsed.visibility)state.visibility=Object.assign({},state.visibility,parsed.visibility);
      if(parsed.zOrder)state.zOrder=parsed.zOrder;
    }
    /* migrate legacy keys */
    var leg=localStorage.getItem('cabinsense-layout');
    if(leg)state.panels=mergePanels(JSON.parse(leg));
    var legSz=localStorage.getItem('cabinsense-container-size');
    if(legSz)state.container=JSON.parse(legSz);
  }catch(e){}
  return state;
}

function saveUiState(state){
  try{localStorage.setItem(UI_STATE_KEY,JSON.stringify(state));}catch(e){}
  clearTimeout(_uiSaveTimer);
  _uiSaveTimer=setTimeout(function(){
    fetch('/api/ui-layout',{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(state)}).catch(function(){});
  },350);
}

function applyContainerSize(el,sz){
  if(!el||!sz)return;
  if(sz.w)el.style.width=sz.w+'px';
  if(sz.h)el.style.height=sz.h+'px';
}

function PanelShell({id,rect,onRectChange,onFocus,zIndex,hidden,children}){
  var shellRef=useRef(null);
  if(hidden||!rect)return null;

  var startDrag=function(e){
    e.preventDefault();onFocus(id);
    var startX=e.clientX,startY=e.clientY;
    var orig={x:rect.x,y:rect.y,w:rect.w,h:rect.h};
    var parent=shellRef.current.parentElement;
    function move(ev){
      var cr=parent.getBoundingClientRect();
      var nx=orig.x+(ev.clientX-startX)/cr.width*100;
      var ny=orig.y+(ev.clientY-startY)/cr.height*100;
      onRectChange(id,{x:Math.max(0,Math.min(100-orig.w,nx)),y:Math.max(0,Math.min(100-orig.h,ny)),w:orig.w,h:orig.h});
    }
    function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  };

  var startResize=function(e){
    e.preventDefault();e.stopPropagation();onFocus(id);
    var startX=e.clientX,startY=e.clientY;
    var orig={x:rect.x,y:rect.y,w:rect.w,h:rect.h};
    var parent=shellRef.current.parentElement;
    function move(ev){
      var cr=parent.getBoundingClientRect();
      var nw=Math.max(12,orig.w+(ev.clientX-startX)/cr.width*100);
      var nh=Math.max(10,orig.h+(ev.clientY-startY)/cr.height*100);
      nw=Math.min(100-orig.x,nw);nh=Math.min(100-orig.y,nh);
      onRectChange(id,{x:orig.x,y:orig.y,w:nw,h:nh});
    }
    function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  };

  return (
    <div ref={shellRef} className="panel-slot"
      style={{left:rect.x+'%',top:rect.y+'%',width:rect.w+'%',height:rect.h+'%',zIndex:zIndex||1}}
      onMouseDown={function(){onFocus(id);}}>
      <div className="panel-drag-bar" onMouseDown={startDrag} title="Drag to move">
        <span className="panel-grip">···</span>
      </div>
      <div className="panel-slot-body">{children}</div>
      <div className="panel-resize-handle" onMouseDown={startResize} title="Drag to resize"/>
    </div>
  );
}

/* ── SensorView (Tab 1) ── */
function SensorView({state,send,ws,liveAudio,liveVision,scenarios,onSelectSeat,
                     playTrigger,stopTrigger,onDemoToggle,localDemoRunning,pipelineDebugRef}){
  var _init=loadUiStateLocal();
  const [showVideo,setShowVideo]=useState(_init.visibility.video!==false);
  const [showAudio,setShowAudio]=useState(_init.visibility.audio!==false);
  const [showSeats,setShowSeats]=useState(_init.visibility.seats!==false);
  const [layout,setLayout]=useState(mergePanels(_init.panels));
  const [zOrder,setZOrder]=useState(_init.zOrder);
  const svRef=useRef(null);
  const containerRef=useRef(_init.container);
  const layoutRef=useRef(layout);
  const zOrderRef=useRef(zOrder);
  const visRef=useRef({video:showVideo,audio:showAudio,seats:showSeats});

  layoutRef.current=layout;
  zOrderRef.current=zOrder;
  visRef.current={video:showVideo,audio:showAudio,seats:showSeats};

  var flushUiState=function(){
    var payload={
      panels:mergePanels(layoutRef.current),
      container:containerRef.current,
      visibility:visRef.current,
      zOrder:zOrderRef.current
    };
    saveUiState(payload);
  };

  useEffect(function(){
    fetch('/api/ui-layout').then(function(r){return r.json();}).then(function(data){
      if(!data||!data.panels)return;
      setLayout(mergePanels(data.panels));
      if(data.zOrder)setZOrder(data.zOrder);
      if(data.visibility){
        setShowVideo(data.visibility.video!==false);
        setShowAudio(data.visibility.audio!==false);
        setShowSeats(data.visibility.seats!==false);
      }
      if(data.container){
        containerRef.current=data.container;
        applyContainerSize(svRef.current,data.container);
      }
      try{localStorage.setItem(UI_STATE_KEY,JSON.stringify(data));}catch(e){}
    }).catch(function(){});
  },[]);

  useEffect(function(){flushUiState();},[layout,showVideo,showAudio,showSeats,zOrder]);

  useEffect(function(){
    var el=svRef.current;if(!el)return;
    applyContainerSize(el,containerRef.current);
    var ro=new ResizeObserver(function(entries){
      var cr=entries[0].contentRect;
      if(cr.width<100||cr.height<100)return;
      containerRef.current={w:Math.round(cr.width),h:Math.round(cr.height)};
      flushUiState();
    });
    ro.observe(el);
    return function(){ro.disconnect();};
  },[]);

  var updateRect=function(id,rect){
    setLayout(function(prev){
      var n=mergePanels(prev);
      n[id]=rect;
      return n;
    });
  };
  var focusPanel=function(id){
    setZOrder(function(prev){
      var n=prev.filter(function(p){return p!==id;});
      n.push(id);return n;
    });
  };
  var zIndex=function(id){return zOrder.indexOf(id)+1;};

  return (
    <div className="sv-wrap">
    <div ref={svRef} className="sv" title="Drag corner to resize dashboard">
      <PanelShell id="video" rect={layout.video} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('video')} hidden={!showVideo}>
        <VideoWidget ws={ws} liveVision={liveVision} visionDriver={state.vision_driver}
          send={send} playTrigger={playTrigger} stopTrigger={stopTrigger}
          pipelineDebugRef={pipelineDebugRef}/>
      </PanelShell>
      <PanelShell id="audio" rect={layout.audio} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('audio')} hidden={!showAudio}>
        <AudioWidget ws={ws} liveAudio={liveAudio} audio={state.audio}
          send={send} playTrigger={playTrigger} stopTrigger={stopTrigger}
          pipelineDebugRef={pipelineDebugRef}/>
      </PanelShell>
      <PanelShell id="radar" rect={layout.radar} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('radar')}>
        <RadarWidget radar={state.radar} seatConfigs={state.seat_configs}
          onSelectSeat={onSelectSeat} send={send} scenario={state.scenario}/>
      </PanelShell>
      <PanelShell id="vehicle" rect={layout.vehicle} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('vehicle')}>
        <VehicleWidget speed={state.world_speed_kmh} visibility={state.world_visibility} send={send}/>
      </PanelShell>
      <PanelShell id="road" rect={layout.road} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('road')}>
        <RoadQualityWidget vib={state.vibration} send={send}/>
      </PanelShell>
      <PanelShell id="seats" rect={layout.seats} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('seats')} hidden={!showSeats}>
        <SeatWidget seatConfigs={state.seat_configs} onSelect={onSelectSeat} compact/>
      </PanelShell>
      <PanelShell id="imu" rect={layout.imu} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('imu')}>
        <IMUWidget vibState={state.vibration} send={send}/>
      </PanelShell>
      <PanelShell id="timeline" rect={layout.timeline} onRectChange={updateRect} onFocus={focusPanel}
        zIndex={zIndex('timeline')}>
        <TimelineBar scenarios={scenarios} current={state.scenario}
          demoRunning={localDemoRunning} send={send} onDemoToggle={onDemoToggle}
          onScenarioSelect={function(){if(onDemoToggle)onDemoToggle(false);}}
          showVideo={showVideo} showAudio={showAudio} showSeats={showSeats}
          liveAudio={liveAudio} liveVision={liveVision}
          onToggleVideo={function(){setShowVideo(function(v){return !v;});}}
          onToggleAudio={function(){setShowAudio(function(v){return !v;});}}
          onToggleSeats={function(){setShowSeats(function(v){return !v;});}}/>
      </PanelShell>
    </div>
    </div>
  );
}

/* ── IssuePanel ── */
function IssuePanel({state}){
  var load=state.cognitive_load||0;
  var factors=state.factors||[];
  var rawFactor=factors[0]||null;
  var issueName=rawFactor?(ISSUE_MAP[rawFactor]||rawFactor.replace(/\(.*\)/g,'').trim()||'Disturbance Detected'):'No Issues Detected';
  var col=loadCol(load);
  var conf=load>0?Math.min(99,Math.round(load*0.9+5)):0;

  const detRef=useRef(null);
  const [dur,setDur]=useState(0);
  var above=load>20;
  useEffect(function(){
    if(above){
      if(!detRef.current)detRef.current=new Date();
      var id=setInterval(function(){
        if(detRef.current)
          setDur(Math.round((Date.now()-detRef.current.getTime())/1000));
      },1000);
      return function(){clearInterval(id);};
    }
    detRef.current=null;setDur(0);
  },[above]);

  var detTime=detRef.current
    ?detRef.current.toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit',second:'2-digit'})
    :'—';
  var durStr=dur>0?dur+'s':'0s';

  return (
    <div>
      <div className="iss-lbl">Issue / Distract</div>
      <div className="iss-name">{issueName}</div>
      <div className="iss-conf" style={{color:col}}>{conf}%</div>
      <div className="iss-clbl">Confidence</div>
      <div className="iss-meta">
        <div className="iss-row">
          <span className="iss-k">Detected In</span>
          <span className="iss-v">{detTime}</span>
        </div>
        <div className="iss-row">
          <span className="iss-k">Duration</span>
          <span className="iss-v">{durStr}</span>
        </div>
      </div>
    </div>
  );
}

/* ── CircularGauge ── */
function CircularGauge({value}){
  var R=95,CX=110,CY=110;
  var circ=Math.round(2*Math.PI*R);
  var filled=Math.round((value/100)*circ);
  var col=loadCol(value);
  return (
    <div className="gauge-sec">
      <div className="gauge-ttl">Cognitive Load Score</div>
      <svg width="150" height="150" viewBox="0 0 220 220" style={{maxWidth:'100%',maxHeight:'25vh'}}>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke="var(--border-default)" strokeWidth="14"/>
        <circle cx={CX} cy={CY} r={R} fill="none" stroke={col} strokeWidth="14"
          strokeDasharray={filled+' '+circ} strokeLinecap="round"
          transform={'rotate(-90 '+CX+' '+CY+')'}/>
        <text x={CX} y={CY+8} textAnchor="middle" fill={col}
          fontSize="58" fontWeight="700" fontFamily="inherit">{value}</text>
        <text x={CX} y={CY+34} textAnchor="middle" fill={col}
          fontSize="13" fontFamily="inherit" opacity="0.7">/ 100</text>
      </svg>
      <div className="gauge-lbl" style={{color:col}}>{loadLbl(value)}</div>
    </div>
  );
}

/* ── RecommendationPanel ── */
function RecommendationPanel({mitigations,send}){
  var vis=(mitigations||[]).filter(function(m){return m.status!=='dismissed';});
  var proposed=vis.filter(function(m){return m.status==='proposed'&&m.confirm;});

  /* map technical titles to user-friendly names */
  var friendlyTitle=function(t){
    var map={
      'Soothe cabin':'Reduce Audio Volume',
      'Calming persona':'Enable Focus Mode',
      'Alertness boost':'Take a Driver Break',
      'Passenger distress':'Check on Passenger',
      'Seatbelt not engaged':'Fasten Seatbelt',
      'Secure loose item':'Secure Loose Items',
      'Secure loose item (camera)':'Secure Loose Items',
      'CHILD PRESENCE ALERT':'Child Left Behind — Act Now',
      'Engage baby':'Play Nursery Content',
      'Passenger content':'Maintain Cabin Comfort',
      'Child heartbeat elevated':'Child Heartbeat Alert',
      'Pet heartbeat elevated':'Pet Heartbeat Alert',
      'Cabin monitoring active':'Radar Monitoring Active',
      'Unsecured item on seat':'Stow Loose Item',
      'Secure loose item':'Secure Before Road Hazard'
    };
    return map[t]||t;
  };

  return (
    <div>
      <div className="rec-ttl">Recommendation</div>
      <div className="rec-list">
        {vis.length===0&&<div className="rec-empty">All systems nominal.</div>}
        {vis.slice(0,4).map(function(m,i){
          var sc={active:'#00d4b0',proposed:'#f6ad55',critical:'#fc8181'};
          return (
            <div key={m.id} className="rec-item">
              <div className="rec-num" style={{
                background:m.severity==='critical'?'rgba(252,129,129,.12)':'rgba(0,212,176,.1)',
                borderColor:m.severity==='critical'?'#fc8181':'rgba(0,212,176,.3)',
                color:m.severity==='critical'?'#fc8181':'#00d4b0'
              }}>{i+1}</div>
              <div>
                <div className="rec-text">{friendlyTitle(m.title)}</div>
                <div className="rec-detail">{m.usecase}</div>
              </div>
            </div>
          );
        })}
      </div>
      <button className="apply-btn" disabled={proposed.length===0}
        onClick={function(){proposed.forEach(function(m){send({cmd:'confirm',id:m.id});});}}>
        Apply Recommendation
      </button>
      {vis.length>0&&(
        <button className="dismiss-btn"
          onClick={function(){vis.forEach(function(m){send({cmd:'dismiss',id:m.id});});}}>
          Dismiss All
        </button>
      )}
    </div>
  );
}

/* ── OccupantList — reusable ── */
function OccupantList({seatConfigs}){
  var occupied=SEAT_IDS.filter(function(sid){
    var c=(seatConfigs&&seatConfigs[sid])||{};return c.occupied;
  });
  if(occupied.length===0)
    return <div className="meta-text" style={{textAlign:'center',marginTop:8}}>No occupants</div>;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:5,width:'100%',marginTop:10}}>
      {occupied.map(function(sid){
        var c=(seatConfigs&&seatConfigs[sid])||{};
        var d=c.distress||0;
        var col=d>0.7?'#fc8181':d>0.35?'#f6ad55':'#00d4b0';
        return (
          <div key={sid} style={{display:'flex',alignItems:'center',gap:8,
            background:'var(--bg-subtle)',borderRadius:6,padding:'6px 10px',
            border:'1px solid var(--border-default)'}}>
            <span style={{color:col,fontSize:'1.125rem'}}>{ICONS[c.kind]||'👤'}</span>
            <div style={{flex:1,minWidth:0}}>
              <div className="hint-text" style={{textTransform:'uppercase',letterSpacing:'.04em'}}>{SEAT_LABELS[sid]}</div>
              <div className="meta-text" style={{color:col,fontWeight:600,marginTop:2}}>
                {c.audio_event&&c.audio_event!=='none'
                  ?(AICONS[c.audio_event]+' '+c.audio_event)
                  :(c.emotion||'calm')}
              </div>
            </div>
            <span style={{fontSize:'var(--font-sm)',color:c.buckled?'var(--accent)':'var(--crit)',fontWeight:700,flexShrink:0}}>
              {c.buckled?'✓':'✗'}
            </span>
          </div>
        );
      })}
    </div>
  );
}
