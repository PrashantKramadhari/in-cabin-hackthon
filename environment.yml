name: cabinsense
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - fastapi
    - "uvicorn[standard]"
    - numpy
    - --extra-index-url https://download.pytorch.org/whl/cpu
    - torch==2.5.1
    - torchaudio==2.5.1
    - torchvision==0.20.1
    - transformers
    - mediapipe
    - ultralytics
    - opencv-python-headless
    - websockets
