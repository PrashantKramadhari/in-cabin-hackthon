name: cabinsense
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - fastapi
    - "uvicorn[standard]"
    - numpy
    # PyTorch with CUDA 12.4 (RTX 3080 / RTX 3090 / RTX 40xx)
    # For CPU-only machines swap the index URL to https://download.pytorch.org/whl/cpu
    - --extra-index-url https://download.pytorch.org/whl/cu124
    - torch
    - torchaudio
    - torchvision
    - transformers
    - mediapipe
    - ultralytics
    - opencv-python-headless
    - websockets
